  <path d="M154 816C214 806 232 772 290 782C352 793 373 735 431 746C498 759 509 690 576 704C648 719 661 634 731 657C792 677 831 616 898 587" class="line" stroke="url(#profit)" stroke-width="12"/>
  <circle cx="898" cy="587" r="15" fill="#171716"/>
  <rect x="124" y="914" width="246" height="38" rx="12" fill="#e5f6ed"/>
  <rect x="390" y="914" width="224" height="38" rx="12" fill="#ffe5df"/>
  <rect x="634" y="914" width="294" height="38" rx="12" fill="#fff1cf"/>
