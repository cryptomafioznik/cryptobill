    <text x="150" y="1577" class="h2 ink">Buy</text>
    <text x="150" y="1620" class="body muted">majors</text>
  </g>
  <g>
    <rect x="336" y="1470" width="190" height="174" rx="18" fill="#fff8f6" stroke="#f3c9bf" stroke-width="3"/>
    <text x="362" y="1524" class="tiny red">MEMES</text>
    <text x="362" y="1577" class="h2 ink">Ape</text>
    <text x="362" y="1620" class="body muted">small cap</text>
  </g>
  <g>
    <rect x="548" y="1470" width="190" height="174" rx="18" fill="#fffdf5" stroke="#ead7a4" stroke-width="3"/>
    <text x="574" y="1524" class="tiny amber">DEFI</text>
    <text x="574" y="1577" class="h2 ink">Farm</text>
    <text x="574" y="1620" class="body muted">yield</text>
  </g>
  <g>
    <rect x="760" y="1470" width="190" height="174" rx="18" fill="#f5fbff" stroke="#b9dee4" stroke-width="3"/>
    <text x="786" y="1524" class="tiny cyan">SECURITY</text>
    <text x="786" y="1577" class="h2 ink">Shield</text>
