  <rect x="700" y="1267" width="238" height="18" rx="9" fill="#ecebe5"/>
  <rect x="700" y="1267" width="188" height="18" rx="9" fill="#c78116"/>

  <rect x="92" y="1378" width="896" height="318" rx="24" class="panel"/>
  <text x="124" y="1437" class="tiny muted">ACTIONS</text>
  <g>
    <rect x="124" y="1470" width="190" height="174" rx="18" fill="#f8fffb" stroke="#cde7d8" stroke-width="3"/>
