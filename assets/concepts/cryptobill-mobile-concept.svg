<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-label="CryptoBill mobile game concept">
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#deddd5" stroke-width="2"/>
    </pattern>
    <linearGradient id="profit" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0b7f58"/>
      <stop offset="1" stop-color="#22b673"/>
    </linearGradient>
    <linearGradient id="loss" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#d14a36"/>
      <stop offset="1" stop-color="#f08a5b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#171716" flood-opacity=".16"/>
    </filter>
    <style>
      .bg { fill: #f7f7f3; }
      .ink { fill: #171716; }
      .muted { fill: #68665f; }
      .panel { fill: #ffffff; stroke: #d7d6ce; stroke-width: 3; }
      .paper { fill: #fbfbf8; stroke: #d7d6ce; stroke-width: 3; }
      .tiny { font: 700 24px Inter, Arial, sans-serif; letter-spacing: 0; }
      .label { font: 800 29px Inter, Arial, sans-serif; letter-spacing: 0; }
      .body { font: 600 31px Inter, Arial, sans-serif; letter-spacing: 0; }
      .h1 { font: 900 58px Inter, Arial, sans-serif; letter-spacing: 0; }
      .h2 { font: 900 42px Inter, Arial, sans-serif; letter-spacing: 0; }
      .num { font: 900 52px Inter, Arial, sans-serif; letter-spacing: 0; }
      .mono { font: 800 26px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0; }
      .green { fill: #17875a; }
      .red { fill: #c94231; }
      .amber { fill: #bd7b16; }
      .cyan { fill: #087e8b; }
      .violet { fill: #6556c7; }
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1080" height="1920" class="bg"/>
  <rect width="1080" height="1920" fill="url(#grid)" opacity=".82"/>
  <rect x="44" y="38" width="992" height="1844" rx="58" fill="#1f1f1d" filter="url(#softShadow)"/>
  <rect x="64" y="58" width="952" height="1804" rx="44" fill="#f7f7f3"/>

  <rect x="92" y="96" width="896" height="154" rx="22" class="panel"/>
  <rect x="122" y="126" width="94" height="94" rx="18" fill="#232321"/>
  <rect x="138" y="144" width="62" height="42" rx="7" fill="#f7f7f3"/>
  <path d="M147 174l12-13 11 8 18-21" class="line" stroke="#087e8b" stroke-width="7"/>
  <rect x="138" y="194" width="62" height="9" rx="4" fill="#c78116"/>
  <text x="244" y="151" class="tiny muted">CRYPTO CAREER TYCOON</text>
