  <circle cx="296" cy="1774" r="17" fill="#188958"/>
  <circle cx="344" cy="1774" r="17" fill="#ecebe5" stroke="#d7d6ce" stroke-width="3"/>
  <text x="418" y="1783" class="label amber">Risk is rising</text>
  <rect x="720" y="1728" width="268" height="92" rx="22" fill="#232321"/>
  <text x="785" y="1787" class="h2" fill="#ffffff">Next week</text>
