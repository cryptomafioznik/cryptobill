<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CryptoBill — look & feel concept</title>
    <style>
      :root {
        --bg0: #070a12;
        --bg1: #121a30;
        --card: #151d31;
        --card2: #1b2742;
        --line: rgba(255, 255, 255, 0.09);
        --ink: #eef3ff;
        --muted: #8492b6;
        --emerald: #33e6a8;
        --gold: #ffd35e;
        --red: #ff5d73;
        --blue: #5b8cff;
        --violet: #a78bfa;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; }
      body {
        background: var(--bg0);
        color: var(--ink);
        overflow: hidden;
        display: grid;
        place-items: center;
        user-select: none;
      }

      /* phone-shaped stage so it reads as a mobile game everywhere */
      .stage {
        position: relative;
        width: min(440px, 100vw);
        height: min(940px, 100vh);
        overflow: hidden;
        background:
          radial-gradient(120% 80% at 50% -10%, rgba(91, 140, 255, 0.18), transparent 60%),
          radial-gradient(100% 60% at 50% 110%, rgba(51, 230, 168, 0.12), transparent 60%),
          linear-gradient(180deg, var(--bg1), var(--bg0));
        transition: background 1.2s ease;
      }
      .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(120% 100% at 50% 40%, transparent 55%, rgba(0, 0, 0, 0.55));
      }
      /* animated aurora blobs */
      .aurora { position: absolute; inset: -20% -20% auto -20%; height: 70%; filter: blur(60px); opacity: 0.5; pointer-events: none; }
      .aurora span { position: absolute; border-radius: 50%; mix-blend-mode: screen; animation: drift 16s ease-in-out infinite; }
      .a1 { width: 280px; height: 280px; left: -40px; top: 20px; background: var(--blue); }
      .a2 { width: 240px; height: 240px; right: -30px; top: -10px; background: var(--emerald); animation-delay: -6s; }
      .a3 { width: 200px; height: 200px; left: 120px; top: -40px; background: var(--violet); animation-delay: -11s; }
      @keyframes drift { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(40px,30px) scale(1.15); } 66% { transform: translate(-30px,10px) scale(0.92); } }

      #fx { position: absolute; inset: 0; pointer-events: none; z-index: 5; }

      .ui { position: absolute; inset: 0; z-index: 6; display: flex; flex-direction: column; padding: 18px; gap: 14px; }

      .topbar { display: flex; align-items: center; justify-content: space-between; }
      .phase {
        display: inline-flex; align-items: center; gap: 8px; padding: 7px 14px; border-radius: 999px;
        font-weight: 800; font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase;
        background: rgba(91, 140, 255, 0.14); color: var(--blue); border: 1px solid rgba(91, 140, 255, 0.35);
        box-shadow: 0 0 24px rgba(91, 140, 255, 0.25); transition: all 0.6s ease;
      }
      .phase .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 10px currentColor; }
      .week { color: var(--muted); font-weight: 800; font-size: 0.82rem; letter-spacing: 0.05em; }
      .reset { background: none; border: 1px solid var(--line); color: var(--muted); width: 34px; height: 34px; border-radius: 10px; font-size: 1rem; cursor: pointer; }

      .hero { text-align: center; margin-top: 6px; }
      .hero .label { color: var(--muted); font-size: 0.72rem; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase; }
      .hero .num {
        font-size: 4.1rem; font-weight: 900; line-height: 1; letter-spacing: -0.02em; margin-top: 6px;
        color: var(--ink); text-shadow: 0 0 34px rgba(51, 230, 168, 0.45); transition: color 0.25s, transform 0.12s;
      }
      .hero .num.pop { transform: scale(1.12); }
      .hero .sub { margin-top: 10px; color: var(--muted); font-size: 0.9rem; font-weight: 600; }
      .hero .sub b { color: var(--emerald); }

      .avatar-wrap { display: flex; justify-content: center; margin-top: 2px; }
      .avatar {
        width: 64px; height: 64px; border-radius: 20px; display: grid; place-items: center; font-size: 2rem;
        background: linear-gradient(160deg, var(--card2), var(--card)); border: 1px solid var(--line);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .edges { display: flex; gap: 8px; justify-content: center; }
      .edge {
        width: 42px; height: 42px; border-radius: 12px; display: grid; place-items: center; font-size: 1.25rem;
        background: rgba(167, 139, 250, 0.12); border: 1px solid rgba(167, 139, 250, 0.4);
        box-shadow: 0 0 18px rgba(167, 139, 250, 0.25);
      }

      .spacer { flex: 1; }

      .prompt { text-align: center; color: var(--muted); font-size: 0.74rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; }
      .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .card {
        position: relative; cursor: pointer; padding: 16px 14px; min-height: 168px; border-radius: 20px;
        background: linear-gradient(165deg, var(--card2), var(--card)); border: 1px solid var(--line);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        display: flex; flex-direction: column; gap: 8px; overflow: hidden;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      }
      .card::before { content: ""; position: absolute; inset: 0; background: radial-gradient(120% 80% at 50% 0%, var(--glow, transparent), transparent 70%); opacity: 0.5; pointer-events: none; }
      .card:active { transform: scale(0.97); }
      .card.lift { transform: translateY(-10px) scale(1.04); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 40px var(--glow); border-color: var(--glowline); }
      .card .ic { font-size: 2.4rem; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5)); }
      .card .kind { font-size: 0.66rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: var(--glowline); }
      .card .title { font-size: 1.06rem; font-weight: 800; line-height: 1.12; }
      .card .meta { margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; font-weight: 800; }
      .card .risk { color: var(--muted); }
      .card .ret { color: var(--emerald); }
      .card .ret.bad { color: var(--red); }

      .float {
        position: absolute; z-index: 7; left: 50%; top: 150px; transform: translateX(-50%);
        font-size: 1.9rem; font-weight: 900; pointer-events: none; opacity: 0;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
      }
      .float.go { animation: floatUp 1.1s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; }
      @keyframes floatUp { 0% { opacity: 0; transform: translate(-50%, 0) scale(0.7); } 15% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -90px) scale(1.1); } }

      .shake { animation: shk 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
      @keyframes shk { 10%,90% { transform: translate(-1px,0); } 20%,80% { transform: translate(2px,0); } 30%,50%,70% { transform: translate(-5px,1px); } 40%,60% { transform: translate(5px,-1px); } }

      .hint { position: absolute; bottom: 8px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.28); font-size: 0.7rem; z-index: 8; }
      @media (max-width: 380px) { .hero .num { font-size: 3.4rem; } .card { min-height: 150px; } }
    </style>
  </head>
  <body>
    <div class="stage" id="stage">
      <div class="aurora"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>
      <canvas id="fx"></canvas>
      <div class="ui">
        <div class="topbar">
          <span class="phase" id="phase"><span class="dot"></span><span id="phaseName">Accumulation</span></span>
          <span class="week" id="week">WEEK 1 / 24</span>
          <button class="reset" id="reset" title="Restart">↻</button>
        </div>

        <div class="hero">
          <div class="label">Net worth</div>
          <div class="num" id="num">$1,000</div>
          <div class="sub" id="sub">Small bank. Big plans. <b>Read the room.</b></div>
        </div>

        <div class="avatar-wrap"><div class="avatar" id="avatar">🧑‍💻</div></div>
        <div class="edges" id="edges"></div>

        <div class="spacer"></div>

        <div class="prompt">Choose your week</div>
        <div class="cards" id="cards"></div>
      </div>
      <div class="float" id="float"></div>
      <div class="hint">tap a card to play the week</div>
    </div>

    <script>
      // ------- tiny synth sound -------
      let actx;
      function blip(freq, dur, type = "sine", gain = 0.06, when = 0) {
        try {
          if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
          if (actx.state === "suspended") actx.resume();
          const o = actx.createOscillator(), g = actx.createGain();
          o.type = type; o.frequency.value = freq; o.connect(g); g.connect(actx.destination);
          const t = actx.currentTime + when;
          g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(gain, t + 0.012); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          o.start(t); o.stop(t + dur + 0.02);
        } catch (e) {}
      }
      const snd = {
        profit() { blip(660, 0.12, "sine", 0.06); blip(990, 0.16, "sine", 0.05, 0.07); blip(1320, 0.2, "sine", 0.04, 0.14); },
        loss() { blip(190, 0.22, "sawtooth", 0.06); blip(120, 0.3, "square", 0.04, 0.06); },
        flip() { blip(520, 0.06, "triangle", 0.04); },
      };

      // ------- particles -------
      const canvas = document.getElementById("fx");
      const ctx = canvas.getContext("2d");
      let parts = [];
      function size() { const r = canvas.parentElement.getBoundingClientRect(); canvas.width = r.width; canvas.height = r.height; }
      size(); window.addEventListener("resize", size);
      function burst(x, y, opts) {
        const n = opts.n || 28;
        for (let i = 0; i < n; i++) {
          const a = (Math.PI * 2 * i) / n + Math.random();
          const sp = (opts.speed || 5) * (0.4 + Math.random());
          parts.push({
            x, y,
            vx: Math.cos(a) * sp, vy: (opts.up ? -Math.abs(Math.sin(a)) : Math.sin(a)) * sp - (opts.up ? 3 : 0),
            life: 1, decay: 0.012 + Math.random() * 0.02,
            size: (opts.size || 5) * (0.6 + Math.random()),
            color: opts.colors[(Math.random() * opts.colors.length) | 0],
            g: opts.g ?? 0.12, shape: opts.shape || "coin", rot: Math.random() * 6, vr: (Math.random() - 0.5) * 0.4,
          });
        }
      }
      function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        parts = parts.filter((p) => p.life > 0);
        for (const p of parts) {
          p.vy += p.g; p.x += p.vx; p.y += p.vy; p.life -= p.decay; p.rot += p.vr;
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fillStyle = p.color;
          if (p.shape === "coin") {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.beginPath(); ctx.roundRect(-p.size, -p.size * 0.7, p.size * 2, p.size * 1.4, 3); ctx.fill();
            ctx.restore();
          } else {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.7, 0, 7); ctx.fill();
          }
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
      }
      loop();

      // ------- game-ish state (fake economy, real feel) -------
      const ACTS = [
        { name: "Accumulation", color: "#5b8cff", at: 1 },
        { name: "Bull Run", color: "#33e6a8", at: 7 },
        { name: "The Top", color: "#ffd35e", at: 13 },
        { name: "Bear Market", color: "#ff5d73", at: 19 },
      ];
      const EDGE_POOL = ["💎", "🕵️", "🎰", "🐋", "⚡", "🛡️"];
      const DECK = [
        { ic: "📈", kind: "Momentum", title: "ETF bid returns", tone: "good", mult: [0.04, 0.16] },
        { ic: "🚀", kind: "Meme", title: "Supercycle thread", tone: "wild", mult: [-0.3, 1.1] },
        { ic: "🌊", kind: "Calm", title: "Quiet accumulation", tone: "good", mult: [0.0, 0.07] },
        { ic: "🌩️", kind: "Storm", title: "Bridge exploit FUD", tone: "bad", mult: [-0.22, 0.02] },
        { ic: "💸", kind: "DeFi", title: "Points season", tone: "good", mult: [0.02, 0.18] },
        { ic: "💀", kind: "Volatile", title: "Leverage flush", tone: "bad", mult: [-0.4, 0.05] },
        { ic: "🎯", kind: "Listing", title: "Exchange leak", tone: "good", mult: [0.06, 0.22] },
        { ic: "🃏", kind: "Wild", title: "Influencer wallet", tone: "wild", mult: [-0.2, 0.7] },
      ];
      const glowFor = { good: ["rgba(51,230,168,.35)", "#33e6a8"], bad: ["rgba(255,93,115,.35)", "#ff5d73"], wild: ["rgba(167,139,250,.4)", "#a78bfa"] };

      let net, week, edges, busy;
      const el = (id) => document.getElementById(id);
      const fmt = (v) => "$" + Math.round(v).toLocaleString("en-US");
      function actFor(w) { let a = ACTS[0]; for (const x of ACTS) if (w >= x.at) a = x; return a; }

      function reset() {
        net = 1000; week = 1; edges = ["💎"]; busy = false;
        el("num").textContent = fmt(net);
        el("sub").innerHTML = "Small bank. Big plans. <b>Read the room.</b>";
        el("avatar").textContent = "🧑‍💻";
        renderEdges(); renderPhase(); deal();
      }
      function renderEdges() { el("edges").innerHTML = edges.map((e) => `<div class="edge">${e}</div>`).join(""); }
      function renderPhase() {
        const a = actFor(week);
        el("phaseName").textContent = a.name;
        const p = el("phase");
        p.style.color = a.color;
        p.style.background = a.color + "22";
        p.style.borderColor = a.color + "66";
        p.style.boxShadow = "0 0 26px " + a.color + "44";
        el("week").textContent = `WEEK ${Math.min(week, 24)} / 24`;
        // shift the whole mood toward the act color
        el("stage").style.background =
          `radial-gradient(120% 80% at 50% -10%, ${a.color}33, transparent 60%),` +
          `radial-gradient(100% 60% at 50% 115%, ${a.color}22, transparent 60%),` +
          `linear-gradient(180deg, var(--bg1), var(--bg0))`;
      }
      function pick() { return DECK[(Math.random() * DECK.length) | 0]; }
      function deal() {
        const a = pick(); let b = pick(); let g = 0; while (b.title === a.title && g++ < 6) b = pick();
        const cards = [a, b];
        el("cards").innerHTML = cards
          .map((c, i) => {
            const [gl, gline] = glowFor[c.tone];
            const lo = Math.round(c.mult[0] * 100), hi = Math.round(c.mult[1] * 100);
            const bad = c.tone === "bad";
            return `<div class="card" data-i="${i}" style="--glow:${gl};--glowline:${gline}">
                <div class="ic">${c.ic}</div>
                <div class="kind">${c.kind}</div>
                <div class="title">${c.title}</div>
                <div class="meta"><span class="risk">${bad ? "risk ⚠" : "risk ·"}</span><span class="ret ${bad ? "bad" : ""}">${lo}…${hi >= 0 ? "+" + hi : hi}%</span></div>
              </div>`;
          })
          .join("");
        [...el("cards").children].forEach((node, i) => node.addEventListener("click", () => play(cards[i], node)));
      }

      function play(card, node) {
        if (busy) return;
        busy = true;
        snd.flip();
        node.classList.add("lift");
        const a = actFor(week);
        const drift = { Accumulation: 0.02, "Bull Run": 0.12, "The Top": -0.01, "Bear Market": -0.06 }[a.name] || 0;
        let chg = card.mult[0] + Math.random() * (card.mult[1] - card.mult[0]) + drift;
        const before = net;
        net = Math.max(40, net * (1 + chg));
        const delta = net - before;
        const up = delta >= 0;

        setTimeout(() => {
          // number punch
          const num = el("num");
          animateNum(before, net);
          num.classList.add("pop");
          num.style.color = up ? "var(--emerald)" : "var(--red)";
          setTimeout(() => { num.classList.remove("pop"); num.style.color = "var(--ink)"; }, 260);

          // floating delta
          const f = el("float");
          f.textContent = (up ? "+" : "−") + fmt(Math.abs(delta)).replace("$", "$");
          f.style.color = up ? "var(--emerald)" : "var(--red)";
          f.classList.remove("go"); void f.offsetWidth; f.classList.add("go");

          // particles + shake + sound
          const r = canvas.getBoundingClientRect();
          if (up) {
            burst(r.width / 2, 150, { colors: ["#33e6a8", "#ffd35e", "#9affd6"], n: 34, speed: 6, up: true, size: 6, shape: "coin", g: 0.14 });
            snd.profit();
          } else {
            burst(r.width / 2, 150, { colors: ["#ff5d73", "#ff9aa6", "#7a1f2c"], n: 26, speed: 5, up: false, size: 5, shape: "spark", g: 0.18 });
            snd.loss();
            el("stage").classList.add("shake"); setTimeout(() => el("stage").classList.remove("shake"), 460);
          }

          // status line + avatar mood
          el("sub").innerHTML = up
            ? `Played <b>${card.title}</b>. The chart agrees.`
            : `<b style="color:var(--red)">${card.title}</b> bit back. Survive it.`;
          el("avatar").textContent = up ? (net > 50000 ? "😎" : "🙂") : "😰";

          // occasionally earn an edge
          if (week % 4 === 0 && edges.length < 6) { edges.push(EDGE_POOL[edges.length % EDGE_POOL.length]); renderEdges(); }

          // next week
          week++;
          renderPhase();
          if (week > 24) {
            el("sub").innerHTML = `Run complete — <b>${fmt(net)}</b>. Tap ↻ to run it back.`;
            el("cards").innerHTML = "";
            busy = false;
            return;
          }
          setTimeout(() => { deal(); busy = false; }, 420);
        }, 240);
      }

      function animateNum(from, to) {
        const num = el("num");
        const t0 = performance.now(), dur = 600;
        function step(t) {
          const p = Math.min(1, (t - t0) / dur);
          const e = 1 - Math.pow(1 - p, 3);
          num.textContent = fmt(from + (to - from) * e);
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      el("reset").addEventListener("click", reset);
      reset();
    </script>
  </body>
</html>
