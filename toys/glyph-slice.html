<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CIPHER — glyph slice</title>
<style>
  html,body{margin:0;height:100%;background:#03050a;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    cursor:crosshair;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  canvas{display:block;}
  #hud{position:fixed;top:12px;left:14px;color:#3f5566;font-size:12px;letter-spacing:.18em;line-height:1.6;pointer-events:none;}
  #hud .t{color:#cfeaff;font-size:13px;letter-spacing:.3em;}
  #hud b{color:#9fe9ff;}
  #hint{position:fixed;bottom:12px;left:0;width:100%;text-align:center;color:#33424f;font-size:11px;letter-spacing:.16em;pointer-events:none;}
  #hint b{color:#7fd6ff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div class="t">C I P H E R</div><div>time <b id="time">0</b>s · purged <b id="kills">0</b> · lv <b id="lv">1</b></div></div>
<div id="hint"></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d'); let W,H,DPR;
function resize(){ DPR=Math.min(2,devicePixelRatio||1); W=innerWidth;H=innerHeight; cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

// glyph vocabulary
const GLY='01<>{}[]/\\#$%&@=+*?ΞΣΨΩλ◇◈△▽';
const G=()=>GLY[Math.floor(Math.random()*GLY.length)];
function rnd(a,b){return a+Math.random()*(b-a);} function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
// palette — disciplined, NOT matrix-green: cold hero, warm-red threat, gold reward
const C_HERO='#bfe8ff', C_HERO2='#7fd0ff', C_FOE='#ff5a3c', C_FOE2='#ff8a5e', C_GEM='#e8c97a', C_SHOT='#dffaff';

let P, foes, shots, gems, parts, rain, t, kills, screen, spawnT, shake, hitstop, flash;
const keys={}; const stick={active:false,ox:0,oy:0,dx:0,dy:0,id:null};
let best=0; try{best=+localStorage.getItem('cipher_glyph_best')||0;}catch(e){}
function vibe(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}

// enemy archetypes = distinct glyphs (bestiary for free)
const FOE={
  bit:  {gly:['0','1','x','%'], hp:8,  spd:1.7, dmg:6,  sz:15, col:C_FOE},
  rune: {gly:['Ξ','Σ','λ','Ψ'], hp:20, spd:1.3, dmg:9,  sz:20, col:C_FOE},
  block:{gly:['█','▓','⊟','#'], hp:60, spd:0.8, dmg:16, sz:30, col:C_FOE2},
};
function freshP(){ return {x:W/2,y:H/2,hp:100,maxHp:100,speed:3,r:14,fireT:0,fireInt:24,dmg:7,pierce:0,pcount:1,lv:1,xp:0,xpNext:6,pickupR:95,iframe:0,t:0}; }
function start(){ P=freshP(); foes=[];shots=[];gems=[];parts=[]; rain=[]; for(let i=0;i<70;i++)rain.push({x:rnd(0,W),y:rnd(0,H),g:G(),a:rnd(0.02,0.10),s:rnd(0.2,0.7),tt:Math.random()*40}); t=0;kills=0;spawnT=0;shake=0;hitstop=0;flash=0;screen='play'; hint(); }
function hint(){ document.getElementById('hint').innerHTML='<b>'+('ontouchstart'in window?'веди пальцем':'WASD')+'</b> · оружие само · собирай <span style="color:#e8c97a">данные</span>'; }

addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
addEventListener('mousedown',e=>{ if(screen!=='play')start(); });
addEventListener('touchstart',e=>{const z=e.changedTouches[0]; if(screen!=='play'){start();e.preventDefault();return;} stick.active=true;stick.id=z.identifier;stick.ox=z.clientX;stick.oy=z.clientY;stick.dx=0;stick.dy=0;e.preventDefault();},{passive:false});
addEventListener('touchmove',e=>{if(!stick.active)return;for(const z of e.changedTouches){if(z.identifier===stick.id){let dx=z.clientX-stick.ox,dy=z.clientY-stick.oy;const l=Math.hypot(dx,dy),R=56;if(l>R){dx=dx/l*R;dy=dy/l*R;}stick.dx=dx/R;stick.dy=dy/R;}}e.preventDefault();},{passive:false});
addEventListener('touchend',e=>{for(const z of e.changedTouches){if(z.identifier===stick.id){stick.active=false;stick.dx=0;stick.dy=0;}}},{passive:false});

function spawn(){ const e=Math.floor(rnd(0,4)); let x,y; if(e===0){x=rnd(0,W);y=-20;}else if(e===1){x=W+20;y=rnd(0,H);}else if(e===2){x=rnd(0,W);y=H+20;}else{x=-20;y=rnd(0,H);}
  const hs=1+t/2400; let k='bit'; if(t>1500&&Math.random()<0.16)k='block'; else if(t>800&&Math.random()<0.28)k='rune';
  const f=FOE[k]; foes.push({x,y,k,hp:f.hp*hs,mhp:f.hp*hs,spd:f.spd,dmg:f.dmg,sz:f.sz,col:f.col,gly:f.gly[Math.floor(Math.random()*f.gly.length)],gt:Math.random()*20,flash:0}); }

function burst(x,y,n,col,sz){ for(let i=0;i<n;i++){const a=Math.random()*6.28,s=rnd(1,4.5);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,g:G(),col,sz:sz||14,rot:rnd(-0.3,0.3)});} }
function levelUp(){ P.lv++; P.xp-=P.xpNext; P.xpNext=Math.round(P.xpNext*1.5+3); vibe([14,20,14]);
  // simple auto-upgrades for the slice (rotate through)
  const u=P.lv%4; if(u===0)P.fireInt=Math.max(7,P.fireInt*0.82); else if(u===1)P.dmg+=4; else if(u===2)P.pcount++; else {P.pierce++; }
  burst(P.x,P.y,20,C_HERO,16); shake=Math.max(shake,7); }

function update(){
  t++; P.t++;
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my-=1; if(keys['s']||keys['arrowdown'])my+=1; if(keys['a']||keys['arrowleft'])mx-=1; if(keys['d']||keys['arrowright'])mx+=1;
  if(stick.active){mx=stick.dx;my=stick.dy;}
  const ml=Math.hypot(mx,my); if(ml>0.08){const s=Math.min(1,ml)*P.speed;P.x+=mx/ml*s;P.y+=my/ml*s;}
  P.x=Math.max(16,Math.min(W-16,P.x)); P.y=Math.max(16,Math.min(H-16,P.y)); if(P.iframe>0)P.iframe--;

  spawnT++; const si=Math.max(10,46-t/80), bn=1+Math.floor(t/1500); if(spawnT>=si){spawnT=0;for(let i=0;i<bn;i++)spawn();}

  P.fireT--; if(P.fireT<=0&&foes.length){ let nr=null,nd=1e9; for(const f of foes){const d=dist(f,P);if(d<nd){nd=d;nr=f;}}
    if(nr){ const base=Math.atan2(nr.y-P.y,nr.x-P.x),sp=0.16*(P.pcount-1);
      for(let i=0;i<P.pcount;i++){const a=base-sp/2+(P.pcount>1?sp*i/(P.pcount-1):0);shots.push({x:P.x,y:P.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8,dmg:P.dmg,pierce:P.pierce,life:70,g:G(),gt:0});}
      P.fireT=P.fireInt; } }

  for(const f of foes){ f.gt+=0.4; const dx=P.x-f.x,dy=P.y-f.y,d=Math.hypot(dx,dy)||1; f.x+=dx/d*f.spd; f.y+=dy/d*f.spd; if(f.flash>0)f.flash--;
    if(d<P.r+f.sz*0.5){ if(P.iframe<=0){P.hp-=f.dmg;P.iframe=24;flash=1;shake=8;vibe(28);if(P.hp<=0){die();return;}} f.x-=dx/d*8;f.y-=dy/d*8; } }
  for(const s of shots){ s.x+=s.vx;s.y+=s.vy;s.life--; s.gt++; if(s.gt%2===0)s.g=G();
    for(const f of foes){ if(f.hp<=0)continue; if(Math.hypot(s.x-f.x,s.y-f.y)<f.sz*0.6){ f.hp-=s.dmg;f.flash=4; if(f.hp<=0)kill(f); s.pierce--; if(s.pierce<0){s.life=0;break;} } } }
  shots=shots.filter(s=>s.life>0); foes=foes.filter(f=>f.hp>0);

  for(const g of gems){ const d=dist(g,P); if(d<P.pickupR){const a=Math.atan2(P.y-g.y,P.x-g.x),pl=Math.min(11,(P.pickupR-d)*0.2+2);g.x+=Math.cos(a)*pl;g.y+=Math.sin(a)*pl;} if(d<18){g.got=1;P.xp+=g.v;if(P.xp>=P.xpNext)levelUp();} }
  gems=gems.filter(g=>!g.got);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life-=0.04;} parts=parts.filter(p=>p.life>0);
  for(const r of rain){r.y+=r.s;r.tt++;if(r.tt%18===0)r.g=G();if(r.y>H){r.y=-10;r.x=rnd(0,W);}}
  flash*=0.88; shake*=0.84;
}
function kill(f){ kills++; const big=f.k==='block'; burst(f.x,f.y,big?14:7,f.col,f.sz*0.7); shake=Math.max(shake,big?6:2.5); hitstop=Math.max(hitstop,big?4:1); vibe(big?16:0);
  const n=big?4:1; for(let i=0;i<n;i++)gems.push({x:f.x+rnd(-12,12),y:f.y+rnd(-12,12),v:big?3:1,g:G(),gt:Math.random()*20,got:0}); f.hp=0; }
function die(){ screen='dead'; shake=22;flash=1;hitstop=8;vibe(200); if(t>best){best=t;try{localStorage.setItem('cipher_glyph_best',best);}catch(e){}} }

function draw(){
  ctx.globalCompositeOperation='source-over'; ctx.fillStyle='#03050a'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  // faint glyph rain backdrop (very dim, disciplined)
  ctx.globalCompositeOperation='lighter'; ctx.font='13px ui-monospace,monospace';
  if(rain)for(const r of rain){ ctx.fillStyle='rgba(90,140,160,'+r.a+')'; ctx.fillText(r.g,r.x,r.y); }

  if(screen!=='play'){ ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#cfeaff'; ctx.font='600 34px ui-monospace,monospace'; ctx.fillText(screen==='title'?'C I P H E R':'D E C R Y P T E D',W/2,H*0.4);
    ctx.fillStyle='#5d7488'; ctx.font='13px ui-monospace,monospace';
    if(screen==='title'){ctx.fillText('один свободный узел против системы',W/2,H*0.4+38);ctx.fillStyle='#7dffb0';ctx.fillText('коснись — начать',W/2,H*0.4+72);}
    else{ctx.fillText(Math.floor(t/60)+'s · '+kills+' purged',W/2,H*0.4+38);ctx.fillStyle=t>=best?'#e8c97a':'#5d7488';ctx.fillText((t>=best?'НОВЫЙ РЕКОРД ':'РЕКОРД ')+Math.floor(best/60)+'s',W/2,H*0.4+64);ctx.fillStyle='#7dffb0';ctx.fillText('коснись — ещё раз',W/2,H*0.4+96);}
    requestAnimationFrame(loop); return; }

  const sk=hitstop>0?shake*0.3:shake; ctx.save(); ctx.translate((Math.random()-0.5)*sk,(Math.random()-0.5)*sk);
  ctx.globalCompositeOperation='lighter';
  // gems
  ctx.font='15px ui-monospace,monospace'; for(const g of gems){ const p=0.6+0.4*Math.sin(t*0.2+g.gt); ctx.fillStyle='rgba(232,201,122,'+p+')'; ctx.shadowColor=C_GEM;ctx.shadowBlur=8; ctx.fillText(g.g,g.x,g.y); } ctx.shadowBlur=0;
  // foes (glyphs)
  for(const f of foes){ const fl=f.flash>0; ctx.font='600 '+f.sz+'px ui-monospace,monospace'; ctx.fillStyle=fl?'#ffffff':f.col; ctx.shadowColor=f.col;ctx.shadowBlur=fl?16:7; ctx.fillText(f.gly,f.x,f.y);
    // hp tick for blocks
    if(f.k==='block'){ctx.shadowBlur=0;ctx.fillStyle='rgba(255,150,110,0.5)';ctx.fillRect(f.x-12,f.y+f.sz*0.55,24*(f.hp/f.mhp),2);} }
  ctx.shadowBlur=0;
  // shots
  ctx.font='600 14px ui-monospace,monospace'; ctx.fillStyle=C_SHOT; ctx.shadowColor=C_SHOT;ctx.shadowBlur=8; for(const s of shots){ ctx.fillText(s.g,s.x,s.y); } ctx.shadowBlur=0;
  // particles (death = decrypt scatter)
  for(const p of parts){ ctx.font='600 '+(p.sz*(0.5+p.life))+'px ui-monospace,monospace'; ctx.fillStyle='rgba('+(p.col===C_GEM?'232,201,122':p.col===C_HERO?'191,232,255':'255,90,60')+','+p.life+')'; ctx.fillText(p.g,p.x,p.y); }
  // hero — a glowing cipher-sigil with orbiting data glyphs
  const it=P.iframe>0&&Math.floor(t/3)%2===0;
  ctx.font='600 26px ui-monospace,monospace'; ctx.fillStyle=it?'#ffffff':C_HERO; ctx.shadowColor=C_HERO;ctx.shadowBlur=16; ctx.fillText('◈',P.x,P.y);
  ctx.font='12px ui-monospace,monospace'; ctx.fillStyle=C_HERO2; ctx.shadowBlur=8;
  for(let i=0;i<4;i++){ const a=t*0.05+i*1.57; ctx.globalAlpha=0.5+0.4*Math.sin(t*0.1+i); ctx.fillText(G(),P.x+Math.cos(a)*20,P.y+Math.sin(a)*20); }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  ctx.restore();
  ctx.globalCompositeOperation='source-over';
  // hp bar (thin, glyph-framed)
  ctx.fillStyle='rgba(255,60,50,0.18)';ctx.fillRect(14,H-30,180,4); ctx.fillStyle='#ff5a3c';ctx.fillRect(14,H-30,180*Math.max(0,P.hp/P.maxHp),4);
  ctx.fillStyle='rgba(159,233,255,0.18)';ctx.fillRect(14,H-22,180,4); ctx.fillStyle='#9fe9ff';ctx.fillRect(14,H-22,180*Math.min(1,P.xp/P.xpNext),4);
  // joystick
  if(stick.active){ctx.strokeStyle='rgba(159,233,255,0.25)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(stick.ox,stick.oy,56,0,7);ctx.stroke();ctx.fillStyle='rgba(159,233,255,0.4)';ctx.beginPath();ctx.arc(stick.ox+stick.dx*56,stick.oy+stick.dy*56,18,0,7);ctx.fill();}
  if(flash>0.01){ctx.fillStyle='rgba(255,50,40,'+(flash*0.3)+')';ctx.fillRect(0,0,W,H);}
  document.getElementById('time').textContent=Math.floor(t/60); document.getElementById('kills').textContent=kills; document.getElementById('lv').textContent=P.lv;
  requestAnimationFrame(loop);
}
function loop(){ if(screen==='play'){ if(hitstop>0)hitstop--; else update(); } draw(); }
screen='title'; P=freshP(); foes=[];shots=[];gems=[];parts=[];rain=[]; for(let i=0;i<70;i++)rain.push({x:rnd(0,W),y:rnd(0,H),g:G(),a:rnd(0.02,0.10),s:rnd(0.2,0.7),tt:Math.random()*40});
requestAnimationFrame(loop);
</script>
</body>
</html>
