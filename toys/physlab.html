<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PHYSLAB — настоящая физика байка (прототип)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{height:100%;background:#0a0a14;overflow:hidden;font-family:ui-monospace,monospace;touch-action:none;}
  #c{display:block;width:100vw;height:100vh;}
  #dbg{position:fixed;left:8px;top:env(safe-area-inset-top,8px);padding:6px 9px;background:rgba(8,10,22,0.62);
       color:#9fe8d0;font-size:11px;line-height:1.45;border-radius:8px;border:1px solid rgba(120,200,180,0.25);pointer-events:none;}
  #dbg b{color:#fff;} .warn{color:#ffd070;} .bad{color:#ff7a8a;}
  #hint{position:fixed;left:0;right:0;bottom:env(safe-area-inset-bottom,14px);text-align:center;color:rgba(180,200,225,0.62);font-size:11px;pointer-events:none;}
  #reset{position:fixed;right:10px;top:env(safe-area-inset-top,8px);padding:8px 12px;background:rgba(40,30,55,0.7);
         color:#cdb6ff;font-size:12px;border-radius:9px;border:1px solid rgba(150,120,210,0.4);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dbg">PHYSLAB</div>
<div id="reset">↻ сброс</div>
<div id="hint"><b>держи</b> = газ · <b>тяни влево/вправо</b> = вес/наклон (в воздухе — крути сальто)</div>
<script>
// ============================================================================
//  PHYSLAB — НАСТОЯЩЕЕ ТВЁРДОЕ ТЕЛО (rigid-body), как Gravity Defied / Trials.
//  Шасси (масса + момент инерции) + 2 колеса на пружинной подвеске (penalty-
//  контакт с грунтом) + момент двигателя на заднем колесе + гравитация на ЦТ +
//  вес райдера как момент тангажа. ВСЁ остальное (вылеты/сальто/посадки/баланс)
//  ЭМЕРДЖЕНТНО — никаких скриптов «прыжка». Это прототип ФИЗ-ЯДРА для оценки руками.
// ============================================================================
const BUILD='physlab b1 · 2026-06-23';
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

// ----------------------------- TUNE (все крутилки физики) --------------------
const TUNE = {
  // --- тело байка ---
  grav:        0.22,   // гравитация (px/кадр²). НИЖЕ = более «парящие» дуги/больше воздуха + легче лезет в горку (но менее весомо)
  mass:        1.0,    // масса шасси
  inertia:     150,    // момент инерции (сопротивление вращению). ВЫШЕ = лениво крутится, НИЖЕ = вертлявое сальто
  wheelBase:   50,     // расстояние между колёсами (px) — больше = устойчивее в тангаже
  wheelOffY:   12,     // насколько ЦТ выше оси колёс (px) — выше = легче опрокинуть (вилли/стоппи), ниже = устойчивее
  wheelR:      9,      // радиус колеса (px)
  // --- контакт колёс с грунтом (ПОДВЕСКА: пружина+демпфер) ---
  springK:     0.42,   // жёсткость подвески (выталкивает из грунта ∝ продавливанию). ВЫШЕ = жёстче/упруже, НИЖЕ = мягче/проваливается
  springC:     0.22,   // демпфер подвески (гасит удар посадки). ВЫШЕ = меньше отскок (мягче садится)
  // --- сцепление / тяга ---
  rollResist:  0.034,  // сопротивление КАЧЕНИЮ (колесо КАТИТСЯ, не скользит → слабое). ВЫШЕ = быстрее глохнет накатом / ниже круиз (~7-8vx → больше моментум в рампы = выше вылет)
  muGround:    1.55,   // макс. сила тяги/трения = это × прижатие (конус трения). Больше = лучше лезет в горку/держит, меньше = буксует
  engine:      0.62,   // СИЛА ДВИГАТЕЛЯ (тяга на заднем колесе при газе). Тяга снизу-сзади ЕСТЕСТВЕННО задирает нос (вилли) — реально. Выше = меньше глохнет в горку (но больше склонность к лупу)
  antiLoop:    0.07,    // ПРОЩЕНИЕ: мягкий возвратный момент, если нос задрался > loopLimit над склоном на земле → не уходит в бесконечный луп-аут. 0 = чистый GD (лупит насмерть)
  loopLimit:   0.95,    // порог (рад ≈ 54°) задирания носа над склоном, после которого включается antiLoop. Вилли до этого порога свободны
  airDrag:     0.992,  // аэродин. сопротивление (vx*=это в воздухе) — мягкий потолок скорости
  rollDrag:    0.997,  // качение на земле
  // --- райдер (вес/наклон = момент тангажа) ---
  leanGround:  0.014,  // авторитет наклона на ЗЕМЛЕ (перенос веса → тангаж). Меньше = вес «ленивее», больше = резче
  leanAir:     0.034,  // авторитет наклона в ВОЗДУХЕ (крутить сальто). Подгоним, чтоб сальто докручивалось за дугу
  riderSmooth: 0.22,   // инерция тела райдера (вход сглажен → масса с инерцией, не телепорт)
  angDamp:     0.992,  // угловое демпфирование (чуть гасит вращение для стабильности)
  // --- ПРОЩЕНИЕ (направление юзера: «реально, но прощающе») ---
  uprightAir:  0.030,  // авто-выравнивание к посадочному склону, когда НЕ держишь наклон (садится на колёса). ВЫШЕ = прощающе/всегда садится; держишь наклон = крутишь сальто (отключает)
  uprightDamp: 0.34,   // ГАШЕНИЕ вращения в воздухе, когда не держишь наклон (PD-демпфер) → отрывной спин затухает → садится ровно. Держишь наклон = выкл (сальто крутится)
  subSteps:    6,      // под-шаги физики за кадр (penalty-пружины стабильнее на мелком dt)
};

// ----------------------------- ТРАССА (heightfield) -------------------------
// Длинная процедурная трасса с ВАРИАЦИЯМИ: пологие холмы + рампы (вылеты) +
// обрывы (съезды) + бугры (whoops). Чтобы пощупать ВСЕ виды отрыва/полёта.
const DXT=8, NT=6000;                 // 48000px трассы, узел каждые 8px
const HF=new Float32Array(NT);
function buildTerrain(){
  const base=H*0.62;
  for(let i=0;i<NT;i++){ const x=i*DXT; HF[i]=base + Math.sin(x*0.0032)*46 + Math.sin(x*0.0091+1.3)*20 + Math.sin(x*0.021+0.5)*6; }
  // фичи периодически
  const seg=(cx,half,fn)=>{ const i0=Math.max(0,Math.floor((cx-half)/DXT)), i1=Math.min(NT-1,Math.ceil((cx+half)/DXT));
    for(let i=i0;i<=i1;i++){ const x=i*DXT, t=(x-(cx-half))/(2*half); HF[i]=fn(HF[i], clamp(t,0,1), x-cx); } };
  for(let fx=800; fx<48000; fx+=2000){
    seg(fx-40, 90,  (y,t)=> y + Math.sin(t*Math.PI)*24 );                       // ложбина-РАЗГОН перед кикером (вниз 24 → набираешь скорость)
    seg(fx+260, 130,(y,t)=> y - Math.sin(t*Math.PI)*44 );                       // КИКЕР-гребень: вверх 44px → вниз. На скорости ВЫЛЕТАЕШЬ с гребня (дуга ∝ скорости), но проходим по моменту
    seg(fx+780, 150,(y,t)=> y - Math.sin(t*Math.PI)*62 );                       // БОЛЬШОЙ КИКЕР: выше (62px) → вылет повыше для сальто
    seg(fx+1380,130,(y,t,dx)=> y - Math.sin(dx*0.058)*15*Math.sin(t*Math.PI) );// БУГРЫ: серия мелких гребней (скип по верхам)
  }
  // лёгкое сглаживание (убрать узловые изломы)
  for(let p=0;p<2;p++){ const c=HF.slice(); for(let i=1;i<NT-1;i++) HF[i]=(c[i-1]+c[i]*2+c[i+1])*0.25; }
}
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function smoothstep(t){ t=clamp(t,0,1); return t*t*(3-2*t); }
function lerp(a,b,t){ return a+(b-a)*t; }
function ground(x){ const fx=x/DXT; let i=Math.floor(fx); if(i<0)i=0; if(i>=NT-1)i=NT-2; return lerp(HF[i],HF[i+1],fx-i); }
function groundSlope(x){ return (ground(x+4)-ground(x-4))/8; }   // dy/dx
buildTerrain();

// ----------------------------- СОСТОЯНИЕ БАЙКА ------------------------------
const bike={};
function reset(){
  const x0=120;
  bike.cx=x0; bike.cy=ground(x0)-TUNE.wheelOffY-TUNE.wheelR-2;
  bike.vx=0; bike.vy=0; bike.ang=0; bike.av=0; bike.onG=true; bike.rShift=0;
  bike.airT=0; bike.flipAcc=0; bike.flips=0; bike.maxAir=0; bike.crashed=false; bike.crashT=0;
  cam.x=bike.cx-W*0.34; cam.y=bike.cy-H*0.5;
}
const cam={x:0,y:0};

// ----------------------------- ВВОД -----------------------------------------
let gas=false, lean=0;           // lean ∈ [-1(назад/нос вверх) .. +1(вперёд/нос вниз)]
let touchId=null, touchOX=0;
const LEANR=70;                  // px тяги = полный наклон
cv.addEventListener('touchstart',e=>{ for(const t of e.changedTouches){ if(touchId===null){ touchId=t.identifier; touchOX=t.clientX; lean=0; } } gas=true; e.preventDefault(); },{passive:false});
cv.addEventListener('touchmove',e=>{ for(const t of e.changedTouches){ if(t.identifier===touchId){ lean=clamp((t.clientX-touchOX)/LEANR,-1,1); } } e.preventDefault(); },{passive:false});
cv.addEventListener('touchend',e=>{ for(const t of e.changedTouches){ if(t.identifier===touchId){ touchId=null; lean=0; } } if(e.touches.length===0)gas=false; e.preventDefault(); },{passive:false});
cv.addEventListener('mousedown',e=>{ gas=true; touchId='m'; touchOX=e.clientX; lean=0; });
addEventListener('mousemove',e=>{ if(touchId==='m') lean=clamp((e.clientX-touchOX)/LEANR,-1,1); });
addEventListener('mouseup',()=>{ gas=false; touchId=null; lean=0; });
addEventListener('keydown',e=>{ if(e.key===' '){gas=true;e.preventDefault();} else if(e.key==='ArrowLeft')lean=-1; else if(e.key==='ArrowRight')lean=1; else if(e.key==='r')reset(); });
addEventListener('keyup',e=>{ if(e.key===' ')gas=false; else if(e.key==='ArrowLeft'||e.key==='ArrowRight')lean=0; });
document.getElementById('reset').addEventListener('click',reset);
document.getElementById('reset').addEventListener('touchstart',e=>{ e.stopPropagation(); reset(); },{passive:false});

// ----------------------------- ФИЗИКА (rigid-body) --------------------------
// Один под-шаг: суммируем силы/моменты → интегрируем (semi-implicit Euler).
function physSub(dt){
  const T=TUNE;
  let fx=0, fy=0, tq=0;
  fy += T.mass*T.grav;                                  // гравитация на ЦТ
  const ca=Math.cos(bike.ang), sa=Math.sin(bike.ang);
  const wheels=[ {ox:-T.wheelBase/2, drive:true}, {ox:+T.wheelBase/2, drive:false} ];  // заднее, переднее
  let onG=false, supN=0;
  for(const w of wheels){
    // мировая позиция ступицы (локально: вперёд = +x, вниз к колёсам = +y)
    const wx=bike.cx + w.ox*ca - T.wheelOffY*sa;
    const wy=bike.cy + w.ox*sa + T.wheelOffY*ca;
    const gy=ground(wx);
    const pen=(wy+T.wheelR)-gy;                         // низ колеса ниже грунта = продавливание
    if(pen>0){
      onG=true;
      const ga=Math.atan2(groundSlope(wx)*4*2, 8);      // угол склона (≈ atan2(dy,dx))
      const nx=Math.sin(ga), ny=-Math.cos(ga);          // нормаль наружу-вверх из грунта
      const tx=Math.cos(ga), ty=Math.sin(ga);           // касательная вперёд по склону
      const rx=wx-bike.cx, ry=wy-bike.cy;               // плечо от ЦТ к ступице
      const vpx=bike.vx - bike.av*ry, vpy=bike.vy + bike.av*rx;   // скорость материальной точки шасси в ступице
      const vn=vpx*nx+vpy*ny;                           // нормальная скорость (<0 = входит в грунт)
      let Fn=T.springK*pen - T.springC*vn; if(Fn<0)Fn=0;// ПРУЖИНА подвески − ДЕМПФЕР; грунт не тянет
      fx+=Fn*nx; fy+=Fn*ny; tq+=rx*(Fn*ny)-ry*(Fn*nx);  // прижатие + его момент
      supN+=Fn;
      // касательно: трение (гасит проскальзывание) + ТЯГА двигателя на заднем
      const vt=vpx*tx+vpy*ty;
      let Ft=-vt*T.rollResist;                          // КАЧЕНИЕ: слабое сопротивление (колесо катится, НЕ скользит вдоль)
      if(w.drive && gas) Ft += T.engine;                // газ → толчок вперёд снизу-сзади (нос задирается ЕСТЕСТВЕННО)
      const maxF=T.muGround*Fn; if(Ft>maxF)Ft=maxF; else if(Ft<-maxF)Ft=-maxF;  // конус трения
      fx+=Ft*tx; fy+=Ft*ty; tq+=rx*(Ft*ty)-ry*(Ft*tx);
    }
  }
  bike.onG=onG;
  // РАЙДЕР: перенос веса = момент тангажа. lean<0 = вес назад = нос ВВЕРХ (rShift сглажен раз/кадр в step())
  if(onG){ tq += bike.rShift * T.leanGround * T.inertia; }      // на земле: вес кренит тангаж (вилли/стоппи эмерджентно)
  else {
    tq += bike.rShift * T.leanAir * T.inertia;                  // в воздухе: крутим сальто весом
    if(Math.abs(bike.rShift)<0.15){                             // не держишь наклон = авто-выравнивание к ПОСАДОЧНОМУ склону (ПРОЩЕНИЕ — садится на колёса)
      const la=Math.atan(groundSlope(bike.cx+Math.max(20,bike.vx*8)));  // угол склона там, где сядешь
      let d=(la-bike.ang); while(d>Math.PI)d-=6.283; while(d<-Math.PI)d+=6.283;
      const near=clamp(1-(ground(bike.cx)-(bike.cy+T.wheelOffY+T.wheelR))/240,0,1);  // сильнее у земли
      tq += (d*T.uprightAir - bike.av*T.uprightDamp)*(0.4+near)*T.inertia;  // PD: целься в склон + ГАСИ спин → ровная посадка
    }
  }
  if(onG && T.antiLoop>0){   // ПРОЩЕНИЕ луп-аута: нос задрался над склоном > loopLimit → мягкий возврат (не уходит в бесконечный кувырок назад)
    const gs=Math.atan(groundSlope(bike.cx));
    let rp=bike.ang-gs; while(rp>Math.PI)rp-=6.283; while(rp<-Math.PI)rp+=6.283;
    if(rp<-T.loopLimit) tq += (-T.loopLimit-rp)*T.antiLoop*T.inertia;
    else if(rp>T.loopLimit) tq += (T.loopLimit-rp)*T.antiLoop*T.inertia;
  }
  // интегрируем (semi-implicit)
  bike.vx += (fx/T.mass)*dt; bike.vy += (fy/T.mass)*dt;
  bike.cx += bike.vx*dt;     bike.cy += bike.vy*dt;
  bike.av += (tq/T.inertia)*dt; bike.ang += bike.av*dt;
  return supN;
}
function step(){
  if(bike.crashed){ if(--bike.crashT<=0){ reset(); } return; }
  bike.rShift=lerp(bike.rShift, lean, TUNE.riderSmooth);   // тело райдера с инерцией (раз/кадр)
  const N=TUNE.subSteps, dt=1/N;
  let sup=0;
  for(let s=0;s<N;s++) sup=physSub(dt);
  bike.vx *= bike.onG?TUNE.rollDrag:TUNE.airDrag;          // drag раз/кадр (не в под-шаге!)
  bike.av *= TUNE.angDamp;                                  // угл. демпфер раз/кадр
  // воздух / сальто учёт
  if(!bike.onG){ bike.airT++; bike.flipAcc+=Math.abs(bike.av); if(bike.flipAcc>6.2832){bike.flipAcc-=6.2832;bike.flips++;}
    const h=ground(bike.cx)-(bike.cy+TUNE.wheelOffY+TUNE.wheelR); if(h>bike.maxAir)bike.maxAir=h; }
  else { if(bike.airT>6){ bike.lastAir=bike.airT; bike.lastFlips=bike.flips; } bike.airT=0; bike.flipAcc=0; bike.flips=0; bike.maxAir=0; }
  // КРАШ (прощающе): только если приземлился сильно ВВЕРХ НОГАМИ. Иначе просто кувыркается и едет дальше.
  let rel=bike.ang; while(rel>Math.PI)rel-=6.283; while(rel<-Math.PI)rel+=6.283;
  if(bike.onG && Math.abs(rel)>2.3 && Math.abs(bike.av)<0.05){ bike.crashed=true; bike.crashT=26; }
  // упал с мира
  if(bike.cy>ground(bike.cx)+400) { bike.crashed=true; bike.crashT=14; }
  // камера
  cam.x += ((bike.cx-W*0.34)-cam.x)*0.10;
  cam.y += ((bike.cy-H*0.52)-cam.y)*0.06;
}

// ----------------------------- РЕНДЕР ---------------------------------------
function draw(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#11132a'); g.addColorStop(0.6,'#1a1330'); g.addColorStop(1,'#080610');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.translate(-cam.x,-cam.y);
  // трасса
  const x0=cam.x-20, x1=cam.x+W+20;
  ctx.beginPath(); ctx.moveTo(x0, ground(x0));
  for(let x=x0; x<=x1; x+=6) ctx.lineTo(x, ground(x));
  ctx.lineTo(x1, cam.y+H+300); ctx.lineTo(x0, cam.y+H+300); ctx.closePath();
  const gf=ctx.createLinearGradient(0,cam.y,0,cam.y+H); gf.addColorStop(0,'rgba(40,46,78,1)'); gf.addColorStop(1,'rgba(8,7,18,1)');
  ctx.fillStyle=gf; ctx.fill();
  ctx.beginPath(); ctx.moveTo(x0,ground(x0)); for(let x=x0;x<=x1;x+=6) ctx.lineTo(x,ground(x));
  ctx.strokeStyle='#46e6c0'; ctx.lineWidth=2.4; ctx.shadowColor='#46e6c0'; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
  // байк (рисуем реальное твёрдое тело: шасси между колёсами + 2 колеса на их позициях)
  const ca=Math.cos(bike.ang), sa=Math.sin(bike.ang);
  const wb=TUNE.wheelBase/2, oy=TUNE.wheelOffY, R=TUNE.wheelR;
  const rwx=bike.cx-wb*ca-oy*sa, rwy=bike.cy-wb*sa+oy*ca;   // заднее колесо (центр)
  const fwx=bike.cx+wb*ca-oy*sa, fwy=bike.cy+wb*sa+oy*ca;   // переднее
  // суспензия/рама
  ctx.strokeStyle=bike.crashed?'#ff6a86':'#cfe0ff'; ctx.lineWidth=3.2;
  ctx.beginPath(); ctx.moveTo(rwx,rwy); ctx.lineTo(bike.cx,bike.cy-2); ctx.lineTo(fwx,fwy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rwx,rwy); ctx.lineTo(fwx,fwy); ctx.lineWidth=2; ctx.strokeStyle='rgba(150,180,230,0.6)'; ctx.stroke();
  // колёса
  for(const [wx,wy] of [[rwx,rwy],[fwx,fwy]]){
    ctx.beginPath(); ctx.arc(wx,wy,R,0,6.2832); ctx.strokeStyle='#9fd0ff'; ctx.lineWidth=2.6; ctx.stroke();
    ctx.beginPath(); ctx.arc(wx,wy,R*0.4,0,6.2832); ctx.fillStyle='rgba(120,160,210,0.5)'; ctx.fill();
  }
  // райдер (тело смещается с переносом веса)
  const seatx=bike.cx - bike.rShift*5*ca, seaty=bike.cy-2 - 14*ca;
  ctx.fillStyle=bike.crashed?'#ff9fb0':'#ffd070';
  ctx.beginPath(); ctx.arc(seatx-bike.rShift*6*ca, seaty-10, 5, 0, 6.2832); ctx.fill();   // голова
  ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=3.4; ctx.beginPath(); ctx.moveTo(bike.cx-2*ca,bike.cy-4); ctx.lineTo(seatx-bike.rShift*6*ca,seaty-8); ctx.stroke(); // тело
  ctx.restore();
}

// ----------------------------- DEBUG / LOOP ---------------------------------
const dbg=document.getElementById('dbg');
let fpsT=performance.now(), fpsN=0, fps=0;
function dbgTick(){
  fpsN++; const now=performance.now(); if(now-fpsT>=500){ fps=Math.round(fpsN*1000/(now-fpsT)); fpsN=0; fpsT=now; }
  let rel=bike.ang; while(rel>Math.PI)rel-=6.283; while(rel<-Math.PI)rel+=6.283;
  const kmh=Math.round(bike.vx*12);
  dbg.innerHTML='<b>'+BUILD+'</b><br>'
    +'<b>'+fps+'</b>fps · <b>'+kmh+'</b>км/ч · '+(bike.onG?'<span style="color:#8fe0b0">GROUND</span>':'<span class="warn">AIR</span>')+'<br>'
    +'угол '+(rel*57|0)+'° · вес '+bike.rShift.toFixed(2)+'<br>'
    +'дист <b>'+Math.round(bike.cx/10)+'</b>м · возд '+Math.round(bike.maxAir)+'px'
    +(bike.lastFlips?(' · <span style="color:#9ff0ff">сальто ×'+bike.lastFlips+'</span>'):'')
    +(bike.crashed?' · <span class="bad">КУВЫРОК</span>':'');
}
function loop(){ requestAnimationFrame(loop); try{ step(); draw(); dbgTick(); }catch(e){ if(!loop._e){loop._e=1;console.error('physlab',e);} } }
reset(); requestAnimationFrame(loop);
</script>
</body>
</html>
