<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CIPHER // SIGNAL — v8 (action core)</title>
<style>
  html,body{margin:0;height:100%;background:#04060a;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;cursor:crosshair;
    touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  #dashbtn{display:none;position:fixed;right:22px;bottom:70px;width:92px;height:92px;border-radius:50%;
    border:2px solid #9fe9ff;color:#9fe9ff;align-items:center;justify-content:center;font-size:14px;font-weight:600;
    letter-spacing:.12em;background:rgba(159,233,255,0.10);z-index:10;touch-action:none;}
  #dashbtn:active{background:rgba(159,233,255,0.28);}
  canvas{display:block;}
  #hud{position:fixed;top:14px;left:16px;color:#5f7488;font-size:12px;letter-spacing:.1em;line-height:1.6;pointer-events:none;user-select:none;}
  #hud .t{color:#e8f6ff;font-size:13px;letter-spacing:.2em;} #hud .free{color:#54e6c8;}
  #hud .sec{color:#e8f6ff;font-size:26px;font-weight:600;line-height:1.1;} #hud .streak{color:#ffd76a;font-size:15px;font-weight:600;} #hud .best{color:#5f7488;font-size:11px;}
  .bar{position:fixed;right:16px;width:160px;height:8px;border:1px solid #1d2a38;border-radius:4px;overflow:hidden;} .bar > i{display:block;height:100%;width:0%;}
  #expbar{top:18px;} #expbar > i{background:#3fb0ff;} #livebar{top:48px;} #livebar > i{background:#ffb13d;} #dashbar{top:78px;} #dashbar > i{background:#9fe9ff;}
  .lbl{position:fixed;right:182px;font-size:10px;letter-spacing:.16em;color:#3c4c5e;text-align:right;white-space:nowrap;} #expl{top:16px;} #livel{top:46px;color:#7a5a2a;} #dashl{top:76px;}
  #hint{position:fixed;bottom:14px;left:0;width:100%;text-align:center;color:#3c4c5e;font-size:11px;letter-spacing:.13em;pointer-events:none;user-select:none;}
  #hint b{color:#7fd6ff;} #hint .d{color:#ff7d94;} #hint .g{color:#ffd76a;} #hint .y{color:#9fe9ff;}
  #big{position:fixed;top:36%;left:0;width:100%;text-align:center;font-size:22px;letter-spacing:.28em;pointer-events:none;user-select:none;opacity:0;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="t">CIPHER<span style="color:#33424f"> // </span><span class="free">SIGNAL</span></div>
  <div class="best">SECURED</div><div class="sec" id="secured">0</div>
  <div class="streak" id="streak">STREAK ×1.0</div>
  <div class="best" id="best">BEST 0</div>
  <div id="state" style="margin-top:4px">— dark</div>
</div>
<div class="lbl" id="expl">EXPOSURE</div><div class="bar" id="expbar"><i></i></div>
<div class="lbl" id="livel">LIVE ⟶ bank!</div><div class="bar" id="livebar"><i></i></div>
<div class="lbl" id="dashl">DASH</div><div class="bar" id="dashbar"><i></i></div>
<div id="hint"></div>
<div id="dashbtn">DASH</div>
<div id="big"></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d'); let W,H,DPR;
function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=innerWidth;H=innerHeight; cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

const SPEED_VIS=6, SENSE_R=230, CAP_R=20, PATROL=1.15, SEARCH=2.0, HUNT=2.3, THRESH=0.32, LIVE_MAX=160;
const DASH_SPD=15, DASH_T=8, DASH_CD=34;
const CHARGE_T=48, BEAM_T=13, FIRE_CD=46, BEAM_LEN=460, BEAM_W=12;

let player, hunters, data=null, beams=[];
let live=0, streak=1, secured=0, best=0, idleDark=0, wave=0, nextWave=250;
let rings=[], parts=[], pops=[], afterimg=[], flash=0, bankFlash=0, shake=0, slowmo=0, closeCallCd=0, big={t:0,txt:'',c:'#7dffb0'};
let mouse={x:0,y:0,inside:false}, hold=false, t=0, lf=0, started=false, runOver=false;
try{ best=+localStorage.getItem('cipher_best8')||0; }catch(e){}

addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.inside=true;});
addEventListener('mouseleave',()=>{mouse.inside=false;hold=false;});
addEventListener('mousedown',e=>{ if(e.button!==0)return; resumeAudio(); if(!started||runOver){startRun();return;} hold=true; });
addEventListener('mouseup',e=>{ if(e.button===0)hold=false; });
addEventListener('contextmenu',e=>{e.preventDefault(); if(started&&!runOver)dash();});
addEventListener('keydown',e=>{ if(e.code==='Space'){ e.preventDefault(); resumeAudio(); if(!started||runOver){startRun();return;} dash(); } });
addEventListener('touchstart',e=>{const tt=e.touches[0];mouse.x=tt.clientX;mouse.y=tt.clientY;mouse.inside=true;resumeAudio(); if(!started||runOver){startRun();e.preventDefault();return;} hold=true; if(e.touches.length>1)dash(); e.preventDefault();},{passive:false});
addEventListener('touchmove',e=>{const tt=e.touches[0];mouse.x=tt.clientX;mouse.y=tt.clientY;e.preventDefault();},{passive:false});
addEventListener('touchend',()=>hold=false);
// on-screen DASH button (mobile): one thumb drags to move, the other taps DASH
(function(){ const db=document.getElementById('dashbtn'); if('ontouchstart'in window||navigator.maxTouchPoints>0) db.style.display='flex';
  const act=e=>{ e.preventDefault(); e.stopPropagation(); resumeAudio(); if(!started||runOver){startRun();} else dash(); };
  db.addEventListener('touchstart',act,{passive:false}); db.addEventListener('mousedown',act); })();

function rnd(a,b){return a+Math.random()*(b-a);} function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function startRun(){ started=true; runOver=false; player={x:W*0.5,y:H*0.8,vx:0,vy:0,vis:0,wasLit:false,face:-1.57,sq:1,trail:[],dashT:0,dashCd:0,dashDir:0};
  hunters=[]; for(let i=0;i<3;i++)addHunter(); data=null; beams=[]; live=0;streak=1;secured=0;idleDark=0;wave=0;nextWave=250;slowmo=0;closeCallCd=0; rings=[];parts=[];pops=[];afterimg=[]; spawnData(); updateHint(); }
function addHunter(){ hunters.push({x:rnd(W*0.15,W*0.85),y:rnd(H*0.2,H*0.55),vx:0,vy:0,mode:'patrol',wander:{x:rnd(W*0.15,W*0.85),y:rnd(H*0.18,H*0.62)},lastSeen:null,alert:0,face:0,iris:rnd(0,6),blink:0,stun:0,dil:0,charge:0,firing:0,fireCd:rnd(0,40),aim:0}); }
function spawnData(){ let bx=W*0.5,by=H*0.4,bd=-1; for(let k=0;k<8;k++){const x=rnd(W*0.15,W*0.85),y=rnd(H*0.2,H*0.62);let s=0;for(const h of hunters)s+=1/(1+dist({x,y},h)*0.01);if(s>bd){bd=s;bx=x;by=y;}} data={x:bx,y:by,pulse:rnd(0,6)}; }

let actx;
function resumeAudio(){ try{actx=actx||new(window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume();}catch(e){} }
function beep(f,dur,vol,type){ try{ actx=actx||new(window.AudioContext||window.webkitAudioContext)(); const o=actx.createOscillator(),g=actx.createGain(); o.frequency.value=f;o.type=type||'sine'; g.gain.setValueAtTime(0.0001,actx.currentTime); g.gain.exponentialRampToValueAtTime(vol,actx.currentTime+0.01); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur); o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+dur+0.02);}catch(e){} }
function chord(b,n){for(let i=0;i<n;i++)beep(b*Math.pow(1.18,i),0.12,0.06,'triangle');}

function dash(){ if(player.dashCd>0||player.dashT>0)return; const sp=Math.hypot(player.vx,player.vy);
  player.dashDir = sp>0.6?Math.atan2(player.vy,player.vx):(mouse.inside?Math.atan2(mouse.y-player.y,mouse.x-player.x):player.face);
  player.dashT=DASH_T; player.dashCd=DASH_CD; beep(520,0.12,0.09,'sawtooth'); beep(720,0.1,0.05,'sine'); }
function burst(x,y,n,c,sp){for(let i=0;i<n;i++){const a=Math.random()*6.28,s=rnd(0.6,sp);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c});}}
function pop(x,y,txt,c){pops.push({x,y,txt,c:c||'255,225,140',life:1});}
function showBig(s,c){big.t=46;big.txt=s;big.c=c||'#7dffb0';}
function beamHit(px,py,ox,oy,ang,len,w){ const dx=Math.cos(ang),dy=Math.sin(ang); const tt=(px-ox)*dx+(py-oy)*dy; if(tt<0||tt>len)return false; const cx=ox+dx*tt,cy=oy+dy*tt; return Math.hypot(px-cx,py-cy)<w; }

function scramble(h){ h.stun=100; h.firing=0; h.charge=0; h.mode='patrol'; h.lastSeen=null; const a=Math.atan2(h.y-player.y,h.x-player.x); h.vx+=Math.cos(a)*6; h.vy+=Math.sin(a)*6;
  const g=Math.round(60*streak); secured+=g; streak+=0.5; pop(h.x,h.y-18,'SCRAMBLE +'+g,'159,235,255'); burst(h.x,h.y,14,'159,235,255',4); beep(300,0.12,0.08,'sawtooth'); }

function update(){
  t++; if(closeCallCd>0)closeCallCd--;
  // ---- player move ----
  if(player.dashT>0){ player.dashT--; player.vx=Math.cos(player.dashDir)*DASH_SPD; player.vy=Math.sin(player.dashDir)*DASH_SPD; if(t%1===0)afterimg.push({x:player.x,y:player.y,face:player.face,life:1}); }
  else { if(hold&&mouse.inside){const dx=mouse.x-player.x,dy=mouse.y-player.y;player.vx+=dx*0.011;player.vy+=dy*0.011;player.vx*=0.87;player.vy*=0.87;} else {player.vx*=0.74;player.vy*=0.74;} }
  if(player.dashCd>0)player.dashCd--;
  const iframe=player.dashT>0;
  player.x+=player.vx; player.y+=player.vy; player.x=Math.max(12,Math.min(W-12,player.x)); player.y=Math.max(12,Math.min(H-12,player.y));
  const speed=Math.hypot(player.vx,player.vy);
  if(speed>0.4)player.face+=(Math.atan2(player.vy,player.vx)-player.face)*0.3;
  player.sq+=((1+Math.min(0.6,speed*0.05))-player.sq)*0.3;
  const target=Math.min(1,speed/SPEED_VIS);
  player.vis+=(target>player.vis?(target-player.vis)*0.4:(target-player.vis)*0.085); player.vis=Math.max(0,Math.min(1,player.vis));
  const lit=player.vis>THRESH || iframe && player.vis>0.2;  // dashing keeps you a bit visible
  player.trail.push({x:player.x,y:player.y,v:player.vis}); if(player.trail.length>20)player.trail.shift();

  let prox=0,huntingClose=false;
  for(const h of hunters){ if(h.stun>0)continue; const d=dist(h,player); const p=Math.max(0,(SENSE_R-d)/SENSE_R); if(p>prox)prox=p; if(h.mode==='hunt'&&d<SENSE_R)huntingClose=true; }

  // ---- greed ----
  const realLit=player.vis>THRESH;
  if(realLit){ idleDark=0; let danger=0.5+prox*2.4*(huntingClose?1.5:1); live+=danger; streak+=0.0007*danger; }
  else { idleDark++; if(idleDark>100)streak=Math.max(1,streak-0.012); }
  if(player.wasLit&&!realLit){
    const lockedOn=hunters.filter(h=>h.mode==='hunt').length; let nh=1e9; for(const h of hunters)if(h.mode==='hunt'){const d=dist(h,player);if(d<nh)nh=d;}
    if(live>2){ let gain=Math.round(live*streak);
      if(lockedOn>0){const b=Math.round(lockedOn*45*streak);gain+=b;streak+=lockedOn;pop(player.x,player.y-18,'SLIPPED ×'+lockedOn+' +'+gain,'120,255,176');chord(540,Math.min(5,2+lockedOn));}
      else {pop(player.x,player.y-18,'+'+gain,'255,225,140');beep(720,0.1,0.07,'triangle');}
      secured+=gain;streak+=0.5;bankFlash=1;
      if(lockedOn>0&&nh<120&&closeCallCd<=0){slowmo=16;closeCallCd=110;pop(player.x,player.y-40,'CLOSE CALL!','180,230,255');beep(320,0.22,0.08);streak+=0.5;bankFlash=1.6;}
    }
    live=0;
  }
  player.wasLit=realLit;

  // ---- watchers (chase + FIRE beams) ----
  for(const h of hunters){
    let tgt,mode,spd;
    if(h.stun>0){ h.stun--; mode='patrol'; if(!h.wander||dist(h,h.wander)<30)h.wander={x:rnd(W*0.12,W*0.88),y:rnd(H*0.18,H*0.62)};tgt=h.wander;spd=PATROL; h.charge=Math.max(0,h.charge-0.1); }
    else { const dP=dist(h,player);
      if(lit&&dP<SENSE_R){tgt={x:player.x,y:player.y};mode='hunt';h.lastSeen={x:player.x,y:player.y};if(h.mode!=='hunt'){h.alert=1;beep(940,0.06,0.05,'square');}}
      else if((h.mode==='hunt'||h.mode==='search')&&h.lastSeen){mode='search';tgt=h.lastSeen;if(dist(h,h.lastSeen)<26){mode='patrol';h.wander={x:rnd(W*0.12,W*0.88),y:rnd(H*0.18,H*0.62)};h.lastSeen=null;}}
      else {mode='patrol';if(!h.wander||dist(h,h.wander)<30)h.wander={x:rnd(W*0.12,W*0.88),y:rnd(H*0.18,H*0.62)};tgt=h.wander;}
      spd=mode==='patrol'?PATROL:mode==='search'?SEARCH:HUNT;
      // firing logic
      if(mode==='hunt'){ if(h.fireCd>0)h.fireCd--; else if(h.firing<=0){ h.charge+=1/CHARGE_T; if(h.charge>=1){ h.firing=BEAM_T; h.aim=Math.atan2(player.y-h.y,player.x-h.x); h.charge=0; h.fireCd=FIRE_CD; beep(180,0.18,0.08,'sawtooth'); beams.push({life:6}); } } }
      else h.charge=Math.max(0,h.charge-0.06);
    }
    h.mode=mode;
    const a=Math.atan2(tgt.y-h.y,tgt.x-h.x); const da=((a-h.face+Math.PI*3)%(Math.PI*2))-Math.PI; h.face+=da*0.16;
    h.vx+=Math.cos(a)*spd*0.16; h.vy+=Math.sin(a)*spd*0.16;
    for(const o of hunters){if(o===h)continue;const d=dist(h,o);if(d<46&&d>0){h.vx+=(h.x-o.x)/d*0.25;h.vy+=(h.y-o.y)/d*0.25;}}
    h.vx*=0.9;h.vy*=0.9; const sp2=Math.hypot(h.vx,h.vy); if(sp2>spd){h.vx=h.vx/sp2*spd;h.vy=h.vy/sp2*spd;}
    h.x+=h.vx;h.y+=h.vy; if(h.x<14||h.x>W-14){h.vx*=-1;h.x=Math.max(14,Math.min(W-14,h.x));} if(h.y<14||h.y>H-14){h.vy*=-1;h.y=Math.max(14,Math.min(H-14,h.y));}
    h.alert*=0.94; h.iris+=0.02+(mode==='hunt'?0.06:0); h.dil+=((mode==='hunt'?1:0)-h.dil)*0.2; if(mode==='patrol')h.blink=(h.blink+1)%220;else h.blink=20;
    // beam active -> hit test
    if(h.firing>0){ h.firing--; if(!iframe && beamHit(player.x,player.y,h.x,h.y,h.aim,BEAM_LEN,BEAM_W)) caught(); }
    // contact capture
    if(!iframe && h.stun<=0 && dist(h,player)<CAP_R) caught();
    // DASH-STRIKE: dashing through a watcher scrambles it
    if(iframe && h.stun<=0 && dist(h,player)<26) scramble(h);
  }

  if(data){ data.pulse+=0.05; if(dist(player,data)<20){ const g=Math.round(120*streak); secured+=g; streak+=1; pop(data.x,data.y,'DATA +'+g,'255,225,140'); chord(660,3); burst(data.x,data.y,14,'255,215,106',3); spawnData(); } }
  while(secured>=nextWave){ wave++; nextWave=Math.round(nextWave*1.85); if(hunters.length<7){addHunter();showBig('WATCHER +1','#ff9a3d');beep(200,0.2,0.08,'sawtooth');} }

  for(const r of rings){r.r+=2.4;r.life-=0.03;} rings=rings.filter(r=>r.life>0);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life-=0.025;} parts=parts.filter(p=>p.life>0);
  for(const p of pops){p.y-=0.7;p.life-=0.018;} pops=pops.filter(p=>p.life>0);
  for(const a of afterimg){a.life-=0.08;} afterimg=afterimg.filter(a=>a.life>0);
  for(const b of beams){b.life--;} beams=beams.filter(b=>b.life>0);
  flash*=0.88; bankFlash*=0.9; shake*=0.85; if(big.t>0)big.t--;
}

function caught(){ flash=1;shake=22; beep(120,0.25,0.12,'square');beep(80,0.35,0.1,'square'); burst(player.x,player.y,28,'255,90,120',6); live=0;runOver=true;pops=[];big.t=0;slowmo=0; if(secured>best){best=secured;try{localStorage.setItem('cipher_best8',best);}catch(e){}} }

function updateHint(){ document.getElementById('hint').innerHTML='<b>HOLD</b> move = expose &nbsp;·&nbsp; <b>RELEASE</b> go dark = <span class="g">BANK</span> &nbsp;·&nbsp; <span class="y">[SPACE] DASH</span> — dodge beams (i-frames) &amp; dash THROUGH a Watcher to scramble &nbsp;·&nbsp; <span class="d">don\'t get hit</span>'; }

// ===== render =====
function bg(){ ctx.globalCompositeOperation='source-over';ctx.fillStyle='#04060a';ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='lighter';ctx.strokeStyle='rgba(40,90,110,0.06)';ctx.lineWidth=1;const g=46,ph=(t*0.25)%g;
  for(let x=-g+ph;x<W;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let y=-g+ph;y<H;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();} }
function drawPlayer(){ const v=player.vis,p=player,iframe=p.dashT>0;
  for(const a of afterimg){ ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.face);ctx.fillStyle=`rgba(159,235,255,${a.life*0.5})`;ctx.beginPath();ctx.moveTo(11,0);ctx.lineTo(-7,6);ctx.lineTo(-7,-6);ctx.closePath();ctx.fill();ctx.restore(); }
  for(let i=1;i<p.trail.length;i++){const a=p.trail[i-1],b=p.trail[i];const f=i/p.trail.length;ctx.strokeStyle=`rgba(${90+v*60},${200+v*40},255,${f*(0.12+v*0.4)})`;ctx.lineWidth=f*(2+v*5);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  ctx.save();ctx.translate(p.x,p.y); if(v>0.05){ctx.fillStyle=`hsla(${200-v*200},100%,${30+v*45}%,${v*0.30})`;ctx.beginPath();ctx.arc(0,0,12+v*30,0,7);ctx.fill();}
  const ghost=1-v; if(ghost>0.15&&!iframe){for(let i=0;i<8;i++){const an=i/8*6.28+t*0.04,rr=9+Math.sin(t*0.08+i)*3;ctx.fillStyle=`rgba(120,200,230,${ghost*0.5})`;ctx.beginPath();ctx.arc(Math.cos(an)*rr,Math.sin(an)*rr,1.6,0,7);ctx.fill();}}
  ctx.rotate(p.face);ctx.scale(p.sq,2-p.sq); ctx.fillStyle= iframe?'rgba(200,250,255,0.95)':`hsla(${200-v*200},100%,${62+v*28}%,${0.5+v*0.5})`; ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(-7,6);ctx.lineTo(-3,0);ctx.lineTo(-7,-6);ctx.closePath();ctx.fill();
  ctx.restore(); ctx.fillStyle= iframe?'rgba(255,255,255,0.95)':`hsla(${200-v*200},100%,${70+v*25}%,${0.55+v*0.45})`;ctx.beginPath();ctx.arc(p.x,p.y,3+v*2,0,7);ctx.fill(); }
function drawWatcher(h){ const col=h.stun>0?'90,120,150':h.firing>0?'255,40,60':h.mode==='hunt'?'255,70,90':h.mode==='search'?'255,140,60':'90,200,210';
  ctx.strokeStyle=`rgba(${col},${h.mode==='patrol'?0.05:0.12})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(h.x,h.y,SENSE_R,0,7);ctx.stroke();
  // telegraph (charging) — thin tracking line
  if(h.charge>0&&h.firing<=0){ const a=Math.atan2(player.y-h.y,player.x-h.x); ctx.strokeStyle=`rgba(255,80,90,${0.2+h.charge*0.5})`;ctx.lineWidth=1+h.charge*2;ctx.setLineDash([6,6]);ctx.beginPath();ctx.moveTo(h.x,h.y);ctx.lineTo(h.x+Math.cos(a)*BEAM_LEN,h.y+Math.sin(a)*BEAM_LEN);ctx.stroke();ctx.setLineDash([]); }
  // BEAM (firing) — thick bright line
  if(h.firing>0){ const ex=h.x+Math.cos(h.aim)*BEAM_LEN,ey=h.y+Math.sin(h.aim)*BEAM_LEN;
    ctx.strokeStyle='rgba(255,60,80,0.35)';ctx.lineWidth=BEAM_W*2;ctx.beginPath();ctx.moveTo(h.x,h.y);ctx.lineTo(ex,ey);ctx.stroke();
    ctx.strokeStyle='rgba(255,200,210,0.95)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(h.x,h.y);ctx.lineTo(ex,ey);ctx.stroke(); }
  ctx.save();ctx.translate(h.x,h.y); ctx.fillStyle=`rgba(${col},${0.12+h.alert*0.2+(h.firing>0?0.3:0)})`;ctx.beginPath();ctx.arc(0,0,17+h.alert*6,0,7);ctx.fill();
  const open=h.mode==='patrol'?(h.blink>6?1:0.15):1;ctx.scale(1,open); ctx.fillStyle=`rgba(${col},0.22)`;ctx.beginPath();ctx.arc(0,0,12,0,7);ctx.fill(); ctx.strokeStyle=`rgba(${col},0.9)`;ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(0,0,11.5,0,7);ctx.stroke();
  ctx.strokeStyle=`rgba(${col},0.7)`;ctx.lineWidth=2;for(let i=0;i<6;i++){const a=h.iris+i/6*6.28;ctx.beginPath();ctx.arc(0,0,7,a,a+0.5);ctx.stroke();}
  const pr=2.4+h.dil*2.4;ctx.fillStyle=`rgba(${col},1)`;ctx.beginPath();ctx.arc(Math.cos(h.face)*3.5,Math.sin(h.face)*3.5,pr,0,7);ctx.fill(); ctx.restore();
  if(h.stun>0){ctx.fillStyle='rgba(159,235,255,0.9)';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText('✕',h.x,h.y-18);} }
function draw(){ bg(); ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  if(!started){ ctx.globalCompositeOperation='source-over';ctx.fillStyle='#e8f6ff';ctx.textAlign='center';ctx.font='600 30px monospace';ctx.letterSpacing='10px';ctx.fillText('SIGNAL',W/2,H*0.42);
    ctx.fillStyle='#5f7488';ctx.font='13px monospace';ctx.letterSpacing='2px';ctx.fillText('move to steal · go dark to bank · SPACE to dash',W/2,H*0.42+34);
    ctx.fillStyle='#7dffb0';ctx.fillText('click / SPACE to start',W/2,H*0.42+64);ctx.letterSpacing='0px'; return; }
  ctx.globalCompositeOperation='lighter';
  if(data){const pr=8+Math.sin(data.pulse)*2; ctx.fillStyle='rgba(255,215,106,0.15)';ctx.beginPath();ctx.arc(data.x,data.y,pr+8,0,7);ctx.fill(); ctx.save();ctx.translate(data.x,data.y);ctx.rotate(data.pulse*0.5);ctx.fillStyle='rgba(255,225,140,0.95)';ctx.fillRect(-pr*0.3,-pr*0.3,pr*0.6,pr*0.6);ctx.strokeStyle='rgba(255,225,140,0.7)';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(0,0,pr,0,7);ctx.stroke();ctx.restore();}
  for(const r of rings){ctx.strokeStyle=`rgba(${r.c},${r.life*0.5})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,7);ctx.stroke();}
  for(const p of parts){ctx.fillStyle=`rgba(${p.c},${p.life})`;ctx.beginPath();ctx.arc(p.x,p.y,1.4+p.life*2,0,7);ctx.fill();}
  for(const h of hunters)drawWatcher(h); drawPlayer();
  ctx.globalCompositeOperation='source-over';
  for(const p of pops){ctx.fillStyle=`rgba(${p.c},${p.life})`;ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText(p.txt,p.x,p.y);}
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  if(slowmo>0){ctx.fillStyle='rgba(120,180,255,0.06)';ctx.fillRect(0,0,W,H);}
  if(bankFlash>0.01){ctx.fillStyle=`rgba(125,255,176,${bankFlash*0.10})`;ctx.fillRect(0,0,W,H);}
  if(flash>0.01){ctx.fillStyle=`rgba(255,40,70,${flash*0.4})`;ctx.fillRect(0,0,W,H);}
  if(runOver){ ctx.fillStyle='rgba(4,6,10,0.72)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
    ctx.fillStyle='#ff6d84';ctx.font='600 30px monospace';ctx.letterSpacing='8px';ctx.fillText('HIT',W/2,H*0.4);
    ctx.fillStyle='#e8f6ff';ctx.font='600 44px monospace';ctx.letterSpacing='2px';ctx.fillText(secured,W/2,H*0.5);ctx.fillStyle='#5f7488';ctx.font='13px monospace';ctx.letterSpacing='3px';ctx.fillText('SECURED',W/2,H*0.5+26);
    ctx.fillStyle=secured>=best?'#ffd76a':'#5f7488';ctx.fillText((secured>=best?'NEW BEST  ':'BEST  ')+best,W/2,H*0.58);
    ctx.fillStyle='#7dffb0';ctx.font='13px monospace';ctx.fillText('click / SPACE — run again',W/2,H*0.66);ctx.letterSpacing='0px'; }
  // hud
  document.querySelector('#expbar > i').style.width=(player.vis*100)+'%'; document.querySelector('#expbar > i').style.background=player.vis>THRESH?'#ff9a3d':'#3fb0ff';
  document.querySelector('#livebar > i').style.width=Math.min(100,live/LIVE_MAX*100)+'%';
  const df=document.querySelector('#dashbar > i'); df.style.width=(100*(1-player.dashCd/DASH_CD))+'%'; df.style.background=player.dashCd>0?'#3c4c5e':'#9fe9ff';
  document.getElementById('secured').textContent=secured;
  const st=document.getElementById('streak');st.textContent='STREAK ×'+streak.toFixed(1);st.style.color=streak>=3?'#ff9a3d':streak>=2?'#ffd76a':'#bda86a';
  document.getElementById('best').textContent='BEST '+best;
  document.getElementById('state').innerHTML=player.dashT>0?'<b style="color:#9fe9ff">⟫ dashing</b>':player.vis>THRESH?'<b style="color:#ff9a3d">◉ exposed</b>':'<b style="color:#3fb0ff">— dark</b>';
  const be=document.getElementById('big');be.textContent=big.txt;be.style.opacity=big.t>0?Math.min(1,big.t/24):0;be.style.color=big.c;
}
function loop(){ if(started&&!runOver){ if(slowmo>0){ if(lf%2===0)update(); slowmo--; } else update(); } draw(); lf++; requestAnimationFrame(loop); }
player={x:0,y:0,vx:0,vy:0,vis:0,wasLit:false,face:0,sq:1,trail:[],dashT:0,dashCd:0,dashDir:0}; hunters=[];
requestAnimationFrame(loop);
</script>
