<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body{margin:0;height:100%;background:#141726;overflow:hidden}#i{position:fixed;left:8px;top:8px;color:#9fb;font:12px monospace;z-index:2}</style></head>
<body><div id="i">loading…</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
const info=document.getElementById('i');
const rn=new THREE.WebGLRenderer({antialias:true}); rn.setPixelRatio(Math.min(2,devicePixelRatio||1)); rn.setSize(innerWidth,innerHeight); rn.outputColorSpace=THREE.SRGBColorSpace; document.body.appendChild(rn.domElement);
const sc=new THREE.Scene(); sc.background=new THREE.Color(0x141726);
const cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.01,1000);
sc.add(new THREE.AmbientLight(0xffffff,0.8));
const k=new THREE.DirectionalLight(0xffffff,1.6); k.position.set(3,5,4); sc.add(k);
const r=new THREE.DirectionalLight(0x88bbff,0.7); r.position.set(-4,2,-3); sc.add(r);
sc.add(new THREE.GridHelper(4,8,0x334,0x223));
const url=new URLSearchParams(location.search).get('m')||'assets/models/moto1.glb';
let obj=null, t=0;
new GLTFLoader().load(url,(g)=>{ obj=g.scene;
  const box=new THREE.Box3().setFromObject(obj); const size=box.getSize(new THREE.Vector3()); const ctr=box.getCenter(new THREE.Vector3());
  const maxd=Math.max(size.x,size.y,size.z)||1; const s=2/maxd; obj.scale.setScalar(s);
  obj.position.sub(ctr.multiplyScalar(s)); // center at origin
  sc.add(obj);
  cam.position.set(2.6,1.6,3.2); cam.lookAt(0,0,0);
  let meshes=0,mats=new Set(); obj.traverse(o=>{ if(o.isMesh){meshes++; mats.add(o.material&&o.material.name||'?');} });
  info.textContent='OK · size '+size.x.toFixed(2)+'/'+size.y.toFixed(2)+'/'+size.z.toFixed(2)+' · meshes '+meshes+' · mats '+mats.size;
  window.__loaded=true;
},undefined,(e)=>{ info.textContent='ERR '+(e&&e.message||e); window.__err=String(e&&e.message||e); });
function loop(){ requestAnimationFrame(loop); t+=0.01; if(obj)obj.rotation.y=t; rn.render(sc,cam); }
loop();
addEventListener('resize',()=>{ rn.setSize(innerWidth,innerHeight); cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); });
</script></body></html>
