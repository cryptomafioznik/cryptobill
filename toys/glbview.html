<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body{margin:0;height:100%;overflow:hidden}#i{position:fixed;left:8px;top:8px;color:#bff;font:12px monospace;z-index:2;text-shadow:0 1px 4px #000}</style></head>
<body><div id="i">loading…</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {RoomEnvironment} from 'three/addons/environments/RoomEnvironment.js';
const info=document.getElementById('i');
const rn=new THREE.WebGLRenderer({antialias:true}); rn.setPixelRatio(Math.min(2,devicePixelRatio||1)); rn.setSize(innerWidth,innerHeight);
rn.outputColorSpace=THREE.SRGBColorSpace; rn.toneMapping=THREE.ACESFilmicToneMapping; rn.toneMappingExposure=1.15; document.body.appendChild(rn.domElement);
const sc=new THREE.Scene();
// синтвейв-градиент фон
function bgTex(){ const c=document.createElement('canvas'); c.width=8;c.height=256; const g=c.getContext('2d'); const gr=g.createLinearGradient(0,0,0,256);
  gr.addColorStop(0,'#160b2e'); gr.addColorStop(0.5,'#3a1550'); gr.addColorStop(0.75,'#7a2263'); gr.addColorStop(1,'#12203a'); g.fillStyle=gr; g.fillRect(0,0,8,256); return new THREE.CanvasTexture(c); }
sc.background=bgTex();
// ОКРУЖЕНИЕ = отражения (студийное) → металл/краска читаются премиально
const pmrem=new THREE.PMREMGenerator(rn); sc.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;
const cam=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.01,1000);
sc.add(new THREE.AmbientLight(0x8090c0,0.5));
const k=new THREE.DirectionalLight(0xffffff,2.0); k.position.set(4,6,5); sc.add(k);
const rimC=new THREE.DirectionalLight(0x40d0ff,1.2); rimC.position.set(-5,2,-4); sc.add(rimC);
const rimP=new THREE.DirectionalLight(0xff3ea0,1.0); rimP.position.set(3,1,-5); sc.add(rimP);
const url=new URLSearchParams(location.search).get('m')||'assets/models/moto1.glb';
let obj=null, t=0;
new GLTFLoader().load(url,(g)=>{ obj=g.scene;
  const box=new THREE.Box3().setFromObject(obj); const size=box.getSize(new THREE.Vector3()); const ctr=box.getCenter(new THREE.Vector3());
  const maxd=Math.max(size.x,size.y,size.z)||1; const s=2.2/maxd; obj.scale.setScalar(s);
  obj.position.sub(ctr.multiplyScalar(s));
  let meshes=0; obj.traverse(o=>{ if(o.isMesh&&o.material){ meshes++;
    const m=o.material; if(m.isMeshStandardMaterial){ m.metalness=Math.max(m.metalness,0.55); m.roughness=Math.min(Math.max(m.roughness,0.18),0.5); m.envMapIntensity=1.4; }
    m.needsUpdate=true; } });
  sc.add(obj); cam.position.set(2.7,1.5,3.4); cam.lookAt(0,0.1,0);
  info.textContent='OK · meshes '+meshes+' · env+PBR премиум-рендер · '+url.split('/').pop();
  window.__loaded=true;
},undefined,(e)=>{ info.textContent='ERR '+(e&&e.message||e); window.__err=String(e&&e.message||e); });
function loop(){ requestAnimationFrame(loop); t+=0.008; if(obj)obj.rotation.y=t; rn.render(sc,cam); }
loop();
addEventListener('resize',()=>{ rn.setSize(innerWidth,innerHeight); cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); });
</script></body></html>
