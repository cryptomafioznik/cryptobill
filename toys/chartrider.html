<style>
  html,body{margin:0;height:100%;background:#0a0a1a;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  canvas{display:block;}
  #c3d{position:fixed;inset:0;width:100%;height:100%;display:none;z-index:0;}   /* b192: WebGL-слой (3D-мир) ПОД 2D-канвасом */
  #c{position:fixed;inset:0;z-index:1;}   /* 2D-канвас сверху: HUD/контролы/FX; в 3D-режиме мир на нём не рисуется (прозрачно) */
  #b3d{position:fixed;right:10px;top:104px;z-index:62;padding:11px 18px;min-width:56px;text-align:center;background:rgba(30,22,54,.9);color:#d9c8ff;
    font:800 15px ui-monospace,monospace;border:1px solid rgba(150,110,230,.6);border-radius:11px;cursor:pointer;letter-spacing:.08em;
    -webkit-user-select:none;user-select:none;touch-action:none;}
  #b3d.on{background:linear-gradient(150deg,rgba(53,224,255,.3),rgba(255,45,149,.24));border-color:rgba(120,180,255,.6);color:#eafcff;}
  #hud{position:fixed;top:18px;left:12px;color:#cdbef0;font-size:12px;letter-spacing:.14em;line-height:1.5;pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,.5);
    background:rgba(9,14,28,.48);border:1px solid rgba(150,180,230,.16);border-radius:12px;padding:7px 12px 8px;
    -webkit-backdrop-filter:blur(9px);backdrop-filter:blur(9px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06);}   /* b169: стекло (курс C) */
  #hud .tk{color:#ffe6a8;font-size:11px;letter-spacing:.22em;opacity:.85;}
  #hud .pnl{font-size:27px;font-weight:700;letter-spacing:.04em;line-height:1.15;color:#6effc0;text-shadow:0 2px 12px rgba(0,0,0,.55);transition:transform .13s cubic-bezier(.34,1.7,.5,1);transform-origin:left center;will-change:transform;}
  #hud .sub{font-size:12px;letter-spacing:.14em;margin-top:1px;} #hud b{color:#fff;}
  #hud .up{color:#6effc0;} #hud .dn{color:#ff7a8a;}
  #spd{position:fixed;top:64px;right:12px;color:#bfe8ff;font-size:12px;letter-spacing:.14em;text-align:right;pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,.5);transition:opacity .2s;
    background:rgba(9,14,28,.48);border:1px solid rgba(150,180,230,.16);border-radius:10px;padding:5px 10px 6px;
    -webkit-backdrop-filter:blur(9px);backdrop-filter:blur(9px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06);}   /* b169: стекло */
  #hud,#hint{transition:opacity .2s;}
  #hud,#spd,#hint{opacity:0;}
  #hint{position:fixed;bottom:14px;left:0;width:100%;text-align:center;color:#7a6f9a;font-size:11px;letter-spacing:.16em;pointer-events:none;}
  #hint b{color:#ffd98a;}
  /* ---- mobile debug overlay (tap to collapse) ---- */
  #dbg{position:fixed;top:3px;left:50%;transform:translateX(-50%);z-index:60;
    font:600 11px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;color:#cfe0f4;text-align:center;white-space:nowrap;
    background:rgba(8,10,22,0.6);border:1px solid rgba(120,180,230,0.22);border-radius:9px;
    padding:4px 10px;pointer-events:auto;text-shadow:0 1px 3px rgba(0,0,0,.65);}
  #dbg.min{padding:2px 7px;font-size:13px;opacity:.5;border-color:rgba(120,180,230,0.12);}
  #dbg b{color:#eafaff;font-weight:800;}
  #dbg .lab{color:#8595b8;font-weight:600;}
  #dbg .w-ok{color:#7ef0b0;} #dbg .w-warn{color:#ffd070;} #dbg .w-bad{color:#ff8a9a;font-weight:800;}
</style>

<body>
<canvas id="c3d"></canvas>
<canvas id="c"></canvas>
<button id="b3d">2D</button>
<div id="hud"><div class="tk" id="ticker">BTC / SIGNAL</div><div class="pnl" id="pnl">$0</div><div class="sub">dist <b id="dist">0</b>m · <span id="coins" class="up">◆ 0</span></div></div>
<div id="spd"><div id="mood">— bull run —</div><div><b id="kmh">0</b> km/h</div></div>
<div id="hint"></div>
<div id="dbg"></div>
<a id="physlink" href="physlab.html" style="position:fixed;left:50%;transform:translateX(-50%);top:env(safe-area-inset-top,4px);z-index:60;padding:4px 12px;background:rgba(44,30,60,0.85);color:#d3bcff;font:700 11px ui-monospace,monospace;border:1px solid rgba(160,120,220,0.55);border-radius:9px;text-decoration:none;white-space:nowrap;">🧪 ТЕСТ НОВОЙ ФИЗИКИ →</a>
<script>document.getElementById('physlink').href=location.pathname.indexOf('/toys/')>=0?'physlab.html':'toys/physlab.html';</script>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');let W,H,DPR;
const hudEl=document.getElementById('hud'),spdEl=document.getElementById('spd'),hintEl=document.getElementById('hint');
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);if(typeof sprCache!=='undefined')sprCache={};}   /* b166: смена DPR (поворот/монитор) инвалидирует кэш байк-спрайтов */
addEventListener('resize',resize);resize();
function lerp(a,b,t){return a+(b-a)*t;} function clamp(v,a,b){return v<a?a:v>b?b:v;}
// ===================== CORE TEST MODE =====================
// true  → ENDLESS stays a pure ride-and-chase core on a STOCK bike (the feel-reference; ranks/daily/missions/events/popups OFF).
//          CAREER (b64) is the progression layer ON TOP: its gems buy garage UPGRADES that APPLY in career runs (endless ignores them).
// false → full game everywhere. Single switch. Systems are GATED, never deleted.
const CORE_TEST_MODE = false;   // b70: META LIVE — building the progression spine (upgrades/bikes with teeth, career, economy) on the confirmed rigid-body core
// build stamp — bump on every change so a phone refresh can confirm it loaded fresh code (cache!)
const BUILD = '2026-07-10 · b213';

// ---------- procedural market terrain ----------
// height map sampled every STEP px; generated forward as we ride. Market character:
// trends (runs), volatility (chop), rare pumps & crashes.
const STEP=26; let terr=[], genX=0, baseY, walk=0, regime='chop', regimeLeft=0, regimeDrift=0, regimeVol=18, lastHazIdx=-99, lastRegime='';
// market regimes — distinct "scenarios" give the endless track rhythm & variety.
// d<0 = price up (climb / green) ; d>0 = price down (drop / red)
// ===================== CANDLE_TUNE — ЭТАП 2: СВЕЧА = РЕЛЬЕФ =====================
// Зелёная (рост) = подъём, красная (падение) = спуск; тело свечи = крутизна (close правит и ride-линию, и свечу);
// волатильность = пила (тяжело держать баланс), боковик = пологий спокойный. ПАМП = крутая гора, ДАМП = обрыв.
// Дефолты СРЕДНЕ-круто (драматичнее текущего, но не финал — финал калибруем вместе с BALANCE_TUNE). КРУТИ РУКАМИ:
const CANDLE_TUNE={
  C_PUMP_STEEP:  1.6,    // множитель крутизны ЗЕЛЁНОГО подъёма (bull/pump) — выше = памп круче, тяжелее залезть не опрокинувшись назад. крути руками
  C_DUMP_STEEP:  1.6,    // множитель крутизны КРАСНОГО спуска (bear/crash) — выше = дамп резче, обрыв вниз. крути руками
  C_VOL_JAG:     1.6,    // множитель «пилы» на волатильных режимах (pump/crash/rocks) — резкий рельеф = тяжело держать баланс. крути руками
  C_CALM_FLAT:   0.5,    // насколько боковик (flat) ПОЛОГИЙ/спокойный — ниже = ровнее передышка. крути руками
  C_CLIMB_CAP:   0.6,    // КЭП крутизны подъёма (рад ≈34°; было TUNE.climbCap 0.48≈28°) — памп круче. крути руками (выше = круче, но риск что стоковый байк не залезет → опусти)
};
function pickRegime(){
  const d=clamp(((dist||0)+diffOffset)/1400,0,1), volK=1+d*0.65, M=TUNE.mountain;   // b59: difficulty ramps over 1400m + stronger volatility deeper → skill ramp. b60: +diffOffset → a career track starts deeper in the ramp (harder from the gun)
  // STRUCTURED enduro track: every hard FEATURE is followed by a flat RECOVERY run-up (setup/momentum — fair, you can prepare; no "stuck in a bad position")
  const C=CANDLE_TUNE;   // b79 ЭТАП 2: свеча правит крутизну рельефа
  if(['bull','bear','pump','crash','rocks'].includes(lastRegime)){
    regime='flat'; regimeDrift=(Math.random()-0.5)*3*C.C_CALM_FLAT; regimeVol=4*volK*C.C_CALM_FLAT; regimeLeft=6+Math.random()*5; lastRegime=regime; return;   // боковик = пологий спокойный (C_CALM_FLAT)
  }
  const r=Math.random();
  if(r<TUNE.rockGarden){ regime='rocks'; regimeDrift=(Math.random()-0.5)*5; regimeVol=4*volK*C.C_VOL_JAG; regimeLeft=9+Math.random()*7; } // РОК-ГАРДЕН = пила (C_VOL_JAG): тяжело держать баланс
  else { const r2=Math.random();
    if(r2<0.42){ regime='bull';  regimeDrift=-(16+Math.random()*13)*M*C.C_PUMP_STEEP; regimeVol=5*volK;  regimeLeft=11+Math.random()*11; } // ЗЕЛЁНЫЙ ПОДЪЁМ круче (C_PUMP_STEEP)
    else if(r2<0.72){ regime='bear'; regimeDrift=(15+Math.random()*12)*M*C.C_DUMP_STEEP; regimeVol=5*volK; regimeLeft=10+Math.random()*11; } // КРАСНЫЙ СПУСК круче (C_DUMP_STEEP)
    else if(r2<0.88){ regime='pump'; regimeDrift=-(24+d*10)*M*C.C_PUMP_STEEP;  regimeVol=5*volK*C.C_VOL_JAG;  regimeLeft=6+Math.random()*5; }            // ПАМП = крутая ГОРА (тяжело залезть не опрокинувшись назад)
    else { regime='crash'; regimeDrift=(22+d*10)*C.C_DUMP_STEEP;  regimeVol=8*volK*C.C_VOL_JAG;  regimeLeft=6+Math.random()*5; }                        // ДАМП = ОБРЫВ вниз
  }
  lastRegime=regime;
}
// ---- market EVENTS: telegraphed set-pieces that punctuate a run (the drama) ----
const EVENTS={
  rally:{ nodes:17, gapM:210, warn:'ПАМП-РАЛЛИ', icon:'🚀', col:'90,240,150', kind:'good' }, // sustained green climb: ×PnL, gem rain, fast PUMP — tests loop-out
  whale:{ nodes:11, gapM:250, warn:'КИТ СБРАСЫВАЕТ', icon:'🐋', col:'255,80,90', kind:'bad' }, // the wave surges and closes in — outrun the mini-boss
  flash:{ nodes:13, gapM:290, warn:'ФЛЕШ-КРАХ', icon:'⚠', col:'255,140,70', kind:'bad' },     // the floor drops away — survive the plunge, "buy the dip"
};
let evGenType='', evGenLeft=0, nextEvGenX=2600;                 // terrain-generation scheduler
let gapLeft=0, nextGapX=1800, gapBaseY=0, gapLandFlat=0, overGap=false, gapLipNow=0, gapFarX=0, gapFxT=0, gapFxMsg='';   // GAPS: gen + fair-landing + clear state; gapLipNow/gapFarX = lip level & far-edge x of the gap being crossed
let gapRunup=0, gapRampLeft=0, gapPrevY=0, gapRampBot=0;   // gap FEATURE phases: descent run-up (build speed) → kicker ramp (launch) → chasm → land below the lip
let ledgeRunup=0, ledgeStepsLeft=0, ledgePrevY=0, ledgeTopY=0, ledgeStepsThis=2, ledgeHThis=38, nextLedgeX=1400;   // LEDGE phases: flat run-up (set up the wheelie) → riser/tread steps you must LOFT the front to mount. b57: stepsThis/HThis randomize each ledge (variety: single small step ↔ tall 3-step staircase)
let kickRunup=0, kickRampLeft=0, kickLandLeft=0, kickBaseY=0, kickRampBot=0, kickLandY=0, nextKickX=1700;   // TRICK KICKER phases: DESCENT run-up (bomb down → build speed, logical setup) → steep ramp UP (launches you ∝ speed for flips) → flat solid landing (no chasm)
let whoopRunup=0, whoopLeft=0, whoopBaseY=0, whoopPhase=0, nextWhoopX=2200;   // WHOOPS (b53): flat approach → a rhythm section of rollers (skim/catch air at speed, roll over slow) — dynamic flow, no death
let mudLeft=0, mudRamp=0, mudRunup=0, mudBaseY=0, mudLipBot=0, nextMudX=2600;   // MUD (b54/b63/b66): DESCENT run-up (build speed) → LIP-ramp → boggy patch you JUMP OVER (clear it = clean; land in it = saps speed). Logical, not random
let dropLandLeft=0, dropLandY=0, nextDropX=2000;   // DROPS/CLIFFS (b69): terrain steps DOWN one node (convex edge) → rigid body flies off as a projectile → flat lower shelf catches it. NOT the old gap-pit (close=H*0.99 = wheels rest on bottom). climbCap caps any rise after → no "pit-wall"
let curEvType='', evBanner='', evBannerT=0, evColor='90,240,150', evGlow=0, evBonus=0, lastWarnX=-1, evWarnType=''; // bike-side event state
function pickEvent(gz){ const z=((gz%5)+5)%5, r=Math.random();
  if(z===2) return r<0.55?'rally':(r<0.82?'flash':'whale');     // Эйфория: pumps
  if(z===4) return r<0.5?'whale':(r<0.82?'flash':'rally');      // Медвежий: dumps & crashes
  return r<0.4?'rally':(r<0.7?'whale':'flash'); }
function genSeg(){
  if(regimeLeft<=0) pickRegime();
  regimeLeft--;
  const dd=clamp((dist||0)/1800,0,1);
  const densK=1-clamp((genX/10+diffOffset)/1400,0,1)*0.30;   // b59: feature spacing shrinks up to 30% deeper in → denser obstacles. b60: +diffOffset → harder career tracks are dense from the start
  // start a market-event block once we pass the scheduled distance (terrain is shaped + tagged here, ridden into later)
  if(!CORE_TEST_MODE && evGenLeft<=0 && genX>=nextEvGenX && terr.length>40){ evGenType=pickEvent(Math.floor((genX/10)/700)); evGenLeft=EVENTS[evGenType].nodes; }   // CORE TEST: no events
  const prevC=terr.length?terr[terr.length-1].close:baseY;
  let close, isEv=evGenLeft>0?evGenType:'';
  if(isEv){
    const k=EVENTS[evGenType].nodes-evGenLeft;                    // index within the block
    if(evGenType==='rally') close=clamp(prevC-(8+Math.random()*5), 78, H*0.92);                   // brisk but climbable green ramp (~22°): power up it, feather near the top
    else if(evGenType==='flash') close = (k===1) ? clamp(prevC+(96+Math.random()*40), 90, H*0.95) // a cliff: the floor drops away
                                                  : clamp(prevC+(Math.random()-0.5)*14, 90, H*0.95);
    else { walk += (Math.random()-0.5)*16; walk=clamp(walk,-H*0.28,H*0.26); close=clamp(baseY+walk+Math.sin(genX*0.02)*12, 90, H*0.9); } // whale: ordinary ground, the wave does the work
    walk=close-baseY;                                            // keep terrain continuous after the event
    evGenLeft--; if(evGenLeft<=0) nextEvGenX=genX + EVENTS[evGenType].gapM*10 + Math.random()*900; // gap before the next event
  } else {
    // macro trend (regime random-walk) + multi-octave rolling hills = continuous, technical terrain
    walk += regimeDrift*0.5 + (Math.random()-0.5)*regimeVol*0.5;
    walk = clamp(walk, -H*0.40, H*0.34);   // wider band → taller mountains (close-clamp 70..H*0.95 is the hard bound)
    const steepNow = lerp(TUNE.steepEarly, TUNE.terrainSteep, clamp((genX/10+diffOffset)/TUNE.steepRamp,0,1));   // gentle on-ramp → full steepness deeper in. b60: +diffOffset → career tracks start at their difficulty
    const roll = (Math.sin(genX*0.0042)*TUNE.hillHeight + Math.sin(genX*0.0105+0.6)*(TUNE.hillHeight*0.45))*(1+dd*0.25)*((regime==='flat')?0.22:(regime==='rocks')?0.5:(regime==='pump'||regime==='crash')?0.6:1)*steepNow;   // smooth big swell; flat = recovery run-up; rocks = lower base under the chatter
    close = clamp(baseY + walk + roll, 70, H*0.95);
    if(regime==='rocks') close = clamp(close + Math.sin(genX*0.085)*TUNE.rockSize + Math.sin(genX*0.20+1.3)*TUNE.rockSize*0.5, 70, H*0.95);   // ROCK GARDEN chatter — TWO continuous sines (no random jumps → jostles balance but cling-rideable, not a crash-fest)
    if(terr.length<16){ const e=terr.length/16; close=lerp(baseY, close, e*e); walk*=0.7; }   // flat starting ramp eases the bike in
    // CLIMB-SLOPE CAP: a real enduro lugs up steep grades; a near-vertical wall just stalls (torque < gravity).
    // Cap how much the price-line can RISE per node (climb = close ABOVE prev on screen = smaller y) so every
    // climb stays steep-but-grindable. Descents & gaps untouched. Re-derive walk so the generator can't "bank"
    // an un-drawable deficit and spring it as a wall a few nodes later.
    const maxRise = Math.tan(CANDLE_TUNE.C_CLIMB_CAP)*STEP;   // b79 ЭТАП 2: кэп крутизны подъёма из CANDLE_TUNE (памп круче)
    if(prevC - close > maxRise){ close = prevC - maxRise; walk = close - baseY - roll; }
  }
  // ---- GAPS (chasm you JUMP) + LEDGES (vertical step you LOFT the front onto): structured skill obstacles ----
  let isGap=false, gapLip=0, isStep=false, stepTop=0, isKick=false, isWhoop=false, isMud=false, isDrop=false;
  if(!isEv){
    if(gapRunup>0){ const k=6-gapRunup; close=clamp(gapPrevY + k*11, 70, H*0.84); walk=close-baseY; gapRunup--; if(gapRunup<=0){ gapRampBot=close; gapRampLeft=3; } }   // DESCENT run-up: build speed before the gap
    else if(gapRampLeft>0){ const k=4-gapRampLeft; close=clamp(gapRampBot - k*20, 70, H*0.95); walk=close-baseY; gapRampLeft--; if(gapRampLeft<=0){ gapLeft=2; gapBaseY=clamp(close+40,70,H*0.9); } }   // KICKER launches you UP ∝ speed. Landing = lip+40 (b44: was +24; the slower b43 cruise ~5.6 falls more, so the runway sits where the slower arc lands → CLEAN clear, the edge-grab/snap stays rare). Chasm 2 nodes
    else if(gapLeft>0){ isGap=true; gapLip=gapBaseY; close=H*0.99; gapLeft--; if(gapLeft<=0){ walk=gapBaseY-baseY; gapLandFlat=5; } }   // chasm (3 nodes)
    else if(gapLandFlat>0){ close=gapBaseY; walk=close-baseY; gapLandFlat--; }   // FLAT runway SNAPPED to the landing level (not lerp → clean predictable landing + recovery room, no crawl-out of a hole)
    else if(ledgeRunup>0){ close=clamp(ledgePrevY,70,H*0.92); walk=close-baseY; ledgeRunup--; if(ledgeRunup<=0){ ledgeStepsLeft=ledgeStepsThis*3; ledgeTopY=ledgePrevY; } }   // LEDGE flat run-up: set up the wheelie (fair — you can prepare)
    else if(ledgeStepsLeft>0){ const pos=(ledgeStepsThis*3-ledgeStepsLeft)%3; if(pos<2){ ledgeTopY=clamp(ledgeTopY-ledgeHThis*0.5,70,H*0.86); if(pos===0){ isStep=true; stepTop=ledgeTopY; } } close=ledgeTopY; walk=close-baseY; ledgeStepsLeft--; }   // b57: stepsThis/HThis vary per ledge → single small step or a tall multi-step staircase. step = 2-node RISER (rideable on momentum) + 1-node tread; first node tagged for ▲ УСТУП
    else if(kickRunup>0){ const k=6-kickRunup; close=clamp(kickBaseY + k*13, 70, H*0.88); walk=close-baseY; kickRunup--; if(kickRunup<=0){ kickRampBot=close; kickRampLeft=3; } }   // b51: DESCENT run-up (6 nodes, ~65px down ≥ ramp's 66px up → NET downhill into the launch) — bomb down to BUILD SPEED so the ramp always launches you well ≥ cruise (logical "necessary place", like a real moto setup), not a random flat where you arrive slow
    else if(kickRampLeft>0){ const k=4-kickRampLeft; close=clamp(kickRampBot - k*TUNE.kickH,70,H*0.95); walk=close-baseY; if(kickRampLeft===1)isKick=true; kickRampLeft--; if(kickRampLeft<=0){ kickLandLeft=6; kickLandY=clamp(kickRampBot,70,H*0.9); } }   // ramp UP from the run-up bottom — launches you airborne ∝ speed (do a FLIP!); last node = lip (tagged for the telegraph)
    else if(kickLandLeft>0){ close=clamp(kickLandY,70,H*0.9); walk=close-baseY; kickLandLeft--; }   // flat SOLID landing at the run-up level (no chasm — pure reward feature) → land the flip
    else if(whoopRunup>0){ close=clamp(whoopBaseY,70,H*0.86); walk=close-baseY; whoopRunup--; if(whoopRunup<=0){ whoopLeft=TUNE.whoopN; whoopPhase=0; } }   // WHOOPS flat approach (read the rhythm)
    else if(whoopLeft>0){ whoopPhase+=2.3; close=clamp(whoopBaseY - Math.sin(whoopPhase)*TUNE.whoopAmp, 70, H*0.88); walk=close-baseY; if(whoopLeft===TUNE.whoopN)isWhoop=true; whoopLeft--; }   // BUMPS: a rhythm section of rollers — at speed you skim/catch small air off each crest (un-glued physics), slow = roll over. No chasm = no death; dynamic flow
    else if(mudRunup>0){ const k=6-mudRunup; close=clamp(mudBaseY + k*12, 70, H*0.86); walk=close-baseY; mudRunup--; if(mudRunup<=0){ mudLipBot=close; mudRamp=2; } }   // b66: DESCENT run-up (6 nodes, ~60px down) → BUILD SPEED so the lip actually LAUNCHES you over the bog (was: hit the lip at ambient ~2vx → weak pop → landed in the mud → "не перепрыгнуть")
    else if(mudRamp>0){ const k=2-mudRamp; close=clamp(mudLipBot - k*20,70,H*0.88); walk=close-baseY; if(mudRamp===1)isKick=true; mudRamp--; if(mudRamp<=0){ mudLeft=TUNE.mudN; } }   // KICKER lip (last node tagged .kick → kickPop launches you ∝ speed) UP from the run-up bottom
    else if(mudLeft>0){ close=clamp(mudLipBot,70,H*0.9); walk=close-baseY; isMud=true; mudLeft--; }   // MUD patch at the run-up bottom (a dip below the lip) — jump it from the lip, or land in & bog. No death

function makeDistCurve(k){ const n=256,c=new Float32Array(n); for(let i=0;i<n;i++){ const x=i/(n-1)*2-1; c[i]=(1+k)*x/(1+k*Math.abs(x)); } return c; }
function initAudio(){ if(actx)return; try{
  actx=new (window.AudioContext||window.webkitAudioContext)(); master=actx.createGain(); master.gain.value=muted?0:0.42;
  const comp=actx.createDynamicsCompressor(); comp.threshold.value=-18; comp.knee.value=22; comp.ratio.value=8; comp.attack.value=0.004; comp.release.value=0.24; master.connect(comp); comp.connect(actx.destination);   // b164: компрессор-лимитер на мастере — блипы/движок/музыка не каша и без клиппинга (сведение)
  // ---- enduro engine: detuned osc bank + harmonic + exhaust noise → overdrive → lowpass (opens with throttle) ----
  const emix=actx.createGain(); emix.gain.value=0.5;
  const shaper=actx.createWaveShaper(); shaper.curve=makeDistCurve(8); shaper.oversample='2x';
  engLP=actx.createBiquadFilter(); engLP.type='lowpass'; engLP.frequency.value=500; engLP.Q.value=0.9;
  engGain=actx.createGain(); engGain.gain.value=0;
  emix.connect(shaper); shaper.connect(engLP); engLP.connect(engGain); engGain.connect(master);
  const o1=actx.createOscillator(); o1.type='sawtooth'; o1.connect(emix);
  const o2=actx.createOscillator(); o2.type='square';   const g2=actx.createGain(); g2.gain.value=0.45; o2.connect(g2); g2.connect(emix);
  const o3=actx.createOscillator(); o3.type='sawtooth'; const g3=actx.createGain(); g3.gain.value=0.6;  o3.connect(g3); g3.connect(emix);
  const nb=actx.createBuffer(1,actx.sampleRate,actx.sampleRate); const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=actx.createBufferSource(); ns.buffer=nb; ns.loop=true; const nbp=actx.createBiquadFilter(); nbp.type='bandpass'; nbp.frequency.value=1500; nbp.Q.value=0.6; const ng=actx.createGain(); ng.gain.value=0.22; ns.connect(nbp); nbp.connect(ng); ng.connect(emix); ns.start();
  const wn=actx.createBufferSource(); wn.buffer=nb; wn.loop=true; const wbp=actx.createBiquadFilter(); wbp.type='bandpass'; wbp.frequency.value=520; wbp.Q.value=0.45; windG=actx.createGain(); windG.gain.value=0; wn.connect(wbp); wbp.connect(windG); windG.connect(master); wn.start();   // b152 ВЕТЕР: низкий шум-свист, громкость ∝ высоте полёта (camAir) — большой прыжок «слышен»
  noiseBuf=nb;   // b179: общий шум для шорохов (скид)
  { const wv=actx.createBufferSource(); wv.buffer=nb; wv.loop=true;   // b179 РОКОТ ВОЛНЫ: низкий гул СЗАДИ-СЛЕВА (StereoPanner) ∝ близости дампа — страх слышен ухом
    const wlp=actx.createBiquadFilter(); wlp.type='lowpass'; wlp.frequency.value=130; wlp.Q.value=0.9;
    waveG=actx.createGain(); waveG.gain.value=0;
    let wpan=null; try{ wpan=actx.createStereoPanner(); wpan.pan.value=-0.6; }catch(e){}
    wv.connect(wlp); if(wpan){ wlp.connect(wpan); wpan.connect(waveG); } else wlp.connect(waveG);
    waveG.connect(master); wv.start(); }
  o1.start(); o2.start(); o3.start(); eng=o1; engOscs=[o1,o2,o3];
  initMusic();
}catch(e){actx=null;} }

function blip(freq,dur,type,vol){ if(!actx||muted)return; try{ const o=actx.createOscillator(),g=actx.createGain(),n=actx.currentTime; o.type=type||'square'; o.frequency.setValueAtTime(freq,n); o.connect(g); g.connect(master); g.gain.setValueAtTime(0.0001,n); g.gain.exponentialRampToValueAtTime(vol||0.3,n+0.012); g.gain.exponentialRampToValueAtTime(0.0001,n+(dur||0.12)); o.start(n); o.stop(n+(dur||0.12)+0.03);}catch(e){} }
function sfxScrub(v){ if(!actx||muted||!noiseBuf)return; try{ const s=actx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;   // b179: шорох резины при торможении ∝ скорости
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=650+v*35; bp.Q.value=0.8;
  const gn=actx.createGain(); const n=actx.currentTime, vol=Math.min(0.16,0.04+v*0.010);
  gn.gain.setValueAtTime(0.0001,n); gn.gain.exponentialRampToValueAtTime(vol,n+0.02); gn.gain.exponentialRampToValueAtTime(0.0001,n+0.12);
  s.connect(bp); bp.connect(gn); gn.connect(master); s.start(n); s.stop(n+0.15); }catch(e){} }

  const t=new THREE.CanvasTexture(cn); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,4); return t; }

  const edge=new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry), new THREE.LineBasicMaterial({color:0x24e69a,transparent:true,opacity:0.8,fog:true})); edge.position.copy(body.position); cityGroup.add(edge);
  const wick=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1.6+crnd()*3,5), new THREE.MeshBasicMaterial({color:0x24e69a})); wick.position.set(x,h+1.2+crnd()*1.6,-depth); cityGroup.add(wick);

  const green=T.thr<bias; T.body.position.x=x; T.edge.position.x=x; T.wick.position.x=x;

function palmTex(){ const W=220,H=300,c=document.createElement('canvas'); c.width=W;c.height=H; const g=c.getContext('2d'); const cx=W*0.5, ty=H*0.30; g.lineJoin='round';
  g.fillStyle='#150a24'; g.beginPath(); g.moveTo(cx-8,H); g.quadraticCurveTo(cx-14,H*0.55,cx-4,ty+8); g.lineTo(cx+4,ty+8); g.quadraticCurveTo(cx+6,H*0.55,cx+10,H); g.closePath(); g.fill();
  g.strokeStyle='rgba(255,70,205,0.45)'; g.lineWidth=1.5; g.stroke();
  for(let k=0;k<9;k++){ const a=-Math.PI/2+(k-4)*0.40, L=80+((k===4)?16:0);
    const tx=cx+Math.cos(a)*L, tyy=ty+Math.sin(a)*L*0.72+22, mx=cx+Math.cos(a)*L*0.5, my=ty+Math.sin(a)*L*0.36;
    g.fillStyle=k%2?'#1e1035':'#251442'; g.beginPath(); g.moveTo(cx,ty); g.quadraticCurveTo(mx-5,my-3,tx,tyy); g.quadraticCurveTo(mx+6,my+7,cx,ty+5); g.closePath(); g.fill();
    g.strokeStyle=k%2?'rgba(150,70,255,0.55)':'rgba(255,95,215,0.65)'; g.lineWidth=1.2; g.stroke(); }
  g.fillStyle='#2a1545'; g.beginPath(); g.arc(cx,ty,6,0,7); g.fill(); return new THREE.CanvasTexture(c); }
const palmT=palmTex(), palms=[], PALM_PERIOD=340, PALM_N=6;
for(let i=0;i<PALM_N;i++){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:palmT,transparent:true,depthTest:true,depthWrite:false,fog:true}));
  const size=5.5+crnd()*3; s.scale.set(size*0.66,size,1); s.userData={x0:(i/PALM_N)*PALM_PERIOD-PALM_PERIOD/2, z:-16-crnd()*30, size}; scene.add(s); palms.push(s); }   // мало/дальше = редкие дальние силуэты, не занавес по центру
function updatePalms(camX3){ for(const s of palms){ const x=s.userData.x0-Math.floor((s.userData.x0-camX3+PALM_PERIOD/2)/PALM_PERIOD)*PALM_PERIOD; s.position.set(x, FLOOR_Y+s.userData.size*0.42, s.userData.z); } }

// ---------- ROAD ribbon (моя ride-линия терраина = поверхность, по которой едет байк) ----------
let roadMesh, lineTop, lineBot;
function buildRoad(){
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(ROAD_N*3*3),3));
  const idx=[]; for(let i=0;i<ROAD_N-1;i++){ const A=i*3,B=i*3+1,C=i*3+2,A2=(i+1)*3,B2=(i+1)*3+1,C2=(i+1)*3+2;
    idx.push(A,B,A2, B,B2,A2); idx.push(A,C,A2, C,C2,A2); }
  geo.setIndex(idx);
  roadMesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x37dcff,fog:true,side:THREE.DoubleSide})); roadMesh.frustumCulled=false; scene.add(roadMesh);   // ЯРКАЯ неон-лента-дорога (глоу) = чёткая ездовая кромка. frustumCulled=false: геометрия двигается по x байка
  function mkLine(color,op){ const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(ROAD_N*3),3));
    const l=new THREE.Line(g,new THREE.LineBasicMaterial({color,transparent:true,opacity:op,fog:true})); l.frustumCulled=false; return l; }
  lineTop=mkLine(0x6ff2ff,1.0); scene.add(lineTop);   // неон-рельс у камеры
  lineBot=mkLine(0xff5be0,0.95); scene.add(lineBot);
}
buildRoad();
function updateRoad(bx,baseY){ const S=window.CRS, STEP=S.STEP, vp=roadMesh.geometry.attributes.position.array;
  const tp=lineTop.geometry.attributes.position.array, bp=lineBot.geometry.attributes.position.array;
  const x0=bx-14*STEP;
  for(let i=0;i<ROAD_N;i++){ const wx=x0+i*STEP, g=S.terrainAt(wx); const X=wx*SC, Y=-(g.y-baseY)*SC;
    vp[i*9+0]=X; vp[i*9+1]=Y;        vp[i*9+2]=W2;
    vp[i*9+3]=X; vp[i*9+4]=Y;        vp[i*9+5]=-W2;
    vp[i*9+6]=X; vp[i*9+7]=Y-ROADT;  vp[i*9+8]=W2;
    tp[i*3]=X; tp[i*3+1]=Y+0.02; tp[i*3+2]=W2+0.02;
    bp[i*3]=X; bp[i*3+1]=Y-ROADT; bp[i*3+2]=W2+0.02;
  }
  roadMesh.geometry.attributes.position.needsUpdate=true; roadMesh.geometry.computeVertexNormals();
  lineTop.geometry.attributes.position.needsUpdate=true; lineBot.geometry.attributes.position.needsUpdate=true;
}

// ---------- CANDLESTICK CHART = 3D-ТЕРРЕЙН: тёмная земля-масса + ЯРКИЕ свечи-тела рельефом ----------
const CAND_N=84, dummy=new THREE.Object3D();
const cGreen=new THREE.Color(0x2bf0a4), cRed=new THREE.Color(0xff4468);   // светятся, но не пересвет в белое
// тёмная солидная земля под ride-линией (масса террейна; тёмная — светящиеся свечи выступают на ней)
const groundMat=new THREE.MeshBasicMaterial({color:0x201a3a,fog:true});
const groundMesh=new THREE.InstancedMesh(new THREE.BoxGeometry(1,1,1), groundMat, CAND_N);
groundMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); groundMesh.frustumCulled=false; scene.add(groundMesh);   // frustumCulled=false: инстансы двигаются далеко по x, иначе весь меш куллится = террейн пропадает
// яркие тела свечей (open→close, с зазорами = ОТДЕЛЬНЫЕ свечи) выступают на лице земли
const candMesh=new THREE.InstancedMesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({fog:true}), CAND_N);
candMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); candMesh.frustumCulled=false; scene.add(candMesh);
for(let i=0;i<CAND_N;i++) candMesh.setColorAt(i,cGreen);
// тонкие фитили (hi→lo) = точки данных
const wickMesh=new THREE.InstancedMesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({fog:true}), CAND_N);
wickMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); wickMesh.frustumCulled=false; scene.add(wickMesh);
for(let i=0;i<CAND_N;i++) wickMesh.setColorAt(i,cGreen);
// СВЕЧА = ЧАСТЬ ТРАССЫ: светящийся бар висит ОТ линии-езды ВНИЗ (высота = тело open-close), снизу тёмная земля до пола,
// сверху яркая неон-лента-дорога (roadMesh), тонкий фитиль вверх к максимуму. Едешь по верхней кромке своего свечного чарта.
function updateCandles(bx,baseY){ const S=window.CRS, terr=S.terr, STEP=S.STEP; const i0=Math.max(0,Math.floor(bx/STEP)-16);
  const GW=STEP*SC*1.02, CW=STEP*SC*0.9, WW=STEP*SC*0.13, botY=FLOOR_Y+0.25; let k=0;
  for(let i=i0;i<i0+CAND_N && i<terr.length;i++,k++){ const c=terr[i];
    if(!c||c.gap){ dummy.scale.set(0,0,0); dummy.updateMatrix(); groundMesh.setMatrixAt(k,dummy.matrix); candMesh.setMatrixAt(k,dummy.matrix); wickMesh.setMatrixAt(k,dummy.matrix); continue; }
    const X=c.x*SC, col=c.up?cGreen:cRed;
    const lineY=-(c.y-baseY)*SC, gh=Math.max(0.2,lineY-botY);                       // тёмная твёрдая земля: линия → пол
    dummy.position.set(X,(lineY+botY)/2,-0.15); dummy.rotation.set(0,0,0); dummy.scale.set(GW,gh,1.6); dummy.updateMatrix(); groundMesh.setMatrixAt(k,dummy.matrix);
    const bodyH=Math.min(2.6,Math.max(0.5,Math.abs(c.close-c.open)*SC));            // светящийся бар свечи ВНИЗ от линии (мин 0.5 = всегда виден, кап 2.6 = гига-краш не столб)
    dummy.position.set(X,lineY-bodyH/2,W2+0.1); dummy.scale.set(CW,bodyH,0.5); dummy.updateMatrix(); candMesh.setMatrixAt(k,dummy.matrix); candMesh.setColorAt(k,col);
    const wickUp=Math.min(1.8,Math.max(0.15,(-(c.hi-baseY)*SC)-lineY));             // тонкий фитиль ВВЕРХ к максимуму (hi)
    dummy.position.set(X,lineY+wickUp/2,W2+0.05); dummy.scale.set(WW,wickUp,0.3); dummy.updateMatrix(); wickMesh.setMatrixAt(k,dummy.matrix); wickMesh.setColorAt(k,col);
  }
  for(; k<CAND_N; k++){ dummy.scale.set(0,0,0); dummy.updateMatrix(); groundMesh.setMatrixAt(k,dummy.matrix); candMesh.setMatrixAt(k,dummy.matrix); wickMesh.setMatrixAt(k,dummy.matrix); }
  groundMesh.instanceMatrix.needsUpdate=true; candMesh.instanceMatrix.needsUpdate=true; wickMesh.instanceMatrix.needsUpdate=true;
  if(candMesh.instanceColor)candMesh.instanceColor.needsUpdate=true; if(wickMesh.instanceColor)wickMesh.instanceColor.needsUpdate=true;
}

// ---------- BIKE — РЕАЛЬНАЯ 3D-МОДЕЛЬ (GLB) + премиум-финиш: env-отражения, металл, неон-подсветка ----------
scene.add(new THREE.AmbientLight(0x8a92cc,0.9));
{ const keyL=new THREE.DirectionalLight(0xfff0e0,1.8); keyL.position.set(4,7,8); scene.add(keyL);
  const rimL=new THREE.DirectionalLight(0xff4fb0,1.3); rimL.position.set(-6,3,-3); scene.add(rimL);

  const frontL=new THREE.DirectionalLight(0xffffff,1.1); frontL.position.set(0,3,12); scene.add(frontL); }   // фронт-свет со стороны камеры

try{ const _pm=new THREE.PMREMGenerator(renderer); scene.environment=_pm.fromScene(new RoomEnvironment(),0.04).texture; }catch(e){}
const bikeGroup=new THREE.Group(); scene.add(bikeGroup);
let BIKE_YOFF=-1.55, BIKE_FLIP=-Math.PI/2;   // разворот: байк едет ВПЕРЁД (+X), не задом. калибруется визуально
{ const glow=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.05,0.34), new THREE.MeshBasicMaterial({color:0xff6be8})); glow.position.set(0,0.06,0); bikeGroup.add(glow); }   // неон-подсветка снизу
const bikeModel=new THREE.Group(); bikeGroup.add(bikeModel);
new GLTFLoader().load((location.pathname.indexOf('/toys/')>=0?'':'toys/')+'assets/models/moto1.glb',(g)=>{ const o=g.scene;   // b203 FIX: с корневого URL (symlink index.html — так играет юзер!) относительный путь 404-ил → в 3D байк был БЕЗ модели на проде. Часть «байк пропадает» с телефона
  let box=new THREE.Box3().setFromObject(o); const sz=box.getSize(new THREE.Vector3()); const s=2.5/(Math.max(sz.x,sz.z)||1); o.scale.setScalar(s);
  box=new THREE.Box3().setFromObject(o); const ctr=box.getCenter(new THREE.Vector3());
  o.position.set(-ctr.x,-box.min.y,-ctr.z);   // центр по X/Z, низ (колёса) на y=0

  o.traverse(m=>{ if(m.isMesh){ m.frustumCulled=false; if(m.material&&m.material.isMeshStandardMaterial){ const mt=m.material; mt.metalness=Math.max(mt.metalness,0.6); mt.roughness=Math.min(Math.max(mt.roughness,0.18),0.55); mt.envMapIntensity=1.5; mt.needsUpdate=true; } } });
  bikeModel.add(o);
},undefined,(e)=>{ if(!window.__bikeErr){window.__bikeErr=String(e&&e.message||e);console.error('bike GLB',e);} });
const BIKE_Z=W2+0.55;

// ---------- PARTICLES (пыль/выхлоп из физики → 3D-точки, per-point size/alpha/color) ----------
const P_VS=`attribute float aSize; attribute float aAlpha; attribute vec3 aColor; varying float vA; varying vec3 vC;
void main(){ vA=aAlpha; vC=aColor; vec4 mv=modelViewMatrix*vec4(position,1.0); gl_PointSize=aSize*(300.0/max(1.0,-mv.z)); gl_Position=projectionMatrix*mv; }`;
const P_FS=`varying float vA; varying vec3 vC; void main(){ float d=length(gl_PointCoord-vec2(0.5)); float a=smoothstep(0.5,0.06,d)*vA; if(a<0.01)discard; gl_FragColor=vec4(vC,a); }`;
function makePoints(max,additive){ const g=new THREE.BufferGeometry();
  const pos=new Float32Array(max*3), sz=new Float32Array(max), al=new Float32Array(max), col=new Float32Array(max*3);
  g.setAttribute('position',new THREE.BufferAttribute(pos,3)); g.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
  g.setAttribute('aAlpha',new THREE.BufferAttribute(al,1)); g.setAttribute('aColor',new THREE.BufferAttribute(col,3));
  const pts=new THREE.Points(g,new THREE.ShaderMaterial({vertexShader:P_VS,fragmentShader:P_FS,transparent:true,depthWrite:false,blending:additive?THREE.AdditiveBlending:THREE.NormalBlending})); pts.frustumCulled=false; scene.add(pts);
  return {geo:g,pos,sz,al,col}; }
const dustPts=makePoints(280,false), glowPts=makePoints(360,true);
function fillPts(P,arr,colFn,zBase,baseY,sizeK,alphaK){ let k=0; const M=P.sz.length;
  for(let i=0;i<arr.length && k<M;i++){ const p=arr[i]; if(!p||p.life<=0)continue;
    P.pos[k*3]=p.x*SC; P.pos[k*3+1]=-(p.y-baseY)*SC; P.pos[k*3+2]=zBase;
    P.sz[k]=Math.max(1,p.r||2)*SC*sizeK; P.al[k]=Math.min(1,p.life)*alphaK; const c=colFn(p); P.col[k*3]=c[0]; P.col[k*3+1]=c[1]; P.col[k*3+2]=c[2]; k++; }
  P.geo.setDrawRange(0,k);
  P.geo.attributes.position.needsUpdate=true; P.geo.attributes.aSize.needsUpdate=true; P.geo.attributes.aAlpha.needsUpdate=true; P.geo.attributes.aColor.needsUpdate=true; }
function updateParticles(baseY){ const S=window.CRS;
  fillPts(dustPts, S.dust||[], ()=>[0.42,0.39,0.36], BIKE_Z+0.1, baseY, 20, 0.4);                  // тонкий мягкий дым (мелкий+полупрозрачный, не облако-занавес)
  fillPts(glowPts, S.parts||[], p=>p.gold?[0.85,0.66,0.22]:[0.42,0.66,0.72], BIKE_Z+0.15, baseY, 11, 0.8); }  // мелкие искры (аддитив приглушён — не белые блобы)

// ---------- TELEGRAPHS (мировые метки препятствий, лицом к камере) ----------
function labelTex(txt,rgb){ const c=document.createElement('canvas'); c.width=300;c.height=84; const g=c.getContext('2d');
  function rr(x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
  rr(10,14,280,56,15); g.fillStyle='rgba(16,12,30,0.9)'; g.fill();                       // тёмная читаемая заливка
  g.strokeStyle='rgba('+rgb+',1)'; g.lineWidth=4; g.stroke();                              // ЯРКАЯ цветная рамка (тонкая = чуть светится, не блоб)
  g.font='800 30px ui-monospace,Menlo,monospace'; g.textAlign='center'; g.textBaseline='middle';
  g.fillStyle='rgba(235,240,250,1)'; g.fillText(txt,150,43);                               // светлый текст = читается на тёмном
  return new THREE.CanvasTexture(c); }
const TELE={ kick:labelTex('ТРАМПЛИН','90,240,150'), step:labelTex('УСТУП','120,200,255'), drop:labelTex('ОБРЫВ','255,110,80'), mud:labelTex('МУД','220,190,120') };   // яркая рамка-код типа, светлый текст
const teleScene=new THREE.Scene();   // отдельная сцена — рендерим ПОСЛЕ bloom (телеграфы чёткие, не разносит в блоб)
const telePool=[]; for(let i=0;i<2;i++){ const s=new THREE.Sprite(new THREE.SpriteMaterial({transparent:true,depthTest:false,depthWrite:false,opacity:0.97})); s.center.set(0.5,0); s.visible=false; teleScene.add(s); telePool.push(s); }
function featKey(c){ return c?(c.kick?'kick':c.step?'step':c.drop?'drop':c.mud?'mud':null):null; }
function updateTelegraphs(bx,baseY,t){ const S=window.CRS, terr=S.terr, STEP=S.STEP; const i0=Math.max(1,Math.floor(bx/STEP)+2); let k=0;
  const pul=0.94+0.06*Math.sin(t*0.16);
  for(let i=i0;i<i0+26 && i<terr.length && k<telePool.length;i++){ const c=terr[i], key=featKey(c);
    if(!key || featKey(terr[i-1])===key) continue;   // только СТАРТ фичи (не каждый узел прогона) → нет спама
    const s=telePool[k++]; s.material.map=TELE[key]; s.material.needsUpdate=true;
    s.position.set(c.x*SC, -(c.y-baseY)*SC+3.0, W2+0.4); s.scale.set(3.4*pul,0.95*pul,1); s.visible=true; }
  for(; k<telePool.length; k++) telePool[k].visible=false;
  window.__teleN=k; }

// ---------- loop ----------
const CAM_ANG=0.16;   // ниже = более сбоку (лицо свеча-стены видно), выше = более сверху
const _fog=new THREE.Color(0x2a0d3a), _skyTint=new THREE.Color(1,1,1);
let camFocusY=0;   // сглаженная высота фокуса камеры — следит за байком (в прыжке держит в кадре), с уклоном к земле чтобы график был виден
function frame(){ const S=window.CRS; const terr=S.terr;
  if(!terr||terr.length<4){ composer.render(); return; }
  const bike=S.bike, sl=S.slowLerp, baseY=S.baseY;
  const bx=lerp(bike._px===undefined?bike.x:bike._px, bike.x, sl);
  const by=lerp(bike._py===undefined?bike.y:bike._py, bike.y, sl);
  const ba=lerp(bike._pa===undefined?bike.ang:bike._pa, bike.ang, sl);
  const BX=bx*SC, gY=-(S.terrainAt(bx).y-baseY)*SC;
  updateRoad(bx,baseY); updateCandles(bx,baseY);
  updateCity(BX,S.marketBias()); updatePalms(BX);
  updateParticles(baseY); updateTelegraphs(bx,baseY,S.t);
  floorMesh.position.x=BX; gridMesh.position.x=BX;
  // тинт тумана/фона по рыночной эпохе (биом) — плавно
  const bm=S.biome; if(bm){ const dp=bm.sky[1]; _fog.setRGB(dp[0]/255,dp[1]/255,dp[2]/255); scene.fog.color.lerp(_fog,0.04); renderer.setClearColor(scene.fog.color,1);
    const hz=bm.sky[2], mx=Math.max(hz[0],hz[1],hz[2],1); _skyTint.setRGB(hz[0]/mx,hz[1]/mx,hz[2]/mx); skyMat.color.lerp(_skyTint,0.04); }   // тинт неба под рыночную эпоху (медвежий краснит, капитуляция сереет)
  const bikeY3=-(by-baseY)*SC;
  bikeGroup.position.set(BX, bikeY3 + BIKE_YOFF, BIKE_Z);
  bikeGroup.rotation.z=-ba;   // ЗНАК проверить визуально (canvas y-вниз ↔ 3D y-вверх)
  // фокус следит за байком (быстрее+ближе к байку = не отстаёт, не роняет вниз кадра)
  const targetFocus=gY + (bikeY3-gY)*0.72; camFocusY += (targetFocus-camFocusY)*0.14;
  // БОЛЕЕ СБОКУ, меньше наклон вниз → байк ПО ЦЕНТРУ, чарт+город заполняют кадр, минимум мёртвой сетки-пола
  camera.position.set(BX-4.2, camFocusY+2.1, 13.6);
  camera.lookAt(BX+3.6, camFocusY-1.1, -9);
  composer.render();
  renderer.autoClear=false; renderer.clearDepth(); renderer.render(teleScene,camera); renderer.autoClear=true;   // телеграфы поверх bloom = чёткие
}
function onResize(){ SW=innerWidth; SH=innerHeight; renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
  renderer.setSize(SW,SH,false); composer.setSize(SW,SH); bloom.setSize(SW,SH); camera.aspect=SW/SH; camera.updateProjectionMatrix(); }
addEventListener('resize',onResize);

window.R3D={ _ready:true, frame, setActive(on){ cv3.style.display=on?'block':'none'; if(on)onResize(); } };
if(window.__applyR3D) window.__applyR3D();   // применить сохранённый тумблер теперь, когда движок готов
</script>
</body>
</html>
