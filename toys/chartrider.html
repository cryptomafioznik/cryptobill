  html,body{margin:0;height:100%;background:#0a0a1a;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;

  canvas{display:block;}
  #hud{position:fixed;top:14px;left:16px;color:#cdbef0;font-size:12px;letter-spacing:.14em;line-height:1.5;pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,.5);}

  #hud .sub{font-size:12px;letter-spacing:.14em;margin-top:1px;} #hud b{color:#fff;}
  #hud .up{color:#6effc0;} #hud .dn{color:#ff7a8a;}
  #spd{position:fixed;top:48px;right:16px;color:#bfe8ff;font-size:12px;letter-spacing:.14em;text-align:right;pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,.5);transition:opacity .2s;}

    font:600 11px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;color:#cfe0f4;text-align:center;white-space:nowrap;
    background:rgba(8,10,22,0.6);border:1px solid rgba(120,180,230,0.22);border-radius:9px;
    padding:4px 10px;pointer-events:auto;text-shadow:0 1px 3px rgba(0,0,0,.65);}
  #dbg.min{padding:2px 7px;font-size:13px;opacity:.5;border-color:rgba(120,180,230,0.12);}

  #dbg .w-ok{color:#7ef0b0;} #dbg .w-warn{color:#ffd070;} #dbg .w-bad{color:#ff8a9a;font-weight:800;}

<body>
<canvas id="c"></canvas>
<div id="hud"><div class="tk" id="ticker">BTC / SIGNAL</div><div class="pnl" id="pnl">$0</div><div class="sub">dist <b id="dist">0</b>m · <span id="coins" class="up">◆ 0</span></div></div>
<div id="spd"><div id="mood">— bull run —</div><div><b id="kmh">0</b> km/h</div></div>

<a id="physlink" href="physlab.html" style="position:fixed;left:50%;transform:translateX(-50%);top:env(safe-area-inset-top,4px);z-index:60;padding:4px 12px;background:rgba(44,30,60,0.85);color:#d3bcff;font:700 11px ui-monospace,monospace;border:1px solid rgba(160,120,220,0.55);border-radius:9px;text-decoration:none;white-space:nowrap;">🧪 ТЕСТ НОВОЙ ФИЗИКИ →</a>
<script>document.getElementById('physlink').href=location.pathname.indexOf('/toys/')>=0?'physlab.html':'toys/physlab.html';</script>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');let W,H,DPR;
const hudEl=document.getElementById('hud'),spdEl=document.getElementById('spd'),hintEl=document.getElementById('hint');
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
function lerp(a,b,t){return a+(b-a)*t;} function clamp(v,a,b){return v<a?a:v>b?b:v;}
// ===================== CORE TEST MODE =====================
// true  → ENDLESS stays a pure ride-and-chase core on a STOCK bike (the feel-reference; ranks/daily/missions/events/popups OFF).
//          CAREER (b64) is the progression layer ON TOP: its gems buy garage UPGRADES that APPLY in career runs (endless ignores them).
// false → full game everywhere. Single switch. Systems are GATED, never deleted.
const CORE_TEST_MODE = false;   // b70: META LIVE — building the progression spine (upgrades/bikes with teeth, career, economy) on the confirmed rigid-body core
// build stamp — bump on every change so a phone refresh can confirm it loaded fresh code (cache!)
const BUILD = '2026-06-29 · b120';

// ---------- procedural market terrain ----------
// height map sampled every STEP px; generated forward as we ride. Market character:
// trends (runs), volatility (chop), rare pumps & crashes.
const STEP=26; let terr=[], genX=0, baseY, walk=0, regime='chop', regimeLeft=0, regimeDrift=0, regimeVol=18, lastHazIdx=-99, lastRegime='';
// market regimes — distinct "scenarios" give the endless track rhythm & variety.
// d<0 = price up (climb / green) ; d>0 = price down (drop / red)
// ===================== CANDLE_TUNE — ЭТАП 2: СВЕЧА = РЕЛЬЕФ =====================
// Зелёная (рост) = подъём, красная (падение) = спуск; тело свечи = крутизна (close правит и ride-линию, и свечу);
// волатильность = пила (тяжело держать баланс), боковик = пологий спокойный. ПАМП = крутая гора, ДАМП = обрыв.
// Дефолты СРЕДНЕ-круто (драматичнее текущего, но не финал — финал калибруем вместе с BALANCE_TUNE). КРУТИ РУКАМИ:
const CANDLE_TUNE={
  C_PUMP_STEEP:  1.6,    // множитель крутизны ЗЕЛЁНОГО подъёма (bull/pump) — выше = памп круче, тяжелее залезть не опрокинувшись назад. крути руками
  C_DUMP_STEEP:  1.6,    // множитель крутизны КРАСНОГО спуска (bear/crash) — выше = дамп резче, обрыв вниз. крути руками
  C_VOL_JAG:     1.6,    // множитель «пилы» на волатильных режимах (pump/crash/rocks) — резкий рельеф = тяжело держать баланс. крути руками
  C_CALM_FLAT:   0.5,    // насколько боковик (flat) ПОЛОГИЙ/спокойный — ниже = ровнее передышка. крути руками
  C_CLIMB_CAP:   0.6,    // КЭП крутизны подъёма (рад ≈34°; было TUNE.climbCap 0.48≈28°) — памп круче. крути руками (выше = круче, но риск что стоковый байк не залезет → опусти)
};
function pickRegime(){
  const d=clamp(((dist||0)+diffOffset)/1400,0,1), volK=1+d*0.65, M=TUNE.mountain;   // b59: difficulty ramps over 1400m + stronger volatility deeper → skill ramp. b60: +diffOffset → a career track starts deeper in the ramp (harder from the gun)
  // STRUCTURED enduro track: every hard FEATURE is followed by a flat RECOVERY run-up (setup/momentum — fair, you can prepare; no "stuck in a bad position")
  const C=CANDLE_TUNE;   // b79 ЭТАП 2: свеча правит крутизну рельефа
  if(['bull','bear','pump','crash','rocks'].includes(lastRegime)){
    regime='flat'; regimeDrift=(Math.random()-0.5)*3*C.C_CALM_FLAT; regimeVol=4*volK*C.C_CALM_FLAT; regimeLeft=6+Math.random()*5; lastRegime=regime; return;   // боковик = пологий спокойный (C_CALM_FLAT)
  }
  const r=Math.random();
  if(r<TUNE.rockGarden){ regime='rocks'; regimeDrift=(Math.random()-0.5)*5; regimeVol=4*volK*C.C_VOL_JAG; regimeLeft=9+Math.random()*7; } // РОК-ГАРДЕН = пила (C_VOL_JAG): тяжело держать баланс
  else { const r2=Math.random();
    if(r2<0.42){ regime='bull';  regimeDrift=-(16+Math.random()*13)*M*C.C_PUMP_STEEP; regimeVol=5*volK;  regimeLeft=11+Math.random()*11; } // ЗЕЛЁНЫЙ ПОДЪЁМ круче (C_PUMP_STEEP)
    else if(r2<0.72){ regime='bear'; regimeDrift=(15+Math.random()*12)*M*C.C_DUMP_STEEP; regimeVol=5*volK; regimeLeft=10+Math.random()*11; } // КРАСНЫЙ СПУСК круче (C_DUMP_STEEP)
    else if(r2<0.88){ regime='pump'; regimeDrift=-(24+d*10)*M*C.C_PUMP_STEEP;  regimeVol=5*volK*C.C_VOL_JAG;  regimeLeft=6+Math.random()*5; }            // ПАМП = крутая ГОРА (тяжело залезть не опрокинувшись назад)
    else { regime='crash'; regimeDrift=(22+d*10)*C.C_DUMP_STEEP;  regimeVol=8*volK*C.C_VOL_JAG;  regimeLeft=6+Math.random()*5; }                        // ДАМП = ОБРЫВ вниз
  }
  lastRegime=regime;
}
// ---- market EVENTS: telegraphed set-pieces that punctuate a run (the drama) ----
const EVENTS={
  rally:{ nodes:17, gapM:210, warn:'ПАМП-РАЛЛИ', icon:'🚀', col:'90,240,150', kind:'good' }, // sustained green climb: ×PnL, gem rain, fast PUMP — tests loop-out
  whale:{ nodes:11, gapM:250, warn:'КИТ СБРАСЫВАЕТ', icon:'🐋', col:'255,80,90', kind:'bad' }, // the wave surges and closes in — outrun the mini-boss
  flash:{ nodes:13, gapM:290, warn:'ФЛЕШ-КРАХ', icon:'⚠', col:'255,140,70', kind:'bad' },     // the floor drops away — survive the plunge, "buy the dip"
};
let evGenType='', evGenLeft=0, nextEvGenX=2600;                 // terrain-generation scheduler
let gapLeft=0, nextGapX=1800, gapBaseY=0, gapLandFlat=0, overGap=false, gapLipNow=0, gapFarX=0, gapFxT=0, gapFxMsg='';   // GAPS: gen + fair-landing + clear state; gapLipNow/gapFarX = lip level & far-edge x of the gap being crossed
let gapRunup=0, gapRampLeft=0, gapPrevY=0, gapRampBot=0;   // gap FEATURE phases: descent run-up (build speed) → kicker ramp (launch) → chasm → land below the lip
let ledgeRunup=0, ledgeStepsLeft=0, ledgePrevY=0, ledgeTopY=0, ledgeStepsThis=2, ledgeHThis=38, nextLedgeX=1400;   // LEDGE phases: flat run-up (set up the wheelie) → riser/tread steps you must LOFT the front to mount. b57: stepsThis/HThis randomize each ledge (variety: single small step ↔ tall 3-step staircase)
let kickRunup=0, kickRampLeft=0, kickLandLeft=0, kickBaseY=0, kickRampBot=0, kickLandY=0, nextKickX=1700;   // TRICK KICKER phases: DESCENT run-up (bomb down → build speed, logical setup) → steep ramp UP (launches you ∝ speed for flips) → flat solid landing (no chasm)
let whoopRunup=0, whoopLeft=0, whoopBaseY=0, whoopPhase=0, nextWhoopX=2200;   // WHOOPS (b53): flat approach → a rhythm section of rollers (skim/catch air at speed, roll over slow) — dynamic flow, no death
let mudLeft=0, mudRamp=0, mudRunup=0, mudBaseY=0, mudLipBot=0, nextMudX=2600;   // MUD (b54/b63/b66): DESCENT run-up (build speed) → LIP-ramp → boggy patch you JUMP OVER (clear it = clean; land in it = saps speed). Logical, not random
let dropLandLeft=0, dropLandY=0, nextDropX=2000;   // DROPS/CLIFFS (b69): terrain steps DOWN one node (convex edge) → rigid body flies off as a projectile → flat lower shelf catches it. NOT the old gap-pit (close=H*0.99 = wheels rest on bottom). climbCap caps any rise after → no "pit-wall"
let curEvType='', evBanner='', evBannerT=0, evColor='90,240,150', evGlow=0, evBonus=0, lastWarnX=-1, evWarnType=''; // bike-side event state
function pickEvent(gz){ const z=((gz%5)+5)%5, r=Math.random();
  if(z===2) return r<0.55?'rally':(r<0.82?'flash':'whale');     // Эйфория: pumps
  if(z===4) return r<0.5?'whale':(r<0.82?'flash':'rally');      // Медвежий: dumps & crashes
  return r<0.4?'rally':(r<0.7?'whale':'flash'); }
function genSeg(){
  if(regimeLeft<=0) pickRegime();
  regimeLeft--;
  const dd=clamp((dist||0)/1800,0,1);
  const densK=1-clamp((genX/10+diffOffset)/1400,0,1)*0.30;   // b59: feature spacing shrinks up to 30% deeper in → denser obstacles. b60: +diffOffset → harder career tracks are dense from the start
  // start a market-event block once we pass the scheduled distance (terrain is shaped + tagged here, ridden into later)
  if(!CORE_TEST_MODE && evGenLeft<=0 && genX>=nextEvGenX && terr.length>40){ evGenType=pickEvent(Math.floor((genX/10)/700)); evGenLeft=EVENTS[evGenType].nodes; }   // CORE TEST: no events
  const prevC=terr.length?terr[terr.length-1].close:baseY;
  let close, isEv=evGenLeft>0?evGenType:'';
  if(isEv){
    const k=EVENTS[evGenType].nodes-evGenLeft;                    // index within the block
    if(evGenType==='rally') close=clamp(prevC-(8+Math.random()*5), 78, H*0.92);                   // brisk but climbable green ramp (~22°): power up it, feather near the top
    else if(evGenType==='flash') close = (k===1) ? clamp(prevC+(96+Math.random()*40), 90, H*0.95) // a cliff: the floor drops away
                                                  : clamp(prevC+(Math.random()-0.5)*14, 90, H*0.95);
    else { walk += (Math.random()-0.5)*16; walk=clamp(walk,-H*0.28,H*0.26); close=clamp(baseY+walk+Math.sin(genX*0.02)*12, 90, H*0.9); } // whale: ordinary ground, the wave does the work
    walk=close-baseY;                                            // keep terrain continuous after the event
    evGenLeft--; if(evGenLeft<=0) nextEvGenX=genX + EVENTS[evGenType].gapM*10 + Math.random()*900; // gap before the next event
  } else {
    // macro trend (regime random-walk) + multi-octave rolling hills = continuous, technical terrain
    walk += regimeDrift*0.5 + (Math.random()-0.5)*regimeVol*0.5;
    walk = clamp(walk, -H*0.40, H*0.34);   // wider band → taller mountains (close-clamp 70..H*0.95 is the hard bound)
    const steepNow = lerp(TUNE.steepEarly, TUNE.terrainSteep, clamp((genX/10+diffOffset)/TUNE.steepRamp,0,1));   // gentle on-ramp → full steepness deeper in. b60: +diffOffset → career tracks start at their difficulty
    const roll = (Math.sin(genX*0.0042)*TUNE.hillHeight + Math.sin(genX*0.0105+0.6)*(TUNE.hillHeight*0.45))*(1+dd*0.25)*((regime==='flat')?0.22:(regime==='rocks')?0.5:(regime==='pump'||regime==='crash')?0.6:1)*steepNow;   // smooth big swell; flat = recovery run-up; rocks = lower base under the chatter
    close = clamp(baseY + walk + roll, 70, H*0.95);
    if(regime==='rocks') close = clamp(close + Math.sin(genX*0.085)*TUNE.rockSize + Math.sin(genX*0.20+1.3)*TUNE.rockSize*0.5, 70, H*0.95);   // ROCK GARDEN chatter — TWO continuous sines (no random jumps → jostles balance but cling-rideable, not a crash-fest)
    if(terr.length<16){ const e=terr.length/16; close=lerp(baseY, close, e*e); walk*=0.7; }   // flat starting ramp eases the bike in
    // CLIMB-SLOPE CAP: a real enduro lugs up steep grades; a near-vertical wall just stalls (torque < gravity).
    // Cap how much the price-line can RISE per node (climb = close ABOVE prev on screen = smaller y) so every
    // climb stays steep-but-grindable. Descents & gaps untouched. Re-derive walk so the generator can't "bank"
    // an un-drawable deficit and spring it as a wall a few nodes later.
    const maxRise = Math.tan(CANDLE_TUNE.C_CLIMB_CAP)*STEP;   // b79 ЭТАП 2: кэп крутизны подъёма из CANDLE_TUNE (памп круче)
    if(prevC - close > maxRise){ close = prevC - maxRise; walk = close - baseY - roll; }
  }
  // ---- GAPS (chasm you JUMP) + LEDGES (vertical step you LOFT the front onto): structured skill obstacles ----
  let isGap=false, gapLip=0, isStep=false, stepTop=0, isKick=false, isWhoop=false, isMud=false, isDrop=false;
  if(!isEv){
    if(gapRunup>0){ const k=6-gapRunup; close=clamp(gapPrevY + k*11, 70, H*0.84); walk=close-baseY; gapRunup--; if(gapRunup<=0){ gapRampBot=close; gapRampLeft=3; } }   // DESCENT run-up: build speed before the gap
    else if(gapRampLeft>0){ const k=4-gapRampLeft; close=clamp(gapRampBot - k*20, 70, H*0.95); walk=close-baseY; gapRampLeft--; if(gapRampLeft<=0){ gapLeft=2; gapBaseY=clamp(close+40,70,H*0.9); } }   // KICKER launches you UP ∝ speed. Landing = lip+40 (b44: was +24; the slower b43 cruise ~5.6 falls more, so the runway sits where the slower arc lands → CLEAN clear, the edge-grab/snap stays rare). Chasm 2 nodes
    else if(gapLeft>0){ isGap=true; gapLip=gapBaseY; close=H*0.99; gapLeft--; if(gapLeft<=0){ walk=gapBaseY-baseY; gapLandFlat=5; } }   // chasm (3 nodes)
    else if(gapLandFlat>0){ close=gapBaseY; walk=close-baseY; gapLandFlat--; }   // FLAT runway SNAPPED to the landing level (not lerp → clean predictable landing + recovery room, no crawl-out of a hole)
    else if(ledgeRunup>0){ close=clamp(ledgePrevY,70,H*0.92); walk=close-baseY; ledgeRunup--; if(ledgeRunup<=0){ ledgeStepsLeft=ledgeStepsThis*3; ledgeTopY=ledgePrevY; } }   // LEDGE flat run-up: set up the wheelie (fair — you can prepare)
    else if(ledgeStepsLeft>0){ const pos=(ledgeStepsThis*3-ledgeStepsLeft)%3; if(pos<2){ ledgeTopY=clamp(ledgeTopY-ledgeHThis*0.5,70,H*0.86); if(pos===0){ isStep=true; stepTop=ledgeTopY; } } close=ledgeTopY; walk=close-baseY; ledgeStepsLeft--; }   // b57: stepsThis/HThis vary per ledge → single small step or a tall multi-step staircase. step = 2-node RISER (rideable on momentum) + 1-node tread; first node tagged for ▲ УСТУП
    else if(kickRunup>0){ const k=6-kickRunup; close=clamp(kickBaseY + k*13, 70, H*0.88); walk=close-baseY; kickRunup--; if(kickRunup<=0){ kickRampBot=close; kickRampLeft=3; } }   // b51: DESCENT run-up (6 nodes, ~65px down ≥ ramp's 66px up → NET downhill into the launch) — bomb down to BUILD SPEED so the ramp always launches you well ≥ cruise (logical "necessary place", like a real moto setup), not a random flat where you arrive slow
    else if(kickRampLeft>0){ const k=4-kickRampLeft; close=clamp(kickRampBot - k*TUNE.kickH,70,H*0.95); walk=close-baseY; if(kickRampLeft===1)isKick=true; kickRampLeft--; if(kickRampLeft<=0){ kickLandLeft=6; kickLandY=clamp(kickRampBot,70,H*0.9); } }   // ramp UP from the run-up bottom — launches you airborne ∝ speed (do a FLIP!); last node = lip (tagged for the telegraph)
    else if(kickLandLeft>0){ close=clamp(kickLandY,70,H*0.9); walk=close-baseY; kickLandLeft--; }   // flat SOLID landing at the run-up level (no chasm — pure reward feature) → land the flip
    else if(whoopRunup>0){ close=clamp(whoopBaseY,70,H*0.86); walk=close-baseY; whoopRunup--; if(whoopRunup<=0){ whoopLeft=TUNE.whoopN; whoopPhase=0; } }   // WHOOPS flat approach (read the rhythm)
    else if(whoopLeft>0){ whoopPhase+=2.3; close=clamp(whoopBaseY - Math.sin(whoopPhase)*TUNE.whoopAmp, 70, H*0.88); walk=close-baseY; if(whoopLeft===TUNE.whoopN)isWhoop=true; whoopLeft--; }   // BUMPS: a rhythm section of rollers — at speed you skim/catch small air off each crest (un-glued physics), slow = roll over. No chasm = no death; dynamic flow
    else if(mudRunup>0){ const k=6-mudRunup; close=clamp(mudBaseY + k*12, 70, H*0.86); walk=close-baseY; mudRunup--; if(mudRunup<=0){ mudLipBot=close; mudRamp=2; } }   // b66: DESCENT run-up (6 nodes, ~60px down) → BUILD SPEED so the lip actually LAUNCHES you over the bog (was: hit the lip at ambient ~2vx → weak pop → landed in the mud → "не перепрыгнуть")
    else if(mudRamp>0){ const k=2-mudRamp; close=clamp(mudLipBot - k*20,70,H*0.88); walk=close-baseY; if(mudRamp===1)isKick=true; mudRamp--; if(mudRamp<=0){ mudLeft=TUNE.mudN; } }   // KICKER lip (last node tagged .kick → kickPop launches you ∝ speed) UP from the run-up bottom
    else if(mudLeft>0){ close=clamp(mudLipBot,70,H*0.9); walk=close-baseY; isMud=true; mudLeft--; }   // MUD patch at the run-up bottom (a dip below the lip) — jump it from the lip, or land in & bog. No death
    else if(dropLandLeft>0){ close=clamp(dropLandY,70,H*0.9); walk=close-baseY; if(dropLandLeft===TUNE.dropLandN)isDrop=true; dropLandLeft--; }   // CLIFF: ride line SNAPPED down to the lower shelf — the one-STEP plunge from the lip IS the convex edge (fly off ∝ speed); flat shelf = forgiving landing + pit-wall guard. first node tagged .drop (telegraph + keep edge sharp)
    else if(TUNE.gapEvery>0 && genX>=nextGapX && genX>TUNE.gapStart*10 && terr.length>20 && regime!=='pump' && regime!=='crash' && lastRegime!=='bull'){   // schedule a gap FEATURE (not mid-climb); the run-up handles the takeoff
      gapPrevY=close; gapRunup=5; nextGapX=genX + TUNE.gapEvery*10 + Math.random()*1400;   // start: descent run-up first
    }
    else if(TUNE.ledgeEvery>0 && genX>=nextLedgeX && genX>TUNE.ledgeStart*10 && terr.length>16 && regime!=='pump' && regime!=='crash' && lastRegime!=='bull' && close>H*0.45){   // schedule a LEDGE (not mid-climb, and only when low enough to have room to step up)
      ledgePrevY=close; ledgeStepsThis=1+Math.floor(Math.random()*2); ledgeHThis=TUNE.ledgeH*(0.7+Math.random()*0.5); ledgeRunup=4; nextLedgeX=genX + TUNE.ledgeEvery*10*densK + Math.random()*1100*densK;   // b57: 1-2 steps, height 0.7-1.2× → variety (small kerb ↔ 2-step staircase) but stays climbable (taller 3-step staircases looped the loft)
    }
    else if(TUNE.kickEvery>0 && genX>=nextKickX && genX>TUNE.kickStart*10 && terr.length>16 && regime!=='pump' && regime!=='crash' && lastRegime!=='bull' && close>H*0.5){   // schedule a TRICK KICKER (not mid-climb; needs room ABOVE for the ramp)
      kickBaseY=close; kickRunup=6; nextKickX=genX + TUNE.kickEvery*10*densK + Math.random()*1000*densK;   // b51: descent run-up (6 nodes); tighter spacing jitter since kickers are now the main feature
    }

// ---------- mobile debug overlay (FPS / speed / distance / dump gap / state / mode / build) ----------
let _fpsT=performance.now(), _fpsN=0, _fps=0;
const dbgEl=document.getElementById('dbg');
let dbgMin=false; try{ dbgMin=localStorage.getItem('cipher_dbg')==='0'; }catch(e){}
dbgEl.classList.toggle('min',dbgMin);
function setPhyslink(){ try{ const pl=document.getElementById('physlink'); if(pl)pl.style.display=dbgMin?'none':''; }catch(e){} }   // b109: dev-ссылка физлаба налазила на заголовки меню → прячем когда debug свёрнут
setPhyslink();
function dbgToggle(){ dbgMin=!dbgMin; dbgEl.classList.toggle('min',dbgMin); setPhyslink(); try{localStorage.setItem('cipher_dbg',dbgMin?'0':'1');}catch(e){} if(dbgMin)dbgEl.innerHTML='🐞'; }
dbgEl.addEventListener('touchstart',e=>{ e.stopPropagation(); e.preventDefault(); dbgToggle(); },{passive:false});  // tap overlay to collapse/expand (don't drive the bike)
dbgEl.addEventListener('mousedown',e=>{ e.stopPropagation(); dbgToggle(); });
function dbgTick(){
  _fpsN++; const now=performance.now(); if(now-_fpsT>=500){ _fps=Math.round(_fpsN*1000/(now-_fpsT)); _fpsN=0; _fpsT=now; }
  if(dbgMin){ if(dbgEl.innerHTML!=='🐞')dbgEl.innerHTML='🐞'; return; }
  const vx=bike?bike.vx:0, kmh=Math.round(vx*12);
  let state; if(screen==='dead')state='CRASHED'; else if(screen==='title')state='TITLE'; else if(screen==='paused')state='PAUSED'; else if(screen==='garage')state='GARAGE'; else state=(bike&&bike.onG)?'GROUNDED':'AIR';
  const gapPx=bike?(bike.x-wave):0, gapM=Math.round(gapPx/10);
  const wc=gapPx<W*0.45?'w-bad':gapPx<W*0.72?'w-warn':'w-ok';   // dump proximity: red close / amber / green
  dbgEl.innerHTML='🐞 <b>'+_fps+'</b>fps · <b>'+kmh+'</b>км/ч <span class="lab">'+vx.toFixed(1)+'vx</span><br>'
    +'<b>'+(dist||0)+'</b>m · дамп <span class="'+wc+'">'+gapM+'m</span><br>'
    +'<span class="lab">'+state+' · CORE '+(CORE_TEST_MODE?'ON':'OFF')+' · '+BUILD+'</span>';
}
function loop(){ requestAnimationFrame(loop); try{ if(screen==='play'){ if(slowmo>0){ slowmo--; if(!(slowmo&1))update(); } else update(); } draw(); musicTick(); dbgTick(); }catch(e){ if(!loop._e){loop._e=1; console.error('CHART loop error (self-healed, screen='+screen+'):',e&&e.stack||e); } } }   // b65: rAF re-requested FIRST + try/catch → one bad frame can no longer permanently FREEZE the game (was: any throw skipped the re-request → stuck until a page refresh, matching the "магазин дёргается/не работает до обновления" report). The first error is logged so the real cause surfaces.
function shakeApply(){} // (shake folded into camera draw via translate jitter)
toTitle();
// apply shake in draw by jittering before skyGrad
const _draw=draw; draw=function(){ if(screen!=='play'){ if(shake>0.01)shake*=0.8; if(flash>0.01)flash*=0.85; if(gflash>0.01)gflash*=0.85; }   // b74 FIX «трясучка»: shake/flash/gflash затухали только в update() (а он не идёт вне игры) → на dead/garage тряслось вечно. Теперь гасим и вне игры
  if(shake>0.3){ctx.save();ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);_draw();ctx.restore();}else _draw(); };
requestAnimationFrame(loop);
