<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');let W,H,DPR;
const hudEl=document.getElementById('hud'),spdEl=document.getElementById('spd'),hintEl=document.getElementById('hint');
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);if(typeof sprCache!=='undefined')sprCache={};}   /* b166: смена DPR (поворот/монитор) инвалидирует кэш байк-спрайтов */
addEventListener('resize',resize);resize();
function lerp(a,b,t){return a+(b-a)*t;} function clamp(v,a,b){return v<a?a:v>b?b:v;}
// ===================== CORE TEST MODE =====================
// true  → ENDLESS stays a pure ride-and-chase core on a STOCK bike (the feel-reference; ranks/daily/missions/events/popups OFF).
//          CAREER (b64) is the progression layer ON TOP: its gems buy garage UPGRADES that APPLY in career runs (endless ignores them).
// false → full game everywhere. Single switch. Systems are GATED, never deleted.
const CORE_TEST_MODE = false;   // b70: META LIVE — building the progression spine (upgrades/bikes with teeth, career, economy) on the confirmed rigid-body core
// build stamp — bump on every change so a phone refresh can confirm it loaded fresh code (cache!)
const BUILD = '2026-07-22 · b273';

// ---------- procedural market terrain ----------
// height map sampled every STEP px; generated forward as we ride. Market character:
// trends (runs), volatility (chop), rare pumps & crashes.
const STEP=26; let terr=[], genX=0, baseY, walk=0, regime='chop', regimeLeft=0, regimeDrift=0, regimeVol=18, lastHazIdx=-99, lastRegime='';
// market regimes — distinct "scenarios" give the endless track rhythm & variety.
// d<0 = price up (climb / green) ; d>0 = price down (drop / red)
// ===================== CANDLE_TUNE — ЭТАП 2: СВЕЧА = РЕЛЬЕФ =====================
// Зелёная (рост) = подъём, красная (падение) = спуск; тело свечи = крутизна (close правит и ride-линию, и свечу);
// волатильность = пила (тяжело держать баланс), боковик = пологий спокойный. ПАМП = крутая гора, ДАМП = обрыв.
// Дефолты СРЕДНЕ-круто (драматичнее текущего, но не финал — финал калибруем вместе с BALANCE_TUNE). КРУТИ РУКАМИ:
const CANDLE_TUNE={
  C_PUMP_STEEP:  1.6,    // множитель крутизны ЗЕЛЁНОГО подъёма (bull/pump) — выше = памп круче, тяжелее залезть не опрокинувшись назад. крути руками
  C_DUMP_STEEP:  1.6,    // множитель крутизны КРАСНОГО спуска (bear/crash) — выше = дамп резче, обрыв вниз. крути руками
  C_VOL_JAG:     1.6,    // множитель «пилы» на волатильных режимах (pump/crash/rocks) — резкий рельеф = тяжело держать баланс. крути руками
  C_CALM_FLAT:   0.5,    // насколько боковик (flat) ПОЛОГИЙ/спокойный — ниже = ровнее передышка. крути руками
  C_CLIMB_CAP:   0.6,    // КЭП крутизны подъёма (рад ≈34°; было TUNE.climbCap 0.48≈28°) — памп круче. крути руками (выше = круче, но риск что стоковый байк не залезет → опусти)
};
function pickRegime(){
  const d=clamp(((dist||0)+diffOffset)/1400,0,1), volK=1+d*0.65, M=TUNE.mountain;   // b59: difficulty ramps over 1400m + stronger volatility deeper → skill ramp. b60: +diffOffset → a career track starts deeper in the ramp (harder from the gun)
  // STRUCTURED enduro track: every hard FEATURE is followed by a flat RECOVERY run-up (setup/momentum — fair, you can prepare; no "stuck in a bad position")
  const C=CANDLE_TUNE;   // b79 ЭТАП 2: свеча правит крутизну рельефа
  if(['bull','bear','pump','crash','rocks'].includes(lastRegime)){
    regime='flat'; regimeDrift=(Math.random()-0.5)*3*C.C_CALM_FLAT; regimeVol=4*volK*C.C_CALM_FLAT; regimeLeft=6+Math.random()*5; lastRegime=regime; return;   // боковик = пологий спокойный (C_CALM_FLAT)
  }
  const r=Math.random();
  if(r<TUNE.rockGarden){ regime='rocks'; regimeDrift=(Math.random()-0.5)*5; regimeVol=4*volK*C.C_VOL_JAG; regimeLeft=9+Math.random()*7; } // РОК-ГАРДЕН = пила (C_VOL_JAG): тяжело держать баланс
  else { const r2=Math.random();
    if(r2<0.42){ regime='bull';  regimeDrift=-(16+Math.random()*13)*M*C.C_PUMP_STEEP; regimeVol=5*volK;  regimeLeft=11+Math.random()*11; } // ЗЕЛЁНЫЙ ПОДЪЁМ круче (C_PUMP_STEEP)
    else if(r2<0.72){ regime='bear'; regimeDrift=(15+Math.random()*12)*M*C.C_DUMP_STEEP; regimeVol=5*volK; regimeLeft=10+Math.random()*11; } // КРАСНЫЙ СПУСК круче (C_DUMP_STEEP)
    else if(r2<0.88){ regime='pump'; regimeDrift=-(24+d*10)*M*C.C_PUMP_STEEP;  regimeVol=5*volK*C.C_VOL_JAG;  regimeLeft=6+Math.random()*5; }            // ПАМП = крутая ГОРА (тяжело залезть не опрокинувшись назад)
    else { regime='crash'; regimeDrift=(22+d*10)*C.C_DUMP_STEEP;  regimeVol=8*volK*C.C_VOL_JAG;  regimeLeft=6+Math.random()*5; }                        // ДАМП = ОБРЫВ вниз
  }
  lastRegime=regime;
}
// ---- market EVENTS: telegraphed set-pieces that punctuate a run (the drama) ----
const EVENTS={
  rally:{ nodes:17, gapM:210, warn:'ПАМП-РАЛЛИ', icon:'🚀', col:'90,240,150', kind:'good' }, // sustained green climb: ×PnL, gem rain, fast PUMP — tests loop-out
  whale:{ nodes:11, gapM:250, warn:'КИТ СБРАСЫВАЕТ', icon:'🐋', col:'255,80,90', kind:'bad' }, // the wave surges and closes in — outrun the mini-boss
  flash:{ nodes:13, gapM:290, warn:'ФЛЕШ-КРАХ', icon:'⚠', col:'255,140,70', kind:'bad' },     // the floor drops away — survive the plunge, "buy the dip"
};
let evGenType='', evGenLeft=0, nextEvGenX=2600;                 // terrain-generation scheduler
let gapLeft=0, nextGapX=1800, gapBaseY=0, gapLandFlat=0, overGap=false, gapLipNow=0, gapFarX=0, gapFxT=0, gapFxMsg='';   // GAPS: gen + fair-landing + clear state; gapLipNow/gapFarX = lip level & far-edge x of the gap being crossed
let gapRunup=0, gapRampLeft=0, gapPrevY=0, gapRampBot=0, gapLipY=0, gapLandTopY=0, gapStepNow=0;   // b247/ph3 gap FEATURE (gapStepNow = per-gap step-up высота этого гэпа): разгон-спуск (скорость) → ВОГНУТЫЙ лип → чистый провал (death если медленно) → посадка на УРОВНЕ старта (не ниже), встречный довнслоп, опц. step-up ВВЕРХ
let ledgeRunup=0, ledgeStepsLeft=0, ledgePrevY=0, ledgeTopY=0, ledgeStepsThis=2, ledgeHThis=38, nextLedgeX=1400;   // LEDGE phases: flat run-up (set up the wheelie) → riser/tread steps you must LOFT the front to mount. b57: stepsThis/HThis randomize each ledge (variety: single small step ↔ tall 3-step staircase)
let kickRunup=0, kickRampLeft=0, kickLandLeft=0, kickBaseY=0, kickRampBot=0, kickLipY=0, kickLandTopY=0, nextKickX=1700;   // b247 KICKER: разгон-спуск (набрать скорость) → ВОГНУТЫЙ лип (эмерджентный вылет ∝ скорости) → ВСТРЕЧНЫЙ довнслоп-посадка (тангенц. катч, та же анатомия что мега)
let whoopRunup=0, whoopLeft=0, whoopBaseY=0, whoopPhase=0, nextWhoopX=2200;   // WHOOPS (b53): flat approach → a rhythm section of rollers (skim/catch air at speed, roll over slow) — dynamic flow, no death
let mudLeft=0, mudRamp=0, mudRunup=0, mudBaseY=0, mudLipBot=0, nextMudX=2600;   // MUD (b54/b63/b66): DESCENT run-up (build speed) → LIP-ramp → boggy patch you JUMP OVER (clear it = clean; land in it = saps speed). Logical, not random
let megaRunup=0, megaRampLeft=0, megaLandLeft=0, megaBaseY=0, megaRampBot=0, megaLipY=0, megaLandTopY=0, nextMegaX=3000;   // b246 МЕГА-РАМПА (только Отрыв): разгон-спуск → ВОГНУТЫЙ лип (крутой, гладкий) → ЭМЕРДЖЕНТНЫЙ вылет ∝ скорости → ВСТРЕЧНЫЙ довнслоп-посадка под угол параболы. Честная физика (не скрипт-пуск), à la FMX-реф
let climbRunup=0, climbLeft=0, climbBaseY=0, climbBotY=0, nextClimbX=2400;   // b229 КРУТОЙ ПОДЪЁМ-БАЛАНСИРОВКА (GD-ядро сложности): разгон-спуск (момент) → крутой затяжной подъём КРУЧЕ кэпа (лезешь на моменте + вес вперёд, чтоб не опрокинуться назад) → гребень. Сложность = удержать баланс, не «долететь через яму». Управление плавное, вызов в рельефе
let dropLandLeft=0, dropLandY=0, nextDropX=2000;   // DROPS/CLIFFS (b69): terrain steps DOWN one node (convex edge) → rigid body flies off as a projectile → flat lower shelf catches it. NOT the old gap-pit (close=H*0.99 = wheels rest on bottom). climbCap caps any rise after → no "pit-wall"
let curEvType='', evBanner='', evBannerT=0, evColor='90,240,150', evGlow=0, evBonus=0, lastWarnX=-1, evWarnType=''; // bike-side event state
function pickEvent(gz){ const z=((gz%5)+5)%5, r=Math.random();
  if(z===2) return r<0.55?'rally':(r<0.82?'flash':'whale');     // Эйфория: pumps
  if(z===4) return r<0.5?'whale':(r<0.82?'flash':'rally');      // Медвежий: dumps & crashes
  return r<0.4?'rally':(r<0.7?'whale':'flash'); }
function genSeg(){
  if(regimeLeft<=0) pickRegime();
  regimeLeft--;
  const dd=clamp((dist||0)/1800,0,1);
  const densK=1-clamp((genX/10+diffOffset)/1250,0,1)*0.42;   // b228: эскалация плотности сильнее (30%→42%, рампа 1400→1250) — трасса ощутимо густеет вглубь/по сложности (дизайн-обстакл-курс, не «газ-и-едешь»). b60: +diffOffset → career-этапы плотные с начала
  // start a market-event block once we pass the scheduled distance (terrain is shaped + tagged here, ridden into later)
  if(!CORE_TEST_MODE && evGenLeft<=0 && genX>=nextEvGenX && terr.length>40){ evGenType=pickEvent(Math.floor((genX/10)/700)); evGenLeft=EVENTS[evGenType].nodes; }   // CORE TEST: no events
  const prevC=terr.length?terr[terr.length-1].close:baseY;
  let close, isEv=evGenLeft>0?evGenType:'';
  if(isEv){
    const k=EVENTS[evGenType].nodes-evGenLeft;                    // index within the block
    if(evGenType==='rally') close=clamp(prevC-(8+Math.random()*5), 78, H*0.92);                   // brisk but climbable green ramp (~22°): power up it, feather near the top
    else if(evGenType==='flash') close = (k===1) ? clamp(prevC+(96+Math.random()*40), 90, H*0.95) // a cliff: the floor drops away
                                                  : clamp(prevC+(Math.random()-0.5)*14, 90, H*0.95);
    else { walk += (Math.random()-0.5)*16; walk=clamp(walk,-H*0.28,H*0.26); close=clamp(baseY+walk+Math.sin(genX*0.02)*12, 90, H*0.9); } // whale: ordinary ground, the wave does the work
    walk=close-baseY;                                            // keep terrain continuous after the event
    evGenLeft--; if(evGenLeft<=0) nextEvGenX=genX + EVENTS[evGenType].gapM*10 + Math.random()*900; // gap before the next event
  } else {
    // macro trend (regime random-walk) + multi-octave rolling hills = continuous, technical terrain
    walk += regimeDrift*0.5 + (Math.random()-0.5)*regimeVol*0.5;
    walk = clamp(walk, -H*0.40, H*0.34);   // wider band → taller mountains (close-clamp 70..H*0.95 is the hard bound)
    const steepNow = lerp(TUNE.steepEarly, TUNE.terrainSteep, clamp((genX/10+diffOffset)/TUNE.steepRamp,0,1));   // gentle on-ramp → full steepness deeper in. b60: +diffOffset → career tracks start at their difficulty
    const roll = (Math.sin(genX*0.0042)*TUNE.hillHeight + Math.sin(genX*0.0105+0.6)*(TUNE.hillHeight*0.45))*(1+dd*0.25)*((regime==='flat')?0.22:(regime==='rocks')?0.5:(regime==='pump'||regime==='crash')?0.6:1)*steepNow;   // smooth big swell; flat = recovery run-up; rocks = lower base under the chatter
    close = clamp(baseY + walk + roll, 70, H*0.95);
    if(regime==='rocks') close = clamp(close + Math.sin(genX*0.085)*TUNE.rockSize + Math.sin(genX*0.20+1.3)*TUNE.rockSize*0.5, 70, H*0.95);   // ROCK GARDEN chatter — TWO continuous sines (no random jumps → jostles balance but cling-rideable, not a crash-fest)
    if(terr.length<16){ const e=terr.length/16; close=lerp(baseY, close, e*e); walk*=0.7; }   // flat starting ramp eases the bike in
    // CLIMB-SLOPE CAP: a real enduro lugs up steep grades; a near-vertical wall just stalls (torque < gravity).
    // Cap how much the price-line can RISE per node (climb = close ABOVE prev on screen = smaller y) so every
    // climb stays steep-but-grindable. Descents & gaps untouched. Re-derive walk so the generator can't "bank"
    // an un-drawable deficit and spring it as a wall a few nodes later.
    const maxRise = Math.tan(CANDLE_TUNE.C_CLIMB_CAP)*STEP;   // b79 ЭТАП 2: кэп крутизны подъёма из CANDLE_TUNE (памп круче)
    if(prevC - close > maxRise){ close = prevC - maxRise; walk = close - baseY - roll; }
  }
  // ---- GAPS (chasm you JUMP) + LEDGES (vertical step you LOFT the front onto): structured skill obstacles ----
  let isGap=false, gapLip=0, isStep=false, stepTop=0, isKick=false, isWhoop=false, isMud=false, isDrop=false, isClimb=false, isMega=false;
  if(!isEv){

function makeDistCurve(k){ const n=256,c=new Float32Array(n); for(let i=0;i<n;i++){ const x=i/(n-1)*2-1; c[i]=(1+k)*x/(1+k*Math.abs(x)); } return c; }

  const comp=actx.createDynamicsCompressor(); comp.threshold.value=-18; comp.knee.value=22; comp.ratio.value=8; comp.attack.value=0.004; comp.release.value=0.24; master.connect(comp); comp.connect(actx.destination);   // b164: компрессор-лимитер на мастере — блипы/движок/музыка не каша и без клиппинга (сведение)
  // ---- enduro engine: detuned osc bank + harmonic + exhaust noise → overdrive → lowpass (opens with throttle) ----
  const emix=actx.createGain(); emix.gain.value=0.5;

  const o1=actx.createOscillator(); o1.type='sawtooth'; o1.connect(emix);
  const o2=actx.createOscillator(); o2.type='square';   const g2=actx.createGain(); g2.gain.value=0.45; o2.connect(g2); g2.connect(emix);
  const o3=actx.createOscillator(); o3.type='sawtooth'; const g3=actx.createGain(); g3.gain.value=0.6;  o3.connect(g3); g3.connect(emix);
  const nb=actx.createBuffer(1,actx.sampleRate,actx.sampleRate); const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const ns=actx.createBufferSource(); ns.buffer=nb; ns.loop=true; const nbp=actx.createBiquadFilter(); nbp.type='bandpass'; nbp.frequency.value=1500; nbp.Q.value=0.6; const ng=actx.createGain(); ng.gain.value=0.22; ns.connect(nbp); nbp.connect(ng); ng.connect(emix); ns.start();

    const wlp=actx.createBiquadFilter(); wlp.type='lowpass'; wlp.frequency.value=130; wlp.Q.value=0.9;

function scheduleStep(step,t){ const bar=(step/16)|0, c=MPROG[bar%MPROG.length], notes=chordNotes(c), playing=(screen==='play'), bright=620+mMood*900+mInt*1500;
  if(step%16===0) for(let k=0;k<3;k++) mVoice('sawtooth', MF(notes[k]+12)+(k?Math.random()*1.6:0), t, 1.9, 0.04+mMood*0.025, 700+mMood*700, 0.7);   // pad (triad, slow)

  get dust(){ return dust; }, get parts(){ return parts; },   // живые частицы физики (пыль/выхлоп) → рисуем в 3D-мире
  get bikeVX(){ return bike?bike.vx:0; }, get down(){ return typeof down!=='undefined'?down:false; }, get onG(){ return bike?bike.onG:false; },
  get biome(){ return BIOMES[(((zone||0)%BIOMES.length)+BIOMES.length)%BIOMES.length]; },   // текущая рыночная эпоха (sky/ridge/line-палитра) → тинт 3D-неба/тумана
  // недавний тренд рынка у байка: 0=всё падение(красный) .. 1=всё рост(зелёный) → цвет города «дышит» рынком
  marketBias(){ if(!terr||terr.length<6)return 0.5; const i1=Math.min(terr.length-1,Math.floor(bike.x/STEP)+2), i0=Math.max(1,i1-26); let up=0,n=0; for(let i=i0;i<=i1;i++){ if(terr[i]&&!terr[i].gap){ n++; if(terr[i].up)up++; } } return n?up/n:0.5; }
};
toTitle();
if(TRIALS25){ try{ PSP_ON=false; }catch(e){} }   // b266: trials25d = ТОЛЬКО визуальный скин; меню/режимы/старая игра НЕ трогаются (авто-старт убран — он и прятал режимы). Плоская геометрия трассы (скин поверх). Откат: ?render=game
if(ACCEPT25){ try{ PSP_ON=false; trackSource='proc'; gameMode='endless'; reset(); screen='play'; }catch(e){ console.error('acceptance25d',e); } }   // b267: авто-старт DEBUG-уровня (только под ?track=acceptance25d)
if(RIG_ART){ try{ PSP_ON=false; trackSource='proc'; gameMode='endless'; reset(); screen='play'; }catch(e){ console.error('rig=articulated',e); } }   // b271: авто-старт настоящей игры на тест-трассе с articulated-ригом (side, legacy-физика)
if(RIG_CUT){ try{ PSP_ON=false; trackSource='proc'; gameMode='endless'; reset(); screen='play'; }catch(e){ console.error('rig=cutout',e); } }   // b273: авто-старт тест-трассы с cutout-райдером
// apply shake in draw by jittering before skyGrad
const _draw=draw; draw=function(){ if(screen!=='play'){ if(shake>0.01)shake*=0.8; if(flash>0.01)flash*=0.85; if(gflash>0.01)gflash*=0.85; }   // b74 FIX «трясучка»: shake/flash/gflash затухали только в update() (а он не идёт вне игры) → на dead/garage тряслось вечно. Теперь гасим и вне игры
  if(shake>0.3){ctx.save();ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);_draw();ctx.restore();}else _draw(); };
requestAnimationFrame(loop);
</script>
