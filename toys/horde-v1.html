<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CIPHER // OVERRIDE — horde v1</title>
<style>
  html,body{margin:0;height:100%;background:#04060a;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    cursor:crosshair;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  canvas{display:block;}
  #hud{position:fixed;top:12px;left:14px;color:#5f7488;font-size:12px;letter-spacing:.1em;line-height:1.55;pointer-events:none;}
  #hud .t{color:#e8f6ff;font-size:13px;letter-spacing:.2em;} #hud .free{color:#54e6c8;}
  #hud b{color:#9fe9ff;}
  #bars{position:fixed;top:12px;right:14px;width:180px;pointer-events:none;}
  .bar{width:100%;height:9px;border:1px solid #1d2a38;border-radius:5px;overflow:hidden;margin-bottom:6px;}
  .bar > i{display:block;height:100%;width:100%;}
  #hpb > i{background:#ff5d6e;} #xpb > i{background:#9fe9ff;}
  .blab{font-size:9px;letter-spacing:.18em;color:#3c4c5e;text-align:right;margin-bottom:2px;}
  #hint{position:fixed;bottom:12px;left:0;width:100%;text-align:center;color:#3c4c5e;font-size:11px;letter-spacing:.12em;pointer-events:none;}
  #hint b{color:#7fd6ff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="t">CIPHER<span style="color:#33424f"> // </span><span class="free">OVERRIDE</span></div>
  <div>time <b id="time">0</b>s</div>
  <div>kills <b id="kills">0</b></div>
  <div>level <b id="level">1</b></div>
  <div id="bestl">best 0</div>
</div>
<div id="bars">
  <div class="blab">INTEGRITY</div><div class="bar" id="hpb"><i></i></div>
  <div class="blab">DECRYPT (XP)</div><div class="bar" id="xpb"><i style="width:0%"></i></div>
</div>
<div id="hint"></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d'); let W,H,DPR;
function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=innerWidth;H=innerHeight; cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

let P, foes, shots, gems, orbs, parts, pops, fx;
let t=0, kills=0, best=0, spawnT, spawnInt, screen='title', paused=false, cards=[], shake=0, flash=0, camShakeT=0;
let aim={x:0,y:0}, ptrActive=false;
try{ best=+localStorage.getItem('cipher_horde_best')||0; }catch(e){}

function freshP(){ return {x:W/2,y:H/2,hp:100,maxHp:100,speed:2.7,r:11,fireT:0,fireInt:26,dmg:9,pspd:6.4,pcount:1,pierce:0,spread:0.18,pickupR:78,level:1,xp:0,xpNext:5,iframe:0,orbN:0,orbDmg:7,face:0}; }
function startRun(){ P=freshP(); foes=[];shots=[];gems=[];orbs=[];parts=[];pops=[];fx=[]; t=0;kills=0;spawnT=0;spawnInt=46;paused=false;screen='play'; updateHint(); }

addEventListener('mousemove',e=>{aim.x=e.clientX;aim.y=e.clientY;ptrActive=true;});
addEventListener('mousedown',e=>{ if(e.button!==0)return; resumeAudio(); aim.x=e.clientX;aim.y=e.clientY;ptrActive=true; if(screen==='title'||screen==='dead'){startRun();return;} if(paused)pickCard(e.clientX,e.clientY); });
addEventListener('touchstart',e=>{const z=e.touches[0];aim.x=z.clientX;aim.y=z.clientY;ptrActive=true;resumeAudio(); if(screen==='title'||screen==='dead'){startRun();e.preventDefault();return;} if(paused)pickCard(z.clientX,z.clientY); e.preventDefault();},{passive:false});
addEventListener('touchmove',e=>{const z=e.touches[0];aim.x=z.clientX;aim.y=z.clientY;ptrActive=true;e.preventDefault();},{passive:false});
addEventListener('touchend',()=>ptrActive=false);
addEventListener('keydown',e=>{ if(e.key==='r'||e.key==='R'){screen='title';} });

function rnd(a,b){return a+Math.random()*(b-a);} function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

let actx;
function resumeAudio(){ try{actx=actx||new(window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume();}catch(e){} }
function beep(f,d,v,ty){ try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.frequency.value=f;o.type=ty||'sine';g.gain.setValueAtTime(0.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(v,actx.currentTime+0.008);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+d+0.02);}catch(e){} }

function spawnFoe(){ const edge=Math.floor(rnd(0,4)); let x,y; if(edge===0){x=rnd(0,W);y=-20;}else if(edge===1){x=W+20;y=rnd(0,H);}else if(edge===2){x=rnd(0,W);y=H+20;}else{x=-20;y=rnd(0,H);}
  const hpScale=1+t/2400; const heavy=t>1800&&Math.random()<0.14; const fast=t>1200&&Math.random()<0.22;
  foes.push({x,y, hp:(heavy?46:14)*hpScale, mhp:(heavy?46:14)*hpScale, r:heavy?16:fast?7:10, spd:heavy?1.0:fast?2.45:1.55, dmg:heavy?16:8, flash:0, t:Math.random()*6, fast, heavy}); }

function levelUp(){ P.level++; P.xp-=P.xpNext; P.xpNext=Math.round(P.xpNext*1.45+2);
  const pool=[
    {n:'RAPID FIRE',d:'fire 20% faster',c:'255,177,61',f:()=>P.fireInt=Math.max(6,P.fireInt*0.8)},
    {n:'OVERCLOCK',d:'+6 damage',c:'255,109,132',f:()=>P.dmg+=6},
    {n:'FORK',d:'+1 projectile',c:'120,255,176',f:()=>{P.pcount++;}},
    {n:'PIERCE',d:'shots pierce +1 enemy',c:'179,136,255',f:()=>P.pierce++},
    {n:'SWIFT',d:'+12% move speed',c:'63,176,255',f:()=>P.speed*=1.12},
    {n:'MAGNET',d:'bigger pickup radius',c:'159,235,255',f:()=>P.pickupR+=46},
    {n:'FIREWALL',d:'+30 max integrity & heal',c:'125,255,176',f:()=>{P.maxHp+=30;P.hp=Math.min(P.maxHp,P.hp+30);}},
    {n:'SENTINELS',d:'+1 orbiting blade',c:'255,225,140',f:()=>P.orbN++},
  ];
  cards=[]; const pk=[...pool]; for(let i=0;i<3&&pk.length;i++)cards.push(pk.splice(Math.floor(Math.random()*pk.length),1)[0]);
  paused=true; beep(660,0.1,0.06,'triangle'); beep(990,0.12,0.05,'triangle'); }
function cardRects(){ const n=cards.length,cw=Math.min(220,(W-60)/n),ch=160,gap=20,tw=n*cw+(n-1)*gap,x0=(W-tw)/2,y0=H/2-ch/2; cards.forEach((c,i)=>c.rect={x:x0+i*(cw+gap),y:y0,w:cw,h:ch}); }
function pickCard(mx,my){ for(const c of cards){const r=c.rect; if(r&&mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){ c.f(); paused=false; beep(880,0.1,0.07);beep(1320,0.1,0.05); return; }} }

function burst(x,y,n,col,sp){ for(let i=0;i<n;i++){const a=Math.random()*6.28,s=rnd(0.5,sp);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c:col});} }
function pop(x,y,txt,c){ pops.push({x,y,txt,c:c||'255,255,255',life:1}); }

function update(){
  t++;
  // ---- player move toward pointer ----
  if(ptrActive){ const dx=aim.x-P.x,dy=aim.y-P.y,d=Math.hypot(dx,dy); if(d>3){ P.face=Math.atan2(dy,dx); const s=Math.min(P.speed,d*0.3); P.x+=dx/d*P.speed; P.y+=dy/d*P.speed; } }
  P.x=Math.max(12,Math.min(W-12,P.x)); P.y=Math.max(12,Math.min(H-12,P.y));
  if(P.iframe>0)P.iframe--;

  // ---- spawn ----
  spawnInt=Math.max(11,46-t/90); spawnT++; const burstN=1+Math.floor(t/1500);
  if(spawnT>=spawnInt){ spawnT=0; for(let i=0;i<burstN;i++)spawnFoe(); }

  // ---- auto-fire at nearest foe ----
  P.fireT--; if(P.fireT<=0 && foes.length){ let near=null,nd=1e9; for(const f of foes){const d=dist(f,P);if(d<nd){nd=d;near=f;}}
    if(near){ const base=Math.atan2(near.y-P.y,near.x-P.x); const spread=P.spread*(P.pcount-1);
      for(let i=0;i<P.pcount;i++){ const a=base-spread/2+(P.pcount>1?spread*i/(P.pcount-1):0); shots.push({x:P.x,y:P.y,vx:Math.cos(a)*P.pspd,vy:Math.sin(a)*P.pspd,dmg:P.dmg,pierce:P.pierce,life:70}); }
      P.fireT=P.fireInt; beep(880,0.04,0.03,'square'); } }

  // ---- orbiting blades ----
  orbs=[]; for(let i=0;i<P.orbN;i++){ const a=t*0.07+i/P.orbN*6.28; orbs.push({x:P.x+Math.cos(a)*46,y:P.y+Math.sin(a)*46}); }

  // ---- foes ----
  for(const f of foes){ f.t+=0.1; const dx=P.x-f.x,dy=P.y-f.y,d=Math.hypot(dx,dy)||1; f.x+=dx/d*f.spd; f.y+=dy/d*f.spd; if(f.flash>0)f.flash--;
    // separation
    // contact damage
    if(d<P.r+f.r){ if(P.iframe<=0){ P.hp-=f.dmg; P.iframe=26; flash=1; shake=10; if(P.hp<=0){die();return;} } f.x-=dx/d*6; f.y-=dy/d*6; }
    // orb damage
    for(const o of orbs){ if(Math.hypot(o.x-f.x,o.y-f.y)<14+f.r){ f.hp-=P.orbDmg; f.flash=4; f.x-=dx/d*2;f.y-=dy/d*2; if(f.hp<=0){killFoe(f);} } }
  }
  // ---- shots ----
  for(const s of shots){ s.x+=s.vx;s.y+=s.vy;s.life--;
    for(const f of foes){ if(f.hp<=0)continue; if(Math.hypot(s.x-f.x,s.y-f.y)<f.r+3){ f.hp-=s.dmg; f.flash=4; f.x+=s.vx*0.5;f.y+=s.vy*0.5; pop(f.x,f.y-f.r-2,Math.round(s.dmg),'200,230,255'); if(f.hp<=0)killFoe(f); s.pierce--; if(s.pierce<0){s.life=0;break;} } } }
  shots=shots.filter(s=>s.life>0);
  foes=foes.filter(f=>f.hp>0);

  // ---- gems vacuum ----
  for(const g of gems){ const d=dist(g,P); if(d<P.pickupR){ const a=Math.atan2(P.y-g.y,P.x-g.x); const pull=Math.min(9,(P.pickupR-d)*0.18+2); g.x+=Math.cos(a)*pull; g.y+=Math.sin(a)*pull; }
    if(d<16){ g.got=true; P.xp+=g.v; if(P.xp>=P.xpNext)levelUp(); beep(1200,0.03,0.03,'sine'); } }
  gems=gems.filter(g=>!g.got);

  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=0.04;} parts=parts.filter(p=>p.life>0);
  for(const p of pops){p.y-=0.6;p.life-=0.03;} pops=pops.filter(p=>p.life>0);
  flash*=0.85; shake*=0.84;
}

function killFoe(f){ kills++; burst(f.x,f.y,f.heavy?16:8,f.heavy?'255,120,90':'255,80,100',f.heavy?4:3); beep(f.heavy?160:240,0.07,0.05,'square');
  const n=f.heavy?4:1; for(let i=0;i<n;i++) gems.push({x:f.x+rnd(-8,8),y:f.y+rnd(-8,8),v:f.heavy?3:1,got:false,t:Math.random()*6}); f.hp=0; }
function die(){ screen='dead'; shake=22; flash=1; beep(120,0.4,0.12,'sawtooth');beep(70,0.5,0.1,'sawtooth'); if(t>best){best=t;try{localStorage.setItem('cipher_horde_best',best);}catch(e){}} }
function updateHint(){ document.getElementById('hint').innerHTML='<b>drag</b> to move · your cipher auto-fires · grab <span style="color:#9fe9ff">data</span> to level up · survive the swarm'; }

// ===== render =====
function bg(){ ctx.globalCompositeOperation='source-over';ctx.fillStyle='#04060a';ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='lighter';ctx.strokeStyle='rgba(40,90,110,0.05)';ctx.lineWidth=1;const g=48;
  for(let x=0;x<W;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let y=0;y<H;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();} }
function draw(){ bg(); ctx.save(); ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); ctx.globalCompositeOperation='lighter';
  if(screen==='title'||screen==='dead'){ ctx.restore();
    ctx.globalCompositeOperation='source-over';ctx.textAlign='center';
    if(screen==='title'){ ctx.fillStyle='#e8f6ff';ctx.font='600 30px monospace';ctx.letterSpacing='10px';ctx.fillText('CIPHER',W/2,H*0.4);
      ctx.fillStyle='#54e6c8';ctx.font='14px monospace';ctx.letterSpacing='6px';ctx.fillText('OVERRIDE',W/2,H*0.4+30);
      ctx.fillStyle='#5f7488';ctx.font='12px monospace';ctx.letterSpacing='1px';ctx.fillText('one free node vs the swarm of Control',W/2,H*0.4+62);
      ctx.fillStyle='#7dffb0';ctx.fillText('tap / click to start',W/2,H*0.4+92); }
    else { ctx.fillStyle='#ff6d84';ctx.font='600 30px monospace';ctx.letterSpacing='8px';ctx.fillText('OVERRIDDEN',W/2,H*0.38);
      ctx.fillStyle='#e8f6ff';ctx.font='600 40px monospace';ctx.letterSpacing='2px';ctx.fillText(Math.floor(t/60)+'s',W/2,H*0.48);
      ctx.fillStyle='#5f7488';ctx.font='13px monospace';ctx.fillText('survived · '+kills+' purged',W/2,H*0.48+26);
      ctx.fillStyle= t>=best?'#ffd76a':'#5f7488';ctx.fillText((t>=best?'NEW BEST  ':'BEST  ')+Math.floor(best/60)+'s',W/2,H*0.56);
      ctx.fillStyle='#7dffb0';ctx.fillText('tap / click — run again',W/2,H*0.63); }
    ctx.letterSpacing='0px'; hud(); return; }
  // gems
  for(const g of gems){ const p=0.6+0.4*Math.sin(t*0.2+g.t); ctx.fillStyle=`rgba(159,233,255,${0.25*p})`;ctx.beginPath();ctx.arc(g.x,g.y,6+g.v,0,7);ctx.fill(); ctx.fillStyle='rgba(180,245,255,0.95)';ctx.beginPath();ctx.arc(g.x,g.y,2+g.v*0.6,0,7);ctx.fill(); }
  // shots
  for(const s of shots){ ctx.strokeStyle='rgba(180,235,255,0.9)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*1.6,s.y-s.vy*1.6);ctx.stroke(); }
  // foes (Control's Watchers/agents)
  for(const f of foes){ const col=f.flash>0?'255,255,255':f.heavy?'255,120,90':f.fast?'255,170,80':'255,70,90';
    ctx.fillStyle=`rgba(${col},0.16)`;ctx.beginPath();ctx.arc(f.x,f.y,f.r+5,0,7);ctx.fill();
    ctx.fillStyle=`rgba(${col},0.32)`;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,7);ctx.fill();
    ctx.strokeStyle=`rgba(${col},0.9)`;ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,7);ctx.stroke();
    const a=Math.atan2(P.y-f.y,P.x-f.x); ctx.fillStyle=`rgba(${col},1)`;ctx.beginPath();ctx.arc(f.x+Math.cos(a)*f.r*0.4,f.y+Math.sin(a)*f.r*0.4,f.r*0.34,0,7);ctx.fill(); }
  // orbs
  for(const o of orbs){ ctx.fillStyle='rgba(255,225,140,0.25)';ctx.beginPath();ctx.arc(o.x,o.y,12,0,7);ctx.fill(); ctx.fillStyle='rgba(255,235,170,0.95)';ctx.beginPath();ctx.arc(o.x,o.y,5,0,7);ctx.fill(); }
  // particles
  for(const p of parts){ ctx.fillStyle=`rgba(${p.c},${p.life})`;ctx.beginPath();ctx.arc(p.x,p.y,1.5+p.life*2.5,0,7);ctx.fill(); }
  // player (the free node)
  const it=P.iframe>0&&Math.floor(t/3)%2===0;
  ctx.fillStyle='rgba(84,230,200,0.22)';ctx.beginPath();ctx.arc(P.x,P.y,P.r+8,0,7);ctx.fill();
  ctx.save();ctx.translate(P.x,P.y);ctx.rotate(P.face); ctx.fillStyle=it?'rgba(255,255,255,0.9)':'rgba(120,255,210,0.95)';ctx.beginPath();ctx.moveTo(P.r+3,0);ctx.lineTo(-P.r*0.7,P.r*0.7);ctx.lineTo(-P.r*0.3,0);ctx.lineTo(-P.r*0.7,-P.r*0.7);ctx.closePath();ctx.fill();ctx.restore();
  ctx.restore();
  // pops
  ctx.globalCompositeOperation='source-over';
  for(const p of pops){ ctx.fillStyle=`rgba(${p.c},${p.life})`;ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText(p.txt,p.x,p.y); }
  if(flash>0.01){ctx.fillStyle=`rgba(255,40,70,${flash*0.32})`;ctx.fillRect(0,0,W,H);}
  // level-up cards
  if(paused){ cardRects(); ctx.fillStyle='rgba(4,6,10,0.9)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#9fe9ff';ctx.font='600 16px monospace';ctx.textAlign='center';ctx.letterSpacing='4px';ctx.fillText('LEVEL '+P.level+' — UPGRADE',W/2,cards[0].rect.y-34);
    ctx.font='10px monospace';ctx.fillStyle='#3c5566';ctx.fillText('tap a card',W/2,cards[0].rect.y-16);
    for(const c of cards){const r=c.rect;ctx.fillStyle='rgba(20,32,40,0.95)';ctx.strokeStyle=`rgb(${c.c})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(r.x+10,r.y);ctx.arcTo(r.x+r.w,r.y,r.x+r.w,r.y+r.h,10);ctx.arcTo(r.x+r.w,r.y+r.h,r.x,r.y+r.h,10);ctx.arcTo(r.x,r.y+r.h,r.x,r.y,10);ctx.arcTo(r.x,r.y,r.x+r.w,r.y,10);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle=`rgb(${c.c})`;ctx.font='600 15px monospace';ctx.letterSpacing='1px';ctx.fillText(c.n,r.x+r.w/2,r.y+54);
      ctx.fillStyle='#9fbecb';ctx.font='12px monospace';ctx.letterSpacing='0px';ctx.fillText(c.d,r.x+r.w/2,r.y+90);}
    ctx.letterSpacing='0px'; }
  hud();
}
function hud(){ if(!P)return; document.getElementById('time').textContent=Math.floor(t/60); document.getElementById('kills').textContent=kills; document.getElementById('level').textContent=P.level; document.getElementById('bestl').textContent='best '+Math.floor(best/60)+'s';
  document.querySelector('#hpb > i').style.width=Math.max(0,P.hp/P.maxHp*100)+'%'; document.querySelector('#xpb > i').style.width=Math.min(100,P.xp/P.xpNext*100)+'%'; }
function loop(){ if(screen==='play'&&!paused)update(); draw(); requestAnimationFrame(loop); }
P=freshP(); foes=[];shots=[];gems=[];orbs=[];parts=[];pops=[];fx=[]; requestAnimationFrame(loop);
</script>
</body>
</html>
