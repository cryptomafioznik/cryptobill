<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOY — Sever</title>
<style>
  html,body{margin:0;height:100%;background:#070a0f;overflow:hidden;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;cursor:none;}
  canvas{display:block;}
  #hud{position:fixed;top:14px;left:16px;color:#5f7488;font-size:12px;
    letter-spacing:.12em;line-height:1.7;pointer-events:none;user-select:none;}
  #hud b{color:#9fe9ff;font-weight:600;}
  #hud .big{color:#e8f6ff;font-size:13px;letter-spacing:.18em;}
  #hint{position:fixed;bottom:16px;left:0;width:100%;text-align:center;
    color:#3c4c5e;font-size:11px;letter-spacing:.2em;pointer-events:none;user-select:none;}
  kbd{color:#7fd6ff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="big">SEVER</div>
  <div>links <b id="links">0</b></div>
  <div>severed <b id="cut">0</b></div>
  <div>tension <b id="ten">—</b></div>
</div>
<div id="hint">hold &amp; drag to cut the mesh &nbsp;·&nbsp; <kbd>R</kbd> rebuild &nbsp;·&nbsp; <kbd>G</kbd> gravity</div>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

// ---- simulation state ----
let points = [], sticks = [], particles = [];
let GRAV = 0.42, FRICTION = 0.99, RELAX = 4;
let severed = 0;

function build(){
  points = []; sticks = []; particles = []; severed = 0;
  // a cloth-like mesh hanging from pinned top anchors
  const cols = Math.max(14, Math.floor(W/52));
  const rows = Math.max(9, Math.floor(H/64));
  const gx = W*0.62/(cols-1);
  const gy = H*0.62/(rows-1);
  const ox = (W - gx*(cols-1))/2;
  const oy = H*0.12;
  const id = (r,c)=> r*cols+c;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x = ox + c*gx, y = oy + r*gy;
      // pin every other node on the top row -> load-bearing anchors
      const pinned = (r===0 && c%2===0);
      points.push({x,y,px:x,py:y,pinned});
    }
  }
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(c<cols-1) addStick(id(r,c), id(r,c+1));
      if(r<rows-1) addStick(id(r,c), id(r+1,c));
    }
  }
}
function addStick(a,b){
  const dx=points[a].x-points[b].x, dy=points[a].y-points[b].y;
  sticks.push({a,b,len:Math.hypot(dx,dy),cut:false,stress:0});
}

// ---- input: the blade ----
const blade = {x:0,y:0,px:0,py:0,down:false,trail:[]};
function setPos(e){
  const t = e.touches ? e.touches[0] : e;
  blade.px = blade.x; blade.py = blade.y;
  blade.x = t.clientX; blade.y = t.clientY;
}
cv.addEventListener('mousedown', e=>{blade.down=true; setPos(e); blade.px=blade.x; blade.py=blade.y;});
window.addEventListener('mouseup', ()=>blade.down=false);
window.addEventListener('mousemove', setPos);
cv.addEventListener('touchstart', e=>{blade.down=true; setPos(e); blade.px=blade.x; blade.py=blade.y; e.preventDefault();},{passive:false});
window.addEventListener('touchend', ()=>blade.down=false);
window.addEventListener('touchmove', e=>{setPos(e); e.preventDefault();},{passive:false});
window.addEventListener('keydown', e=>{
  if(e.key==='r'||e.key==='R') build();
  if(e.key==='g'||e.key==='G') GRAV = GRAV>0 ? 0 : 0.42;
});

// segment intersection (blade path vs link)
function segHit(ax,ay,bx,by,cx,cy,dx,dy){
  const d = (bx-ax)*(dy-cy)-(by-ay)*(dx-cx);
  if(Math.abs(d)<1e-6) return false;
  const t = ((cx-ax)*(dy-cy)-(cy-ay)*(dx-cx))/d;
  const u = ((cx-ax)*(by-ay)-(cy-ay)*(bx-ax))/d;
  return t>=0&&t<=1&&u>=0&&u<=1;
}

// ---- audio: a short snap ----
let actx;
function snap(stress){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type='triangle';
    const f = 180 + stress*520 + Math.random()*60;
    o.frequency.setValueAtTime(f, actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*0.4, actx.currentTime+0.09);
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.12+stress*0.12, actx.currentTime+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+0.12);
    o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime+0.13);
  }catch(e){}
}

let shake = 0;
function cutStick(s){
  s.cut = true; severed++;
  shake = Math.min(14, shake + 3 + s.stress*8);
  snap(Math.min(1,s.stress));
  const A=points[s.a], B=points[s.b];
  const mx=(A.x+B.x)/2, my=(A.y+B.y)/2;
  const n = 5 + Math.floor(s.stress*10);
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*(2+s.stress*5);
    particles.push({x:mx,y:my,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,hot:s.stress});
  }
}

// ---- update ----
function update(){
  // verlet integrate
  for(const p of points){
    if(p.pinned) continue;
    const vx=(p.x-p.px)*FRICTION, vy=(p.y-p.py)*FRICTION;
    p.px=p.x; p.py=p.y;
    p.x+=vx; p.y+=vy+GRAV;
  }
  // satisfy constraints
  for(let k=0;k<RELAX;k++){
    for(const s of sticks){
      if(s.cut) continue;
      const A=points[s.a], B=points[s.b];
      let dx=B.x-A.x, dy=B.y-A.y;
      const d=Math.hypot(dx,dy)||0.0001;
      const diff=(s.len-d)/d;
      s.stress = Math.min(1, Math.abs(d-s.len)/s.len*2.2);
      const ox=dx*0.5*diff, oy=dy*0.5*diff;
      if(!A.pinned){A.x-=ox;A.y-=oy;}
      if(!B.pinned){B.x+=ox;B.y+=oy;}
    }
  }
  // bounds
  for(const p of points){
    if(p.y>H-4){p.y=H-4; p.py=p.y+(p.py-p.y)*0.4;}
    if(p.x<4){p.x=4;} if(p.x>W-4){p.x=W-4;}
  }
  // blade cutting
  if(blade.down){
    const moved = Math.hypot(blade.x-blade.px, blade.y-blade.py);
    if(moved>0.5){
      for(const s of sticks){
        if(s.cut) continue;
        const A=points[s.a], B=points[s.b];
        if(segHit(blade.px,blade.py,blade.x,blade.y, A.x,A.y,B.x,B.y)) cutStick(s);
      }
    }
  }
  // blade trail
  blade.trail.push({x:blade.x,y:blade.y});
  if(blade.trail.length>14) blade.trail.shift();
  // particles
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.vx*=0.97; p.life-=0.03; }
  particles = particles.filter(p=>p.life>0);
  shake *= 0.85;
}

// ---- render ----
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle='#070a0f'; ctx.fillRect(0,0,W,H);
  const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  ctx.translate(sx,sy);

  ctx.globalCompositeOperation='lighter';
  // links, colored by stress (slack=cyan, taut=hot magenta)
  let liveLinks=0, maxStress=0;
  for(const s of sticks){
    if(s.cut) continue; liveLinks++;
    if(s.stress>maxStress) maxStress=s.stress;
    const A=points[s.a], B=points[s.b];
    const t=s.stress;
    const hue = 190 - t*150;            // 190 cyan -> 40 amber/red
    const li = 45 + t*25;
    // soft wide glow
    ctx.strokeStyle=`hsla(${hue},100%,${li}%,${0.10+t*0.18})`;
    ctx.lineWidth=4+t*5; ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke();
    // bright core
    ctx.strokeStyle=`hsla(${hue},100%,${70+t*20}%,${0.5+t*0.4})`;
    ctx.lineWidth=1+t*1.2; ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke();
  }
  // nodes
  for(const p of points){
    const r = p.pinned?4.5:2.2;
    ctx.fillStyle = p.pinned ? 'rgba(160,240,255,0.9)' : 'rgba(120,200,230,0.55)';
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,7); ctx.fill();
    if(p.pinned){ ctx.fillStyle='rgba(160,240,255,0.18)'; ctx.beginPath(); ctx.arc(p.x,p.y,11,0,7); ctx.fill(); }
  }
  // particles
  for(const p of particles){
    const hue = 200 - p.hot*160;
    ctx.fillStyle=`hsla(${hue},100%,${65+p.hot*25}%,${p.life})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.5+p.life*2.2,0,7); ctx.fill();
  }
  // blade trail
  if(blade.trail.length>1){
    for(let i=1;i<blade.trail.length;i++){
      const a=blade.trail[i-1], b=blade.trail[i];
      const al=i/blade.trail.length;
      ctx.strokeStyle=`rgba(180,250,255,${al*(blade.down?0.85:0.3)})`;
      ctx.lineWidth=al*(blade.down?3.5:1.5);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
  }
  // cursor
  ctx.globalCompositeOperation='lighter';
  ctx.fillStyle = blade.down?'rgba(255,90,140,0.9)':'rgba(150,230,255,0.8)';
  ctx.beginPath(); ctx.arc(blade.x,blade.y, blade.down?5:3.5,0,7); ctx.fill();
  ctx.globalCompositeOperation='source-over';

  document.getElementById('links').textContent=liveLinks;
  document.getElementById('cut').textContent=severed;
  const tEl=document.getElementById('ten');
  tEl.textContent = (maxStress*100|0)+'%';
  tEl.style.color = `hsl(${190-maxStress*150},100%,72%)`;
}

let last=performance.now();
function loop(now){
  update();
  draw();
  requestAnimationFrame(loop);
}
build();
requestAnimationFrame(loop);
</script>
</body>
</html>
