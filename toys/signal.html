<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOY — Signal</title>
<style>
  html,body{margin:0;height:100%;background:#05070b;overflow:hidden;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;cursor:crosshair;}
  canvas{display:block;}
  #hud{position:fixed;top:14px;left:16px;color:#5f7488;font-size:12px;
    letter-spacing:.12em;line-height:1.7;pointer-events:none;user-select:none;}
  #hud b{color:#9fe9ff;font-weight:600;}
  #hud .big{color:#e8f6ff;font-size:13px;letter-spacing:.18em;}
  #hint{position:fixed;bottom:16px;left:0;width:100%;text-align:center;
    color:#3c4c5e;font-size:11px;letter-spacing:.2em;pointer-events:none;user-select:none;}
  #vis{position:fixed;top:16px;right:16px;width:150px;height:8px;border:1px solid #1d2a38;
    border-radius:4px;overflow:hidden;}
  #visfill{height:100%;width:0%;background:#7fd6ff;transition:background .1s;}
  #vislabel{position:fixed;top:30px;right:16px;color:#3c4c5e;font-size:10px;letter-spacing:.2em;text-align:right;width:150px;}
  kbd{color:#7fd6ff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="big">SIGNAL</div>
  <div>delivered <b id="score">0</b></div>
  <div>caught <b id="caught">0</b></div>
  <div id="carry">— empty</div>
</div>
<div id="vis"><div id="visfill"></div></div>
<div id="vislabel">VISIBILITY</div>
<div id="hint">move toward the cursor to carry signal &nbsp;·&nbsp; <b style="color:#7fd6ff">stop to go dark</b> &nbsp;·&nbsp; grab the packet, reach the gate</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',()=>{resize();layout();}); resize();

// ---- state ----
const player={x:0,y:0,vx:0,vy:0,vis:0};
const mouse={x:0,y:0,inside:false};
let scanners=[], packet=null, gate=null;
let score=0, caught=0, carrying=false;
let flash=0, shake=0, rings=[];

addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.inside=true;});
addEventListener('mouseleave',()=>mouse.inside=false);

function layout(){
  player.x=W*0.5; player.y=H*0.85; player.vx=player.vy=0;
  gate={x:W*0.5,y:H*0.12,r:46};
  scanners=[
    {x:W*0.28,y:H*0.42,ang:0,spd:0.011,arc:0.42,range:Math.max(W,H)*0.55},
    {x:W*0.72,y:H*0.40,ang:Math.PI,spd:-0.014,arc:0.38,range:Math.max(W,H)*0.55},
    {x:W*0.5,y:H*0.62,ang:1.4,spd:0.018,arc:0.34,range:Math.max(W,H)*0.5},
  ];
  spawnPacket();
}
function spawnPacket(){
  // spawn somewhere in the contested middle band
  packet={x:W*(0.2+Math.random()*0.6), y:H*(0.45+Math.random()*0.3), r:9, pulse:0};
  carrying=false;
}

// ---- audio ----
let actx;
function beep(f,dur,vol){
  try{ actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.frequency.value=f; o.type='sine';
    g.gain.setValueAtTime(0.0001,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(vol,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
    o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+dur+0.02);
  }catch(e){}
}

function angDiff(a,b){let d=((a-b)%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI;return Math.abs(d);}

function update(){
  // player eases toward cursor -> movement is a choice
  if(mouse.inside){
    const dx=mouse.x-player.x, dy=mouse.y-player.y;
    player.vx += dx*0.012; player.vy += dy*0.012;
  }
  player.vx*=0.86; player.vy*=0.86;
  player.x+=player.vx; player.y+=player.vy;
  player.x=Math.max(12,Math.min(W-12,player.x));
  player.y=Math.max(12,Math.min(H-12,player.y));
  const speed=Math.hypot(player.vx,player.vy);

  // visibility: movement emits, stillness fades
  const target = Math.min(1, speed/7);
  if(target>player.vis) player.vis += (target-player.vis)*0.35;   // light up fast
  else player.vis += (target-player.vis)*0.06;                    // fade slow
  player.vis=Math.max(0,Math.min(1,player.vis));

  // emit signal rings while bright + moving
  if(player.vis>0.4 && speed>0.6 && Math.random()<player.vis*0.5){
    rings.push({x:player.x,y:player.y,r:6,life:1});
  }

  // scanners sweep; detect if you're lit AND inside a beam
  let detected=false;
  for(const s of scanners){
    s.ang += s.spd;
    const dx=player.x-s.x, dy=player.y-s.y;
    const dist=Math.hypot(dx,dy);
    if(dist<s.range && angDiff(Math.atan2(dy,dx), s.ang) < s.arc){
      if(player.vis>0.32){ detected=true; s.hot=1; }
    }
  }
  if(detected){ onCaught(); }

  // packet pickup
  if(packet && !carrying){
    packet.pulse=(packet.pulse+0.05)%(Math.PI*2);
    if(Math.hypot(player.x-packet.x,player.y-packet.y)<packet.r+12){
      carrying=true; beep(880,0.08,0.08);
    }
  }
  // deliver to gate
  if(carrying && Math.hypot(player.x-gate.x,player.y-gate.y)<gate.r){
    score++; beep(1320,0.14,0.1); beep(1760,0.16,0.06);
    spawnPacket();
  }

  for(const r of rings){ r.r+=2.4; r.life-=0.03; }
  rings=rings.filter(r=>r.life>0);
  for(const s of scanners){ if(s.hot) s.hot*=0.9; }
  flash*=0.88; shake*=0.85;
}

function onCaught(){
  caught++; flash=1; shake=16; beep(120,0.25,0.12); beep(90,0.3,0.1);
  carrying=false;
  if(packet) spawnPacket();
  // shove player back toward start, lose visibility
  player.x=W*0.5; player.y=H*0.85; player.vx=player.vy=0; player.vis=0;
}

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle='#05070b'; ctx.fillRect(0,0,W,H);
  ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

  // gate
  ctx.globalCompositeOperation='lighter';
  const gp=carrying?0.9:0.4;
  ctx.strokeStyle=`rgba(120,255,180,${gp})`; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(gate.x,gate.y,gate.r,0,7); ctx.stroke();
  ctx.fillStyle=`rgba(120,255,180,${0.06+ (carrying?0.10:0)})`;
  ctx.beginPath(); ctx.arc(gate.x,gate.y,gate.r,0,7); ctx.fill();
  ctx.fillStyle=`rgba(120,255,180,${0.5})`;
  ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText(carrying?'▲ DELIVER':'GATE', gate.x, gate.y+3);

  // scanners
  for(const s of scanners){
    const hot=s.hot||0;
    // beam cone
    const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.range);
    g.addColorStop(0,`rgba(255,${120-hot*100},${130-hot*90},${0.16+hot*0.2})`);
    g.addColorStop(1,'rgba(255,40,70,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.moveTo(s.x,s.y);
    ctx.arc(s.x,s.y,s.range,s.ang-s.arc,s.ang+s.arc); ctx.closePath(); ctx.fill();
    // emitter post
    ctx.fillStyle=`rgba(255,${90-hot*60},${120-hot*60},0.9)`;
    ctx.beginPath(); ctx.arc(s.x,s.y,5,0,7); ctx.fill();
    ctx.fillStyle=`rgba(255,80,110,0.15)`;
    ctx.beginPath(); ctx.arc(s.x,s.y,13,0,7); ctx.fill();
  }

  // signal rings (your emissions)
  for(const r of rings){
    ctx.strokeStyle=`rgba(150,220,255,${r.life*0.5})`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke();
  }

  // packet
  if(packet && !carrying){
    const pr=packet.r+Math.sin(packet.pulse)*2;
    ctx.fillStyle='rgba(255,220,120,0.18)';
    ctx.beginPath(); ctx.arc(packet.x,packet.y,pr+8,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,225,140,0.95)';
    ctx.beginPath(); ctx.arc(packet.x,packet.y,pr*0.5,0,7); ctx.fill();
    ctx.strokeStyle='rgba(255,225,140,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(packet.x,packet.y,pr,0,7); ctx.stroke();
  }

  // player — brightness == visibility (danger)
  const v=player.vis;
  const hue = 200 - v*200;            // dark cyan when hidden -> hot when exposed
  ctx.fillStyle=`hsla(${hue},100%,${30+v*45}%,${0.10+v*0.35})`;
  ctx.beginPath(); ctx.arc(player.x,player.y, 10+v*26, 0,7); ctx.fill();
  ctx.fillStyle=`hsla(${hue},100%,${60+v*30}%,${0.5+v*0.5})`;
  ctx.beginPath(); ctx.arc(player.x,player.y, 5+v*3, 0,7); ctx.fill();
  if(carrying){
    ctx.fillStyle='rgba(255,225,140,0.95)';
    ctx.beginPath(); ctx.arc(player.x,player.y,3,0,7); ctx.fill();
  }

  ctx.globalCompositeOperation='source-over';
  if(flash>0.01){ ctx.fillStyle=`rgba(255,40,70,${flash*0.4})`; ctx.fillRect(-50,-50,W+100,H+100); }

  // hud
  const vf=document.getElementById('visfill');
  vf.style.width=(v*100)+'%';
  vf.style.background = v>0.32 ? `hsl(${20+ (1-v)*0},90%,60%)` : '#3fb0ff';
  document.getElementById('score').textContent=score;
  document.getElementById('caught').textContent=caught;
  document.getElementById('carry').innerHTML = carrying?'<b style="color:#ffe18c">◆ carrying signal</b>':'— empty';
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
layout();
requestAnimationFrame(loop);
</script>
</body>
</html>
