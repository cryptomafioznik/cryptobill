<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0716"/>
      <stop offset="0.55" stop-color="#1c0f33"/>
      <stop offset="0.85" stop-color="#5c2350"/>
      <stop offset="1" stop-color="#c8583c"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="1" r="0.75">
      <stop offset="0" stop-color="#ffd682" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff8c5a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect y="256" width="512" height="256" fill="url(#sun)"/>
  <!-- свечи-город -->
  <g fill="#1e1434" opacity="0.92">
    <rect x="30"  y="268" width="36" height="244"/>
    <rect x="82"  y="318" width="36" height="194"/>
    <rect x="138" y="240" width="36" height="272"/>
    <rect x="194" y="344" width="36" height="168"/>
    <rect x="256" y="256" width="36" height="256"/>
    <rect x="317" y="326" width="36" height="186"/>
    <rect x="378" y="248" width="36" height="264"/>
    <rect x="440" y="300" width="36" height="212"/>
  </g>
  <!-- неон-линия графика (трасса) -->
  <polyline points="10,368 82,338 154,358 225,287 287,307 369,215 440,236 502,154"
    fill="none" stroke="#2fe6ff" stroke-opacity="0.35" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="10,368 82,338 154,358 225,287 287,307 369,215 440,236 502,154"
    fill="none" stroke="#5cf0ff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- байк-глиф над кикером -->
  <g transform="translate(338,185) rotate(-10) scale(1.35)" filter="url(#glow)"
     stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="-34" cy="20" r="20"/>
    <circle cx="34"  cy="20" r="20"/>
    <path d="M-34,20 L-8,-6 L20,-6 L34,20 M20,-6 L30,-22"/>
    <path d="M-6,-6 L2,-34"/>
    <circle cx="6" cy="-46" r="11" fill="#ffffff" stroke="none"/>
  </g>
</svg>
