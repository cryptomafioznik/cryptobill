<!doctype html><html lang="ru"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#08060f">
<title>DEPTH 3D — прототип глубины (одна картинка → настоящий параллакс)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#07060d;color:#e6ecfb;font:14px/1.4 ui-monospace,Menlo,monospace;overflow:hidden;overscroll-behavior:none}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  #stage{position:relative;border-radius:22px;overflow:hidden;box-shadow:0 30px 80px -20px #000,0 0 0 1px rgba(140,170,255,.09) inset;touch-action:none}
  canvas{display:block;background:#07060d}
  #status{position:absolute;left:14px;top:12px;font-weight:800;font-size:11px;letter-spacing:.4px;color:#fff;text-shadow:0 2px 12px #000;pointer-events:none;max-width:80%}
  #status small{display:block;font-weight:600;font-size:9.5px;color:#a9b6d8;margin-top:2px}
  #panel{width:min(94vw,520px);display:flex;flex-direction:column;gap:9px}
  .row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center}
  .lbl{font-size:9.5px;letter-spacing:1.2px;color:#7f8cb0;text-align:center;text-transform:uppercase;font-weight:700}
  button{appearance:none;border:1px solid rgba(150,175,235,.16);background:rgba(22,26,48,.72);color:#c7d2ee;padding:8px 12px;border-radius:11px;font:700 12px ui-monospace,monospace;cursor:pointer;transition:.14s}
  button:active{transform:scale(.95)}
  button.on{background:linear-gradient(160deg,rgba(120,90,255,.4),rgba(255,45,149,.28));border-color:rgba(180,160,255,.6);color:#fff;box-shadow:0 0 18px -4px rgba(150,110,255,.7)}
  input[type=range]{width:150px;accent-color:#8a6bff}
  label{font-size:11px;color:#aeb9db;display:flex;gap:8px;align-items:center}
  #hint{font-size:10px;color:#6b789c;text-align:center}
  .tog{padding:7px 10px;font-size:11px}
  .tog.on{background:linear-gradient(160deg,rgba(53,224,255,.26),rgba(38,180,230,.18));border-color:rgba(60,220,255,.55);color:#eafcff}
</style></head>
<body>
<div id="wrap">
  <div id="stage"><canvas id="gl"></canvas><div id="status"></div></div>
  <div id="panel">
    <div class="lbl">картинка (одна сцена → глубина)</div>
    <div class="row" id="imgRow">
      <button data-img="sunset" class="on">ЗАКАТ</button>
      <button data-img="night">НОЧЬ</button>
      <button data-img="twilight">СУМЕРКИ</button>
      <button data-img="day">ДЕНЬ</button>
    </div>
    <div class="row">
      <label>глубина <input id="strength" type="range" min="0" max="100" value="42"></label>
      <button class="tog on" id="fogT">туман</button>
      <button class="tog on" id="autoT">авто-камера</button>
      <button class="tog" id="depthT">карта глубины</button>
    </div>
    <div id="hint">Двигай пальцем/мышью по картинке — сцена имеет НАСТОЯЩУЮ глубину (одна картинка, авто-карта глубины, параллакс попиксельно). Камера сама дышит.</div>
  </div>
</div>
<script type="module">
const cv=document.getElementById('gl'), statusEl=document.getElementById('status');
const DPR=Math.min(2,window.devicePixelRatio||1);
let SW=0,SH=0;
function status(a,b){ statusEl.innerHTML='<b>'+a+'</b>'+(b?'<small>'+b+'</small>':''); }
function fit(){ const availH=Math.min(window.innerHeight-150,window.innerHeight*0.80), availW=Math.min(window.innerWidth-16,460);
  let h=availH,w=h*9/19.5; if(w>availW){w=availW;h=w*19.5/9;} SW=Math.round(w); SH=Math.round(h);
  const st=document.getElementById('stage'); st.style.width=SW+'px'; st.style.height=SH+'px';
  cv.style.width=SW+'px'; cv.style.height=SH+'px'; cv.width=Math.round(SW*DPR); cv.height=Math.round(SH*DPR);
  if(gl) gl.viewport(0,0,cv.width,cv.height); }
window.addEventListener('resize',fit);

// ---------- WebGL ----------
const gl=cv.getContext('webgl',{antialias:true,premultipliedAlpha:false});
if(!gl){ status('WebGL недоступен'); }
const VS=`attribute vec2 p; varying vec2 vUv; void main(){ vUv=vec2(p.x*0.5+0.5, 0.5-p.y*0.5); gl_Position=vec4(p,0.0,1.0); }`;
const FS=`precision highp float;
 uniform sampler2D uColor,uDepth; uniform vec2 uCam; uniform float uStr,uFog,uShowD,uAsp,uImgAsp,uT; varying vec2 vUv;
 void main(){
   // cover-fit the image into the frame (portrait frame, landscape image)
   vec2 uv=vUv; float fr=uAsp, im=uImgAsp;
   if(im>fr){ float s=fr/im; uv.x=(uv.x-0.5)*s+0.5; } else { float s=im/fr; uv.y=(uv.y-0.5)*s+0.5; }
   // overscan margin so parallax has room at edges
   uv=(uv-0.5)*0.90+0.5;
   // depth-parallax (iterative for occlusion). near = bright depth.
   vec2 base=uv; vec2 off=uCam*uStr;
   for(int i=0;i<4;i++){ float d=texture2D(uDepth,uv).r; uv=base - off*d; }
   float d=texture2D(uDepth,uv).r;
   if(uShowD>0.5){ gl_FragColor=vec4(vec3(d),1.0); return; }
   vec3 col=texture2D(uColor,uv).rgb;
   // atmospheric depth fog: far (low d) drifts to deep indigo + a soft light bloom near horizon
   vec3 fogc=vec3(0.12,0.10,0.26);
   col=mix(col, fogc, (1.0-d)*uFog*0.55);
   // subtle moving light sweep for life
   float sweep=0.04*uFog*smoothstep(0.0,1.0,sin(uv.x*3.0 - uT*0.6)*0.5+0.5)*d;
   col+=sweep;
   gl_FragColor=vec4(col,1.0);
 }`;
function sh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o); if(!gl.getShaderParameter(o,gl.COMPILE_STATUS)) status('shader err',gl.getShaderInfoLog(o)); return o; }
let prog,loc={};
if(gl){ prog=gl.createProgram(); gl.attachShader(prog,sh(gl.VERTEX_SHADER,VS)); gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FS)); gl.linkProgram(prog); gl.useProgram(prog);
  const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const pl=gl.getAttribLocation(prog,'p'); gl.enableVertexAttribArray(pl); gl.vertexAttribPointer(pl,2,gl.FLOAT,false,0,0);
  for(const n of ['uColor','uDepth','uCam','uStr','uFog','uShowD','uAsp','uImgAsp','uT']) loc[n]=gl.getUniformLocation(prog,n);
}
function makeTex(unit){ const t=gl.createTexture(); gl.activeTexture(gl.TEXTURE0+unit); gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR); return t; }
let colorTex, depthTex, imgAsp=16/9, ready=false;
function upload(unit,tex,src){ gl.activeTexture(gl.TEXTURE0+unit); gl.bindTexture(gl.TEXTURE_2D,tex); gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,src); }

// ---------- depth: transformers.js (Depth-Anything) with heuristic fallback ----------
let depthPipe=null, depthTried=false;
async function initDepth(){ if(depthTried)return; depthTried=true;
  try{ status('Загружаю модель глубины…','первый раз ~30-60с (кэшируется)');
    const mod=await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3');
    mod.env.allowLocalModels=false; mod.env.useBrowserCache=true;
    depthPipe=await mod.pipeline('depth-estimation','onnx-community/depth-anything-v2-small');
    status('Модель глубины готова','переключи картинку — пересчитаю точную глубину');
  }catch(e){ depthPipe=null; status('ML-глубина недоступна','эвристика по сцене · '+(e&&e.message||e)); }
}
function heuristicDepth(imgEl){ const S=256, dc=document.createElement('canvas'); const rw=S, rh=Math.round(S/ (imgEl.naturalWidth/imgEl.naturalHeight));
  dc.width=rw; dc.height=rh; const c=dc.getContext('2d'); c.drawImage(imgEl,0,0,rw,rh); const id=c.getImageData(0,0,rw,rh), d=id.data;
  for(let y=0;y<rh;y++)for(let x=0;x<rw;x++){ const i=(y*rw+x)*4; const lum=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114)/255; const yn=y/rh;
    // near (high) = lower in frame + darker silhouettes; far (low) = top/bright sky
    let dep=yn*0.6 + (1-lum)*0.4; dep=Math.max(0,Math.min(1,dep)); const v=Math.round(dep*255); d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
  c.putImageData(id,0,0); return dc; }
async function computeDepth(imgEl){
  if(depthPipe){ try{ status('Считаю карту глубины…');
    const out=await depthPipe(imgEl.src); const r=out.depth; // RawImage grayscale, near=bright
    const dc=document.createElement('canvas'); dc.width=r.width; dc.height=r.height; const c=dc.getContext('2d'); const id=c.createImageData(r.width,r.height);
    const ch=r.channels||1, src=r.data; for(let i=0;i<r.width*r.height;i++){ const v=src[i*ch]; id.data[i*4]=v; id.data[i*4+1]=v; id.data[i*4+2]=v; id.data[i*4+3]=255; }
    c.putImageData(id,0,0); return dc;
  }catch(e){ status('Ошибка глубины','эвристика · '+(e&&e.message||e)); } }
  return heuristicDepth(imgEl);
}

// ---------- load an image + depth ----------
const IMGS={}; let curImg='sunset';
function loadImg(name){ return new Promise((res,rej)=>{ if(IMGS[name])return res(IMGS[name]); const im=new Image(); im.crossOrigin='anonymous';
  im.onload=()=>{IMGS[name]=im; res(im);}; im.onerror=rej; im.src='assets/world/vice/'+name+'.jpg'; }); }
async function setImage(name){ curImg=name; ready=false; status('Гружу '+name+'…');
  const im=await loadImg(name); imgAsp=im.naturalWidth/im.naturalHeight;
  colorTex=colorTex||makeTex(0); upload(0,colorTex,im);
  const dc=await computeDepth(im); depthTex=depthTex||makeTex(1); upload(1,depthTex,dc); depthCanvas=dc;
  ready=true; status('Готово · '+name,'двигай палец/мышь — глубина живая');
  try{ const t=document.createElement('canvas'), s=384/dc.width; t.width=384; t.height=Math.round(dc.height*s); t.getContext('2d').drawImage(dc,0,0,t.width,t.height); window.__depthURL=t.toDataURL('image/png'); window.__depthName=name; }catch(e){} }
let depthCanvas=null;

// ---------- input + loop ----------
let px=0,py=0,tx=0,ty=0, T=0, autoOn=true, fogOn=true, showD=false, strength=0.42;
const stage=document.getElementById('stage');
stage.addEventListener('pointermove',e=>{ const r=cv.getBoundingClientRect(); tx=((e.clientX-r.left)/r.width-0.5)*2; ty=((e.clientY-r.top)/r.height-0.5)*2; });
stage.addEventListener('pointerleave',()=>{ tx=0; ty=0; });
window.addEventListener('deviceorientation',e=>{ if(e.gamma!=null){ tx=Math.max(-1,Math.min(1,e.gamma/25)); ty=Math.max(-1,Math.min(1,(e.beta-45)/25)); } });
function loop(){ requestAnimationFrame(loop); if(!gl||!ready)return; T+=0.016;
  const ax=autoOn?Math.sin(T*0.5)*0.5:0, ay=autoOn?Math.sin(T*0.33)*0.18:0;
  px+=((tx+ax)-px)*0.06; py+=((ty+ay)-py)*0.06;
  gl.useProgram(prog); gl.uniform1i(loc.uColor,0); gl.uniform1i(loc.uDepth,1);
  gl.uniform2f(loc.uCam, px*0.12, py*0.07); gl.uniform1f(loc.uStr,strength); gl.uniform1f(loc.uFog,fogOn?1:0);
  gl.uniform1f(loc.uShowD,showD?1:0); gl.uniform1f(loc.uAsp, cv.width/cv.height); gl.uniform1f(loc.uImgAsp,imgAsp); gl.uniform1f(loc.uT,T);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}
// ---------- UI ----------
document.getElementById('imgRow').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove('on')); b.classList.add('on'); setImage(b.dataset.img); });
document.getElementById('strength').addEventListener('input',e=>{ strength=e.target.value/100*0.9; });
document.getElementById('fogT').addEventListener('click',e=>{ fogOn=!fogOn; e.target.classList.toggle('on',fogOn); });
document.getElementById('autoT').addEventListener('click',e=>{ autoOn=!autoOn; e.target.classList.toggle('on',autoOn); });
document.getElementById('depthT').addEventListener('click',e=>{ showD=!showD; e.target.classList.toggle('on',showD); });

fit(); requestAnimationFrame(loop);
strength=0.42*0.9;
status('Инициализация…');
setImage('sunset').then(()=>initDepth().then(()=>setImage(curImg)));
</script>
</body></html>
