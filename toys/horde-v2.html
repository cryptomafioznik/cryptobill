<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CIPHER // OVERRIDE — horde v2</title>
<style>
  html,body{margin:0;height:100%;background:#04060a;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    cursor:crosshair;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  canvas{display:block;}
  #hud{position:fixed;top:12px;left:14px;color:#5f7488;font-size:12px;letter-spacing:.1em;line-height:1.5;pointer-events:none;}
  #hud .t{color:#e8f6ff;font-size:13px;letter-spacing:.2em;} #hud .free{color:#54e6c8;} #hud b{color:#9fe9ff;}
  #bars{position:fixed;top:12px;right:14px;width:178px;pointer-events:none;}
  .bar{width:100%;height:9px;border:1px solid #1d2a38;border-radius:5px;overflow:hidden;margin-bottom:6px;}
  .bar > i{display:block;height:100%;width:100%;transition:width .08s;}
  #hpb > i{background:linear-gradient(90deg,#ff3d5e,#ff8a5e);} #xpb > i{background:linear-gradient(90deg,#3fb0ff,#9fe9ff);}
  .blab{font-size:9px;letter-spacing:.18em;color:#3c4c5e;text-align:right;margin-bottom:2px;}
  #hint{position:fixed;bottom:12px;left:0;width:100%;text-align:center;color:#3c4c5e;font-size:11px;letter-spacing:.12em;pointer-events:none;}
  #hint b{color:#7fd6ff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="t">CIPHER<span style="color:#33424f"> // </span><span class="free">OVERRIDE</span></div>
  <div>time <b id="time">0</b>s</div><div>kills <b id="kills">0</b></div><div>lv <b id="level">1</b></div><div id="bestl">best 0</div>
</div>
<div id="bars"><div class="blab">INTEGRITY</div><div class="bar" id="hpb"><i></i></div><div class="blab">DECRYPT</div><div class="bar" id="xpb"><i style="width:0%"></i></div></div>
<div id="hint"></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d'); let W,H,DPR;
function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=innerWidth;H=innerHeight; cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

// ---- optional sprite art: drop PNGs into assets/game/ (see assets/game/PROMPTS.md) — auto-detected, vector fallback otherwise ----
const ART={}; let floorPat=null;
const ART_FILES={hero:'hero.png',drone:'foe_drone.png',hound:'foe_hound.png',brute:'foe_brute.png',boss:'boss_overseer.png',shard:'pickup_shard.png',bolt:'fx_bolt.png',floor:'bg_floor.png'};
for(const k in ART_FILES){ const im=new Image(); im.onload=()=>{ ART[k]=im; if(k==='floor'){ floorPat=ctx.createPattern(im,'repeat'); try{ floorPat.setTransform(new DOMMatrix().scale(Math.min(1,512/im.width))); }catch(e){} } }; im.src='../assets/game/'+ART_FILES[k]; }
function sprite(k,x,y,size,flip,alpha,rot){ const im=ART[k]; if(!im)return false; const sc=size/Math.max(im.width,im.height),w=im.width*sc,h=im.height*sc;
  ctx.save(); ctx.globalCompositeOperation='source-over'; if(alpha!=null)ctx.globalAlpha=alpha; ctx.translate(x,y); if(rot)ctx.rotate(rot); if(flip)ctx.scale(-1,1); ctx.drawImage(im,-w/2,-h/2,w,h); ctx.restore(); return true; }

let P, foes, shots, gems, orbs, parts, pops, waves, fx;
let t=0, kills=0, best=0, spawnT, spawnInt, screen='title', paused=false, cards=[], shake=0, flash=0, hitstop=0, lvflash=0;
const keys={}; const stick={active:false,ox:0,oy:0,dx:0,dy:0,id:null};
try{ best=+localStorage.getItem('cipher_horde2_best')||0; }catch(e){}
function vibe(p){ try{navigator.vibrate&&navigator.vibrate(p);}catch(e){} }

function freshP(){ return {x:W/2,y:H/2,hp:100,maxHp:100,speed:2.8,r:12,fireT:0,fireInt:25,dmg:10,pspd:7,pcount:1,pierce:0,spread:0.2,pickupR:80,level:1,xp:0,xpNext:5,iframe:0,orbN:0,orbDmg:8,face:0,bob:0}; }
function startRun(){ P=freshP(); foes=[];shots=[];gems=[];orbs=[];parts=[];pops=[];waves=[];fx=[]; t=0;kills=0;spawnT=0;spawnInt=46;paused=false;hitstop=0;screen='play'; updateHint(); }

addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; if(e.key==='r'||e.key==='R')screen='title'; if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))e.preventDefault(); });
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
addEventListener('mousedown',e=>{ if(e.button!==0)return; resumeAudio(); if(screen!=='play'){startRun();return;} if(paused)pickCard(e.clientX,e.clientY); });
addEventListener('touchstart',e=>{ resumeAudio(); const z=e.changedTouches[0];
  if(screen!=='play'){startRun();e.preventDefault();return;}
  if(paused){pickCard(z.clientX,z.clientY);e.preventDefault();return;}
  stick.active=true; stick.id=z.identifier; stick.ox=z.clientX; stick.oy=z.clientY; stick.dx=0; stick.dy=0; e.preventDefault(); },{passive:false});
addEventListener('touchmove',e=>{ if(!stick.active)return; for(const z of e.changedTouches){ if(z.identifier===stick.id){ let dx=z.clientX-stick.ox,dy=z.clientY-stick.oy; const len=Math.hypot(dx,dy),R=58; if(len>R){dx=dx/len*R;dy=dy/len*R;} stick.dx=dx/R; stick.dy=dy/R; } } e.preventDefault(); },{passive:false});
addEventListener('touchend',e=>{ for(const z of e.changedTouches){ if(z.identifier===stick.id){stick.active=false;stick.dx=0;stick.dy=0;} } },{passive:false});

function rnd(a,b){return a+Math.random()*(b-a);} function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
let actx;
function resumeAudio(){ try{actx=actx||new(window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume();}catch(e){} }
function beep(f,d,v,ty){ try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.frequency.value=f;o.type=ty||'sine';g.gain.setValueAtTime(0.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(v,actx.currentTime+0.008);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+d+0.02);}catch(e){} }

function spawnFoe(){ const e=Math.floor(rnd(0,4)); let x,y; if(e===0){x=rnd(0,W);y=-20;}else if(e===1){x=W+20;y=rnd(0,H);}else if(e===2){x=rnd(0,W);y=H+20;}else{x=-20;y=rnd(0,H);}
  const hs=1+t/2200; let type='drone'; if(t>1700&&Math.random()<0.15)type='brute'; else if(t>1000&&Math.random()<0.24)type='hound';
  const cfg={drone:{hp:15,r:11,spd:1.5,dmg:8},hound:{hp:9,r:8,spd:2.5,dmg:7},brute:{hp:52,r:18,spd:0.95,dmg:18}}[type];
  foes.push({x,y,type,hp:cfg.hp*hs,mhp:cfg.hp*hs,r:cfg.r,spd:cfg.spd,dmg:cfg.dmg,flash:0,ph:Math.random()*6.28}); }

function levelUp(){ P.level++; P.xp-=P.xpNext; P.xpNext=Math.round(P.xpNext*1.45+2); lvflash=1; waves.push({x:P.x,y:P.y,r:10,mx:240,c:'159,233,255',w:3}); vibe([18,26,18]); beep(620,0.1,0.06,'triangle');beep(930,0.13,0.05,'triangle');
  const pool=[
    {n:'RAPID FIRE',d:'fire 20% faster',c:'255,177,61',f:()=>P.fireInt=Math.max(6,P.fireInt*0.8)},
    {n:'OVERCLOCK',d:'+7 damage',c:'255,109,132',f:()=>P.dmg+=7},
    {n:'FORK',d:'+1 projectile',c:'120,255,176',f:()=>P.pcount++},
    {n:'PIERCE',d:'shots pierce +1',c:'179,136,255',f:()=>P.pierce++},
    {n:'SWIFT',d:'+12% move speed',c:'63,176,255',f:()=>P.speed*=1.12},
    {n:'MAGNET',d:'bigger pickup radius',c:'159,235,255',f:()=>P.pickupR+=48},
    {n:'FIREWALL',d:'+30 integrity & heal',c:'125,255,176',f:()=>{P.maxHp+=30;P.hp=Math.min(P.maxHp,P.hp+30);}},
    {n:'SENTINELS',d:'+1 orbiting blade',c:'255,225,140',f:()=>P.orbN++},
  ];
  cards=[]; const pk=[...pool]; for(let i=0;i<3&&pk.length;i++)cards.push(pk.splice(Math.floor(Math.random()*pk.length),1)[0]); paused=true; }
function cardRects(){ const n=cards.length,cw=Math.min(220,(W-50)/n),ch=158,gap=18,tw=n*cw+(n-1)*gap,x0=(W-tw)/2,y0=H/2-ch/2; cards.forEach((c,i)=>c.rect={x:x0+i*(cw+gap),y:y0,w:cw,h:ch}); }
function pickCard(mx,my){ for(const c of cards){const r=c.rect; if(r&&mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){ c.f(); paused=false; vibe(12); beep(880,0.1,0.07);beep(1320,0.1,0.05); return; }} }

function burst(x,y,n,col,sp){ for(let i=0;i<n;i++){const a=Math.random()*6.28,s=rnd(0.6,sp);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c:col,r:rnd(1,2.6)});} }
function dmgnum(x,y,n,c){ pops.push({x:x+rnd(-4,4),y,txt:Math.round(n),vy:-1.6,c:c||'200,230,255',life:1,sz:13}); }
function shock(x,y,mx,c,w){ waves.push({x,y,r:6,mx,c,w:w||2}); }

function update(){
  t++;
  // ---- move: WASD/arrows OR joystick ----
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my-=1; if(keys['s']||keys['arrowdown'])my+=1; if(keys['a']||keys['arrowleft'])mx-=1; if(keys['d']||keys['arrowright'])mx+=1;
  if(stick.active){ mx=stick.dx; my=stick.dy; }
  const ml=Math.hypot(mx,my);
  if(ml>0.08){ const s=Math.min(1,ml)*P.speed; P.x+=mx/ml*s; P.y+=my/ml*s; P.face=Math.atan2(my,mx); P.moving=true; } else P.moving=false;
  P.x=Math.max(14,Math.min(W-14,P.x)); P.y=Math.max(14,Math.min(H-14,P.y)); P.bob+=0.2; if(P.iframe>0)P.iframe--;

  spawnInt=Math.max(10,46-t/85); spawnT++; const bn=1+Math.floor(t/1400); if(spawnT>=spawnInt){spawnT=0;for(let i=0;i<bn;i++)spawnFoe();}

  P.fireT--; if(P.fireT<=0&&foes.length){ let nr=null,nd=1e9; for(const f of foes){const d=dist(f,P);if(d<nd){nd=d;nr=f;}}
    if(nr){ const base=Math.atan2(nr.y-P.y,nr.x-P.x),sp=P.spread*(P.pcount-1);
      for(let i=0;i<P.pcount;i++){const a=base-sp/2+(P.pcount>1?sp*i/(P.pcount-1):0);shots.push({x:P.x,y:P.y,vx:Math.cos(a)*P.pspd,vy:Math.sin(a)*P.pspd,dmg:P.dmg,pierce:P.pierce,life:70,a});}
      fx.push({x:P.x+Math.cos(base)*16,y:P.y+Math.sin(base)*16,life:1,k:'muzzle'}); P.fireT=P.fireInt; beep(900,0.03,0.025,'square'); } }

  orbs=[]; for(let i=0;i<P.orbN;i++){const a=t*0.08+i/P.orbN*6.28;orbs.push({x:P.x+Math.cos(a)*48,y:P.y+Math.sin(a)*48,a});}

  for(const f of foes){ f.ph+=0.12; const dx=P.x-f.x,dy=P.y-f.y,d=Math.hypot(dx,dy)||1; const sp=f.spd*(f.type==='hound'?(1+0.15*Math.sin(f.ph*2)):1); f.x+=dx/d*sp; f.y+=dy/d*sp; if(f.flash>0)f.flash--;
    if(d<P.r+f.r){ if(P.iframe<=0){P.hp-=f.dmg;P.iframe=26;flash=1;shake=9;vibe(32);shock(P.x,P.y,70,'255,80,100',2); if(P.hp<=0){die();return;}} f.x-=dx/d*7;f.y-=dy/d*7; }
    for(const o of orbs){ if(Math.hypot(o.x-f.x,o.y-f.y)<14+f.r){f.hp-=P.orbDmg;f.flash=4;f.x-=dx/d*2;f.y-=dy/d*2;dmgnum(f.x,f.y-f.r,P.orbDmg,'255,225,140');if(f.hp<=0)killFoe(f);} }
  }
  for(const s of shots){ s.x+=s.vx;s.y+=s.vy;s.life--;
    for(const f of foes){ if(f.hp<=0)continue; if(Math.hypot(s.x-f.x,s.y-f.y)<f.r+3){f.hp-=s.dmg;f.flash=5;f.x+=s.vx*0.6;f.y+=s.vy*0.6;dmgnum(f.x,f.y-f.r-2,s.dmg);if(f.hp<=0)killFoe(f);s.pierce--;if(s.pierce<0){s.life=0;break;}} } }
  shots=shots.filter(s=>s.life>0); foes=foes.filter(f=>f.hp>0);

  for(const g of gems){ const d=dist(g,P); if(d<P.pickupR){const a=Math.atan2(P.y-g.y,P.x-g.x),pull=Math.min(10,(P.pickupR-d)*0.2+2);g.x+=Math.cos(a)*pull;g.y+=Math.sin(a)*pull;} if(d<16){g.got=true;P.xp+=g.v;if(P.xp>=P.xpNext)levelUp();beep(1250,0.03,0.03,'sine');} }
  gems=gems.filter(g=>!g.got);

  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life-=0.045;} parts=parts.filter(p=>p.life>0);
  for(const p of pops){p.y+=p.vy;p.vy+=0.06;p.life-=0.028;} pops=pops.filter(p=>p.life>0);
  for(const w of waves){w.r+=(w.mx-w.r)*0.18;w.life=(w.life||1)-0.05;} waves=waves.filter(w=>(w.life||1)>0&&w.r<w.mx-2);
  for(const f2 of fx){f2.life-=0.18;} fx=fx.filter(f2=>f2.life>0);
  flash*=0.86; shake*=0.84; lvflash*=0.9;
}

function killFoe(f){ kills++; const big=f.type==='brute'; burst(f.x,f.y,big?22:9,big?'255,140,90':f.type==='hound'?'255,180,90':'255,80,110',big?5:3.4); shock(f.x,f.y,big?64:34,big?'255,150,90':'255,90,110',2);
  hitstop=Math.max(hitstop,big?5:2); beep(big?150:250,0.07,0.05,'square'); if(big)vibe(20);
  const n=big?5:1; for(let i=0;i<n;i++)gems.push({x:f.x+rnd(-10,10),y:f.y+rnd(-10,10),v:big?3:1,got:false,t:Math.random()*6}); f.hp=0; }
function die(){ screen='dead'; shake=26; flash=1; hitstop=8; vibe(220); beep(120,0.4,0.12,'sawtooth');beep(70,0.5,0.1,'sawtooth'); shock(P.x,P.y,Math.max(W,H),'255,80,110',3); if(t>best){best=t;try{localStorage.setItem('cipher_horde2_best',best);}catch(e){}} }
function updateHint(){ document.getElementById('hint').innerHTML='<b>'+('ontouchstart'in window?'drag anywhere':'WASD')+'</b> to move · auto-fire · grab <span style="color:#9fe9ff">data</span> → level up'; }

// ===== render =====
function bg(){ ctx.globalCompositeOperation='source-over';
  if(floorPat){ ctx.fillStyle=floorPat;ctx.fillRect(0,0,W,H); ctx.fillStyle='rgba(4,6,10,0.35)';ctx.fillRect(0,0,W,H); return; }
  ctx.fillStyle='#04060a';ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='lighter';ctx.strokeStyle='rgba(40,90,110,0.05)';ctx.lineWidth=1;const g=48;
  for(let x=0;x<W;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let y=0;y<H;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();} }
function drawFoe(f){ const fl=f.flash>0; const base=f.type==='brute'?[255,130,90]:f.type==='hound'?[255,170,80]:[255,70,95]; const col=fl?[255,255,255]:base; const c=col.join(',');
  ctx.save(); ctx.translate(f.x,f.y); const ang=Math.atan2(P.y-f.y,P.x-f.x);
  ctx.fillStyle=`rgba(${c},0.14)`; ctx.beginPath();ctx.arc(0,0,f.r+7,0,7);ctx.fill();
  if(ART[f.type]){ const flip=P.x<f.x, sz={drone:44,hound:50,brute:68}[f.type]||40;
    const dy=f.type==='drone'?Math.sin(f.ph)*2:0; let sc=f.type==='hound'?1+0.08*Math.sin(f.ph*2):f.type==='brute'?1+0.04*Math.sin(f.ph*0.8):1; if(fl)sc*=1.12;
    ctx.translate(0,dy); ctx.scale(sc,sc); sprite(f.type,0,0,sz,flip);
    if(fl){ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(0,0,f.r+5,0,7);ctx.fill();}
    ctx.restore(); return; }
  if(f.type==='drone'){ const bob=Math.sin(f.ph)*2; ctx.rotate(ang); ctx.translate(0,bob);
    ctx.fillStyle=`rgba(${c},0.35)`;ctx.strokeStyle=`rgba(${c},0.95)`;ctx.lineWidth=2; ctx.beginPath();ctx.moveTo(f.r,0);ctx.lineTo(-f.r*0.6,f.r*0.8);ctx.lineTo(-f.r*0.2,0);ctx.lineTo(-f.r*0.6,-f.r*0.8);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle=`rgba(${c},1)`;ctx.beginPath();ctx.arc(f.r*0.2,0,f.r*0.28,0,7);ctx.fill(); }
  else if(f.type==='hound'){ ctx.rotate(ang); const lg=Math.sin(f.ph*2)*3;
    ctx.strokeStyle=`rgba(${c},0.85)`;ctx.lineWidth=2; for(const sgn of [-1,1]){ctx.beginPath();ctx.moveTo(-2,sgn*f.r*0.5);ctx.lineTo(-f.r*0.7,sgn*f.r*0.9+lg*sgn);ctx.stroke();ctx.beginPath();ctx.moveTo(f.r*0.4,sgn*f.r*0.5);ctx.lineTo(f.r*0.2,sgn*f.r*0.95-lg*sgn);ctx.stroke();}
    ctx.fillStyle=`rgba(${c},0.4)`;ctx.strokeStyle=`rgba(${c},0.95)`;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,f.r,f.r*0.62,0,0,7);ctx.fill();ctx.stroke();
    ctx.fillStyle=`rgba(${c},1)`;ctx.beginPath();ctx.arc(f.r*0.55,0,f.r*0.26,0,7);ctx.fill(); }
  else{ const pl=1+Math.sin(f.ph*0.8)*0.05; ctx.scale(pl,pl);
    ctx.fillStyle=`rgba(${c},0.32)`;ctx.strokeStyle=`rgba(${c},0.95)`;ctx.lineWidth=2.4; ctx.beginPath();for(let i=0;i<6;i++){const a=i/6*6.28+f.ph*0.1;ctx[i?'lineTo':'moveTo'](Math.cos(a)*f.r,Math.sin(a)*f.r);}ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle=`rgba(${c},${0.6+0.3*Math.sin(f.ph)})`;ctx.beginPath();ctx.arc(0,0,f.r*0.4,0,7);ctx.fill(); }
  ctx.restore(); }
function drawPlayer(){ const it=P.iframe>0&&Math.floor(t/3)%2===0; const bob=Math.sin(P.bob)*1.4;
  ctx.save();ctx.translate(P.x,P.y+bob);
  ctx.fillStyle='rgba(84,230,200,0.30)';ctx.beginPath();ctx.arc(0,0,P.r+14,0,7);ctx.fill();
  ctx.fillStyle='rgba(84,230,200,0.14)';ctx.beginPath();ctx.arc(0,0,P.r+24,0,7);ctx.fill();
  // thruster
  if(P.moving){ctx.fillStyle='rgba(120,255,220,0.5)';ctx.beginPath();ctx.arc(-Math.cos(P.face)*P.r,-Math.sin(P.face)*P.r,4+Math.random()*3,0,7);ctx.fill();}
  if(ART.hero){ sprite('hero',0,0,52,Math.cos(P.face)<0,it?0.45:1); ctx.restore(); return; }
  ctx.rotate(P.face);
  ctx.fillStyle=it?'rgba(255,255,255,0.95)':'rgba(110,255,205,0.95)';ctx.strokeStyle='rgba(180,255,235,0.9)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(P.r+4,0);ctx.lineTo(-P.r*0.7,P.r*0.8);ctx.lineTo(-P.r*0.25,0);ctx.lineTo(-P.r*0.7,-P.r*0.8);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.95)';ctx.beginPath();ctx.arc(P.r*0.1,0,3,0,7);ctx.fill();
  ctx.restore(); }
function draw(){ bg(); ctx.save(); const sk=hitstop>0?shake*0.3:shake; ctx.translate((Math.random()-0.5)*sk,(Math.random()-0.5)*sk); ctx.globalCompositeOperation='lighter';
  if(screen!=='play'){ ctx.restore();ctx.globalCompositeOperation='source-over';ctx.textAlign='center';
    if(screen==='title'){ctx.fillStyle='#e8f6ff';ctx.font='600 32px monospace';ctx.letterSpacing='10px';ctx.fillText('CIPHER',W/2,H*0.4);ctx.fillStyle='#54e6c8';ctx.font='14px monospace';ctx.letterSpacing='7px';ctx.fillText('OVERRIDE',W/2,H*0.4+32);ctx.fillStyle='#5f7488';ctx.font='12px monospace';ctx.letterSpacing='1px';ctx.fillText('one free node vs the swarm of Control',W/2,H*0.4+62);ctx.fillStyle='#7dffb0';ctx.fillText('tap / click to start',W/2,H*0.4+92);}
    else{ctx.fillStyle='#ff6d84';ctx.font='600 30px monospace';ctx.letterSpacing='8px';ctx.fillText('OVERRIDDEN',W/2,H*0.38);ctx.fillStyle='#e8f6ff';ctx.font='600 42px monospace';ctx.letterSpacing='2px';ctx.fillText(Math.floor(t/60)+'s',W/2,H*0.48);ctx.fillStyle='#5f7488';ctx.font='13px monospace';ctx.fillText('survived · '+kills+' purged',W/2,H*0.48+26);ctx.fillStyle=t>=best?'#ffd76a':'#5f7488';ctx.fillText((t>=best?'NEW BEST  ':'BEST  ')+Math.floor(best/60)+'s',W/2,H*0.56);ctx.fillStyle='#7dffb0';ctx.font='13px monospace';ctx.fillText('tap / click — run again',W/2,H*0.63);}
    ctx.letterSpacing='0px';hud();return; }
  for(const w of waves){ctx.strokeStyle=`rgba(${w.c},${(w.life||1)*0.6})`;ctx.lineWidth=w.w;ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,7);ctx.stroke();}
  for(const g of gems){const p=0.6+0.4*Math.sin(t*0.2+g.t);ctx.fillStyle=`rgba(159,233,255,${0.22*p})`;ctx.beginPath();ctx.arc(g.x,g.y,6+g.v,0,7);ctx.fill();if(sprite('shard',g.x,g.y,(17+g.v*3)*(0.9+0.18*p)))continue;ctx.fillStyle='rgba(190,248,255,0.95)';ctx.beginPath();ctx.arc(g.x,g.y,2+g.v*0.6,0,7);ctx.fill();}
  for(const s of shots){if(sprite('bolt',s.x,s.y,36,false,null,s.a))continue;ctx.strokeStyle='rgba(190,240,255,0.95)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*1.8,s.y-s.vy*1.8);ctx.stroke();ctx.fillStyle='rgba(220,250,255,0.9)';ctx.beginPath();ctx.arc(s.x,s.y,2.4,0,7);ctx.fill();}
  for(const f of foes)drawFoe(f);
  for(const o of orbs){ctx.fillStyle='rgba(255,225,140,0.25)';ctx.beginPath();ctx.arc(o.x,o.y,12,0,7);ctx.fill();ctx.fillStyle='rgba(255,238,180,0.95)';ctx.beginPath();ctx.arc(o.x,o.y,5,0,7);ctx.fill();}
  for(const f2 of fx){ if(f2.k==='muzzle'){ctx.fillStyle=`rgba(220,250,255,${f2.life*0.8})`;ctx.beginPath();ctx.arc(f2.x,f2.y,6*f2.life+2,0,7);ctx.fill();} }
  for(const p of parts){ctx.fillStyle=`rgba(${p.c},${p.life})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r*(0.5+p.life),0,7);ctx.fill();}
  drawPlayer();
  ctx.restore(); ctx.globalCompositeOperation='source-over';
  for(const p of pops){ctx.fillStyle=`rgba(${p.c},${p.life})`;ctx.font='bold '+p.sz+'px monospace';ctx.textAlign='center';ctx.fillText(p.txt,p.x,p.y);}
  if(lvflash>0.01){ctx.fillStyle=`rgba(120,210,255,${lvflash*0.12})`;ctx.fillRect(0,0,W,H);}
  if(flash>0.01){ctx.fillStyle=`rgba(255,40,70,${flash*0.34})`;ctx.fillRect(0,0,W,H);}
  // joystick
  if(stick.active){ctx.strokeStyle='rgba(159,233,255,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(stick.ox,stick.oy,58,0,7);ctx.stroke();ctx.fillStyle='rgba(159,233,255,0.5)';ctx.beginPath();ctx.arc(stick.ox+stick.dx*58,stick.oy+stick.dy*58,22,0,7);ctx.fill();}
  if(paused){cardRects();ctx.fillStyle='rgba(4,6,10,0.9)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#9fe9ff';ctx.font='600 16px monospace';ctx.textAlign='center';ctx.letterSpacing='4px';ctx.fillText('LEVEL '+P.level+' — UPGRADE',W/2,cards[0].rect.y-34);ctx.font='10px monospace';ctx.fillStyle='#3c5566';ctx.fillText('tap a card',W/2,cards[0].rect.y-16);
    for(const c of cards){const r=c.rect;ctx.fillStyle='rgba(20,32,40,0.96)';ctx.strokeStyle=`rgb(${c.c})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(r.x+10,r.y);ctx.arcTo(r.x+r.w,r.y,r.x+r.w,r.y+r.h,10);ctx.arcTo(r.x+r.w,r.y+r.h,r.x,r.y+r.h,10);ctx.arcTo(r.x,r.y+r.h,r.x,r.y,10);ctx.arcTo(r.x,r.y,r.x+r.w,r.y,10);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=`rgb(${c.c})`;ctx.font='600 15px monospace';ctx.letterSpacing='1px';ctx.fillText(c.n,r.x+r.w/2,r.y+52);ctx.fillStyle='#9fbecb';ctx.font='12px monospace';ctx.letterSpacing='0px';ctx.fillText(c.d,r.x+r.w/2,r.y+88);}ctx.letterSpacing='0px';}
  hud();
}
function hud(){ if(!P)return; document.getElementById('time').textContent=Math.floor(t/60);document.getElementById('kills').textContent=kills;document.getElementById('level').textContent=P.level;document.getElementById('bestl').textContent='best '+Math.floor(best/60)+'s';document.querySelector('#hpb > i').style.width=Math.max(0,P.hp/P.maxHp*100)+'%';document.querySelector('#xpb > i').style.width=Math.min(100,P.xp/P.xpNext*100)+'%'; }
function loop(){ if(screen==='play'&&!paused){ if(hitstop>0)hitstop--; else update(); } draw(); requestAnimationFrame(loop); }
P=freshP();foes=[];shots=[];gems=[];orbs=[];parts=[];pops=[];waves=[];fx=[]; requestAnimationFrame(loop);
</script>
</body>
</html>
