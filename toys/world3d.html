<!doctype html><html lang="ru"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0618">
<title>WORLD 3D — прототип единого 3D-мира (2.5D)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#08040f;color:#e8ecfb;font:13px/1.4 ui-monospace,Menlo,monospace;overflow:hidden;overscroll-behavior:none}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  #stage{position:relative;border-radius:22px;overflow:hidden;box-shadow:0 30px 80px -20px #000,0 0 0 1px rgba(140,170,255,.09) inset;touch-action:none}
  canvas{display:block}
  #st{position:absolute;left:14px;top:12px;font-weight:800;font-size:11px;letter-spacing:.4px;color:#fff;text-shadow:0 2px 12px #000;pointer-events:none}
  #st small{display:block;font-weight:600;font-size:9.5px;color:#a9b6d8;margin-top:2px}
  #panel{width:min(94vw,520px);display:flex;flex-direction:column;gap:8px}
  .row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center}
  .lbl{font-size:9.5px;letter-spacing:1.2px;color:#7f8cb0;text-align:center;text-transform:uppercase;font-weight:700}
  button{appearance:none;border:1px solid rgba(150,175,235,.16);background:rgba(22,26,48,.72);color:#c7d2ee;padding:8px 12px;border-radius:11px;font:700 12px ui-monospace,monospace;cursor:pointer;transition:.14s}
  button:active{transform:scale(.95)}
  .tog.on{background:linear-gradient(160deg,rgba(53,224,255,.26),rgba(255,45,149,.2));border-color:rgba(120,180,255,.55);color:#eafcff}
  input[type=range]{width:130px;accent-color:#8a6bff}
  label{font-size:11px;color:#aeb9db;display:flex;gap:8px;align-items:center}
  #hint{font-size:10px;color:#6b789c;text-align:center}
</style></head>
<body>
<div id="wrap">
  <div id="stage"><canvas id="c"></canvas><div id="st"></div></div>
  <div id="panel">
    <div class="lbl">прототип: единый 3D-мир (вид сбоку, реальная глубина/туман)</div>
    <div class="row">
      <button class="tog on" id="cam">камера-качка</button>
      <button class="tog on" id="fog">туман</button>
      <label>ракурс <input id="ang" type="range" min="0" max="100" value="30"></label>
    </div>
    <div id="hint">Всё — небо, город-из-свечей, дорога, байк — в ОДНОМ 3D-движке: единый свет/туман/перспектива → сочетается само, глубина настоящая. Двигай пальцем — параллакс.</div>
  </div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {Reflector} from 'three/addons/objects/Reflector.js';
const cv=document.getElementById('c'), stEl=document.getElementById('st');
function st(a,b){ stEl.innerHTML='<b>'+a+'</b>'+(b?'<small>'+b+'</small>':''); }
st('Инициализация 3D…');
let SW=0,SH=0;
function fitSize(){ const availH=Math.min(window.innerHeight-140,window.innerHeight*0.80), availW=Math.min(window.innerWidth-16,460);
  let h=availH,w=h*9/19.5; if(w>availW){w=availW;h=w*19.5/9;} SW=Math.round(w); SH=Math.round(h);
  const s=document.getElementById('stage'); s.style.width=SW+'px'; s.style.height=SH+'px'; }
fitSize();

const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
renderer.setSize(SW,SH); renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.25;
const scene=new THREE.Scene();
let fogOn=true; const FOGC=new THREE.Color(0x2a0d3a); scene.fog=new THREE.FogExp2(FOGC.getHex(),0.010);
const camera=new THREE.PerspectiveCamera(52, SW/SH, 0.1, 900);
const composer=new EffectComposer(renderer); composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(SW,SH), 0.85, 0.5, 0.35); composer.addPass(bloom);   // strength/radius/threshold — свечение неона = премиум-синтвейв

// ---------- sky (gradient plane, far, no fog) ----------
function skyTex(){ const c=document.createElement('canvas'); c.width=8; c.height=256; const g=c.getContext('2d'); const gr=g.createLinearGradient(0,0,0,256);
  gr.addColorStop(0,'#140a2e'); gr.addColorStop(0.42,'#3a1150'); gr.addColorStop(0.66,'#b02a6a'); gr.addColorStop(0.82,'#ff7a3c'); gr.addColorStop(1,'#ffd05a');
  g.fillStyle=gr; g.fillRect(0,0,8,256); const t=new THREE.CanvasTexture(c); return t; }
{ const sky=new THREE.Mesh(new THREE.PlaneGeometry(1400,700), new THREE.MeshBasicMaterial({map:skyTex(),depthWrite:false,fog:false}));
  sky.position.set(0,120,-360); scene.add(sky); }
// ---------- retrowave sun (banded, emissive, additive) ----------
function sunTex(){ const S=256,c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d');
  const gr=g.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2); gr.addColorStop(0,'rgba(255,240,180,1)'); gr.addColorStop(0.5,'rgba(255,120,90,1)'); gr.addColorStop(0.8,'rgba(255,60,120,0.85)'); gr.addColorStop(1,'rgba(255,60,120,0)');
  g.fillStyle=gr; g.beginPath(); g.arc(S/2,S/2,S/2,0,7); g.fill();
  g.globalCompositeOperation='destination-out'; for(let y=S*0.55;y<S;y+=14){ const h=(y-S*0.5)/S*10; g.fillRect(0,y,S,Math.max(2,h)); }
  return new THREE.CanvasTexture(c); }
{ const sun=new THREE.Sprite(new THREE.SpriteMaterial({map:sunTex(),transparent:true,depthWrite:false,fog:false,blending:THREE.AdditiveBlending}));
  sun.scale.set(120,120,1); sun.position.set(10,40,-330); scene.add(sun); }
// ---------- stars (атмосфера в тёмном верхе неба) ----------
{ const N=380, sg=new THREE.BufferGeometry(), sp=new Float32Array(N*3);
  for(let i=0;i<N;i++){ sp[i*3]=(Math.random()-0.5)*680; sp[i*3+1]=55+Math.random()*140; sp[i*3+2]=-90-Math.random()*250; }
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0xd6e2ff,size:0.9,sizeAttenuation:true,transparent:true,opacity:0.85,fog:false,depthWrite:false}))); }

// ---------- neon "candle-city" (market = world): green/red towers, receding in depth ----------
const rand=(function(){let s=20260708;return()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};})();
const cityGroup=new THREE.Group(); scene.add(cityGroup);
const PERIOD=520; // world x length that loops
function winTex(rgb){ const W=64,H=128,cn=document.createElement('canvas'); cn.width=W;cn.height=H; const g=cn.getContext('2d'); g.fillStyle='#0b0715'; g.fillRect(0,0,W,H);
  for(let y=8;y<H-6;y+=11){ for(let x=7;x<W-6;x+=11){ if(Math.random()>0.42){ g.fillStyle='rgba('+rgb+','+(0.35+Math.random()*0.6).toFixed(2)+')'; g.fillRect(x,y,5.5,6.5); } } }
  const t=new THREE.CanvasTexture(cn); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t; }
function buildCity(){
  const bullT=winTex('70,245,175'), bearT=winTex('255,80,120'); bullT.repeat.set(2,4); bearT.repeat.set(2,4);
  const bullE=0x24e69a, bearE=0xff3b6e;
  for(let i=0;i<95;i++){ const up=rand()>0.5, tex=up?bullT:bearT, edge=up?bullE:bearE;
    const depth=8+rand()*150, w=3+rand()*7, h=10+rand()*48*(1-depth/220), x=rand()*PERIOD-PERIOD/2;
    const body=new THREE.Mesh(new THREE.BoxGeometry(w,h,w), new THREE.MeshBasicMaterial({map:tex,fog:true})); body.position.set(x,h/2,-depth); body.userData.x0=x; cityGroup.add(body);
    const edges=new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry), new THREE.LineBasicMaterial({color:edge,transparent:true,opacity:0.85,fog:true})); edges.position.copy(body.position); edges.userData.x0=x; cityGroup.add(edges);
    const wick=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1.6+rand()*3,5), new THREE.MeshBasicMaterial({color:edge})); wick.position.set(x,h+(1.2+rand()*1.6),-depth); wick.userData.x0=x; cityGroup.add(wick); }
}
buildCity();
// ---------- ground: dark reflective plane + neon centre grid receding ----------
{ const mirror=new Reflector(new THREE.PlaneGeometry(1400,700), {clipBias:0.003, textureWidth:Math.round(SW*2), textureHeight:Math.round(SH*2), color:0x141c28});
  mirror.rotation.x=-Math.PI/2; mirror.position.set(0,-0.35,-170); scene.add(mirror); }   // мокрый неон-асфальт: отражает город/байк/солнце = премиум-синтвейв
function gridTex(){ const S=256,c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d'); g.fillStyle='#0a0618'; g.fillRect(0,0,S,S);
  g.strokeStyle='rgba(120,60,200,0.5)'; g.lineWidth=2; for(let i=0;i<=S;i+=32){ g.beginPath();g.moveTo(i,0);g.lineTo(i,S);g.stroke(); g.beginPath();g.moveTo(0,i);g.lineTo(S,i);g.stroke(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(60,30); return t; }
const gridT=gridTex();
{ const gp=new THREE.Mesh(new THREE.PlaneGeometry(1400,600), new THREE.MeshBasicMaterial({map:gridT,transparent:true,opacity:0.3,fog:true}));
  gp.rotation.x=-Math.PI/2; gp.position.set(0,0,-140); scene.add(gp); window.__grid=gridT; }

// ---------- ROAD ribbon (the track, at Z~0) following a profile, neon-edged, with body ----------
function profile(x){ return 3 + Math.sin(x*0.05)*1.6 + Math.sin(x*0.13+1)*0.7 + Math.sin(x*0.021)*1.1; }
const W2=3.3, ROADT=1.7, SEG=1.6, SPAN=150;   // W2=пол-ширины дороги → настоящая ПОВЕРХНОСТЬ, по которой едет байк (не линия)
let roadMesh, roadFront, lineC, lineTF, lineBF;
function buildRoad(){
  const N=Math.floor(SPAN/SEG)+2;
  // deck (A=+W2,B=-W2) + front-thickness (C=A−TH). 3 верт/станция
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(N*3*3),3));
  const idx=[]; for(let i=0;i<N-1;i++){ const A=i*3,B=i*3+1,C=i*3+2, A2=(i+1)*3,B2=(i+1)*3+1,C2=(i+1)*3+2;
    idx.push(A,B,A2, B,B2,A2);   // дека (поверхность)
    idx.push(A,C,A2, C,C2,A2); } // передняя грань (тело)
  geo.setIndex(idx);
  roadMesh=new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x3d2c66,fog:true,side:THREE.DoubleSide}));
  scene.add(roadMesh); roadMesh.userData.N=N;
  function mkLine(color,op,dash){ const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(N*3),3));
    const m=dash?new THREE.LineDashedMaterial({color:color,transparent:true,opacity:op,fog:true,dashSize:2.4,gapSize:2.4}):new THREE.LineBasicMaterial({color:color,transparent:true,opacity:op,fog:true}); const l=new THREE.Line(g,m); scene.add(l); return l; }
  lineC=mkLine(0xbff0ff,0.85,true);     // осевая пунктир-разметка
  lineTF=mkLine(0x6ff2ff,1.0,false);    // верхний неон-рельс (кромка поверхности у камеры)
  lineBF=mkLine(0xff5be0,0.95,false);   // нижний неон-рельс (кромка тела)
}
buildRoad();
function updateRoad(camX){ const N=roadMesh.userData.N, vp=roadMesh.geometry.attributes.position.array;
  const c=lineC.geometry.attributes.position.array, tf=lineTF.geometry.attributes.position.array, bf=lineBF.geometry.attributes.position.array;
  const x0=camX-SPAN*0.4;
  for(let i=0;i<N;i++){ const x=x0+i*SEG, y=profile(x);
    vp[i*9+0]=x; vp[i*9+1]=y;        vp[i*9+2]=W2;      // A перед-верх
    vp[i*9+3]=x; vp[i*9+4]=y;        vp[i*9+5]=-W2;     // B зад-верх
    vp[i*9+6]=x; vp[i*9+7]=y-ROADT;  vp[i*9+8]=W2;      // C перед-низ (тело)
    c[i*3]=x;  c[i*3+1]=y+0.03;      c[i*3+2]=0;                // центр
    tf[i*3]=x; tf[i*3+1]=y+0.02;     tf[i*3+2]=W2+0.02;         // верх-передняя кромка
    bf[i*3]=x; bf[i*3+1]=y-ROADT;    bf[i*3+2]=W2+0.02;         // низ-передняя кромка
  }
  roadMesh.geometry.attributes.position.needsUpdate=true; roadMesh.geometry.computeVertexNormals();
  for(const l of [lineC,lineTF,lineBF]){ l.geometry.attributes.position.needsUpdate=true; l.computeLineDistances(); }
}

// ---------- BIKE + rider в 3D (самостоятельный объект; наклоняется ПОД УГЛОМ трассы; ловит свет/bloom) ----------
const bikeGroup=new THREE.Group();
const nMat=new THREE.MeshBasicMaterial({color:0x9fe8ff}), dMat=new THREE.MeshBasicMaterial({color:0x0b0b16}), gMat=new THREE.MeshBasicMaterial({color:0xffd24a});
function bar(x1,y1,x2,y2,r){ const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||0.01; const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,8), nMat); m.position.set((x1+x2)/2,(y1+y2)/2,0); m.rotation.z=Math.atan2(dy,dx)-Math.PI/2; return m; }
{ const R=0.8;
  for(const wx of [-1.05,1.05]){ const w=new THREE.Mesh(new THREE.TorusGeometry(R,0.12,10,26), nMat); w.position.set(wx,0,0); bikeGroup.add(w);
    const h=new THREE.Mesh(new THREE.CircleGeometry(R-0.18,20), dMat); h.position.set(wx,0,0.02); bikeGroup.add(h); }
  bikeGroup.add(bar(-1.05,0,0.1,0.5,0.07)); bikeGroup.add(bar(0.1,0.5,1.05,0,0.07)); bikeGroup.add(bar(0.1,0.5,1.05,0.5,0.06)); bikeGroup.add(bar(1.05,0.5,1.05,0.05,0.05)); bikeGroup.add(bar(0.1,0.5,0.55,0.98,0.06));
  const torso=new THREE.Mesh(new THREE.CapsuleGeometry(0.2,0.62,4,8), dMat); torso.position.set(0.16,1.06,0); torso.rotation.z=-0.35; bikeGroup.add(torso);
  const armM=new THREE.Mesh(new THREE.CapsuleGeometry(0.08,0.5,4,6), dMat); armM.position.set(0.5,0.92,0.03); armM.rotation.z=-1.1; bikeGroup.add(armM);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.27,16,12), gMat); head.position.set(0.36,1.52,0); bikeGroup.add(head); }
bikeGroup.scale.set(0.82,0.82,0.82); scene.add(bikeGroup);

// ---------- palms (Vice-элемент + передний план = глубина): силуэт с неон-ободком, спрайты по сторонам дороги ----------
function palmTex(){ const W=220,H=300,c=document.createElement('canvas'); c.width=W;c.height=H; const g=c.getContext('2d'); const cx=W*0.5, ty=H*0.30;
  g.lineJoin='round';
  // ствол (сужается кверху, лёгкий изгиб), заливка + неон-ободок
  g.fillStyle='#150a24'; g.beginPath(); g.moveTo(cx-8,H); g.quadraticCurveTo(cx-14,H*0.55,cx-4,ty+8); g.lineTo(cx+4,ty+8); g.quadraticCurveTo(cx+6,H*0.55,cx+10,H); g.closePath(); g.fill();
  g.strokeStyle='rgba(255,70,205,0.45)'; g.lineWidth=1.5; g.stroke();
  // листья — ЗАЛИТЫЕ поникающие «перья»
  for(let k=0;k<9;k++){ const a=-Math.PI/2+(k-4)*0.40, L=80+((k===4)?16:0);
    const tx=cx+Math.cos(a)*L, tyy=ty+Math.sin(a)*L*0.72+22, mx=cx+Math.cos(a)*L*0.5, my=ty+Math.sin(a)*L*0.36;
    g.fillStyle=k%2?'#1e1035':'#251442'; g.beginPath(); g.moveTo(cx,ty);
    g.quadraticCurveTo(mx-5,my-3, tx,tyy); g.quadraticCurveTo(mx+6,my+7, cx,ty+5); g.closePath(); g.fill();
    g.strokeStyle=k%2?'rgba(150,70,255,0.55)':'rgba(255,95,215,0.65)'; g.lineWidth=1.2; g.stroke(); }
  g.fillStyle='#2a1545'; g.beginPath(); g.arc(cx,ty,6,0,7); g.fill();
  const t=new THREE.CanvasTexture(c); return t; }
const palmT=palmTex(), palms=[];
for(let i=0;i<18;i++){ const near=i%2===0; const s=new THREE.Sprite(new THREE.SpriteMaterial({map:palmT,transparent:true,depthTest:true,depthWrite:false,fog:true}));
  const size=near?20:13; s.scale.set(size*0.66,size,1);
  s.userData={x0:(i/18)*PERIOD-PERIOD/2 + (near?0:PERIOD/36), z:near?(W2+3.5+rand()*2):(-5-rand()*22), size:size};
  scene.add(s); palms.push(s); }

// ---------- input / loop ----------
let camX=0, T=0, camShake=true, ptx=0,pty=0,tx=0,ty=0, angF=0.30;
const stage=document.getElementById('stage');
stage.addEventListener('pointermove',e=>{ const r=cv.getBoundingClientRect(); tx=((e.clientX-r.left)/r.width-0.5)*2; ty=((e.clientY-r.top)/r.height-0.5)*2; });
stage.addEventListener('pointerleave',()=>{tx=0;ty=0;});
function loop(){ requestAnimationFrame(loop); T+=0.016; camX+=0.16;
  ptx+=(tx-ptx)*0.05; pty+=(ty-pty)*0.05;
  const by=profile(camX);
  const slope=(profile(camX+0.6)-profile(camX-0.6))/1.2;   // уклон трассы под байком
  bikeGroup.position.set(camX, by+0.68, W2+0.2);           // колёса на поверхности дороги
  bikeGroup.rotation.z=Math.atan2(slope,1);                 // НАКЛОН под угол трассы (объект «читает» трассу)
  updateRoad(camX);
  // city recycle (wrap x around camX within PERIOD)
  cityGroup.children.forEach(m=>{ let x=m.userData.x0 - (Math.floor((m.userData.x0-camX+PERIOD/2)/PERIOD))*PERIOD; m.position.x=x; });
  palms.forEach(s=>{ const x=s.userData.x0 - (Math.floor((s.userData.x0-camX+PERIOD/2)/PERIOD))*PERIOD; s.position.set(x, profile(x)-1.2 + s.userData.size*0.42, s.userData.z); });
  window.__grid.offset.y = -camX*0.02;
  // camera: side view, slight elevation + forward, follows bike; angle slider tilts down for depth
  const ang=angF; const shake=camShake?Math.sin(T*1.7)*0.10:0;
  camera.position.set(camX-4 + ptx*4, by+4.6+ang*6+shake + pty*2, 15.5 - ang*4);
  camera.lookAt(camX+5, by-1.2 - ang*3, -12);
  composer.render();
  if(T>0.3 && stEl.textContent.indexOf('Готово')<0) st('Готово · 3D-мир','единый движок: свет/туман/глубина — сами');
}
function onResize(){ fitSize(); renderer.setSize(SW,SH); composer.setSize(SW,SH); bloom.setSize(SW,SH); camera.aspect=SW/SH; camera.updateProjectionMatrix(); }
window.addEventListener('resize',onResize);
document.getElementById('cam').addEventListener('click',e=>{ camShake=!camShake; e.target.classList.toggle('on',camShake); });
document.getElementById('fog').addEventListener('click',e=>{ fogOn=!fogOn; scene.fog=fogOn?new THREE.FogExp2(FOGC.getHex(),0.010):null; e.target.classList.toggle('on',fogOn); });
document.getElementById('ang').addEventListener('input',e=>{ angF=e.target.value/100; });
requestAnimationFrame(loop);
</script>
</body></html>
