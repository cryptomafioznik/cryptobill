<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CIPHER — keyframe</title>
<style>
  html,body{margin:0;height:100%;background:#07060f;overflow:hidden;font-family:Didot,"Bodoni 72",Georgia,serif;}
  canvas{display:block;}
  #title{position:fixed;left:8%;bottom:10%;z-index:5;pointer-events:none;}
  #title .k{font-size:34px;letter-spacing:.46em;color:#efe9ff;margin:0;font-weight:500;opacity:.92;}
  #title .s{font-size:11px;letter-spacing:.66em;color:#e8c97a;margin:8px 0 0 5px;opacity:.85;}
  #title .rule{width:96px;height:1px;background:linear-gradient(90deg,rgba(232,201,122,.65),transparent);margin:11px 0 9px 5px;}
  #cap{position:fixed;right:8%;top:8%;z-index:5;pointer-events:none;text-align:right;}
  #cap p{font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.34em;color:#4a4566;margin:3px 0;}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
</head>
<body>
<div id="title"><p class="k">CIPHER</p><div class="rule"></div><p class="s">OVERRIDE</p></div>
<div id="cap"><p>SIGNAL · UNRESOLVED</p></div>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {ShaderPass} from 'three/addons/postprocessing/ShaderPass.js';
import {OutputPass} from 'three/addons/postprocessing/OutputPass.js';
import {Reflector} from 'three/addons/objects/Reflector.js';
import * as BGU from 'three/addons/utils/BufferGeometryUtils.js';
import {MeshSurfaceSampler} from 'three/addons/math/MeshSurfaceSampler.js';

// ---- dusk palette: deep indigo / plum / violet + warm gold accent ----
const GOLD=new THREE.Color(0xe8c97a), VIOLET=new THREE.Color(0xc8b9ff), WARMW=new THREE.Color(0xfff0d6);
const BG=0x09081a, FOGC=0x0a0820, THREAT=new THREE.Color(0xc24a7a);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=0.92;
renderer.setClearColor(BG,1);
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(FOGC,0.072);
const cam=new THREE.PerspectiveCamera(36,1,0.1,90); cam.position.set(-0.65,1.35,7.4);
function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h); cam.aspect=w/h; cam.updateProjectionMatrix(); composer&&composer.setSize(w,h); }

// ---- dusk sky backdrop (vertical gradient sphere) ----
const sky=new THREE.Mesh(new THREE.SphereGeometry(60,32,16),new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,
  uniforms:{},
  vertexShader:'varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
  fragmentShader:`varying vec3 vP; void main(){ float h=clamp(vP.y/60.0*0.5+0.5,0.0,1.0);
    vec3 top=vec3(0.015,0.012,0.05); vec3 mid=vec3(0.05,0.03,0.10); vec3 low=vec3(0.02,0.015,0.045);
    vec3 c = h>0.5 ? mix(mid,top,(h-0.5)*2.0) : mix(low,mid,h*2.0);
    gl_FragColor=vec4(c,1.0); }`}));
scene.add(sky);

// ---- soft lighting (no harsh speculars) ----
scene.add(new THREE.HemisphereLight(0x2a2150,0x05040c,0.7));
const keySoft=new THREE.DirectionalLight(0x8a7ad0,0.5); keySoft.position.set(-3,6,-2); scene.add(keySoft);

// ---- ground: a faint matte plum haze, no mirror (the wraith floats in dusk) ----
const floorGlow=new THREE.Mesh(new THREE.PlaneGeometry(30,30),new THREE.MeshBasicMaterial({color:0x140f26,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending}));
floorGlow.rotation.x=-Math.PI/2; floorGlow.position.y=-0.4; scene.add(floorGlow);

// ============ THE RUNNER: a swarm of light holding a wraith silhouette ============
// build an invisible carrier mesh, then scatter points across its surface
function carrier(){
  // slimmer, taller, more elegant wraith profile
  const prof=[[0.18,1.80],[0.26,1.60],[0.31,1.34],[0.37,1.02],[0.46,0.64],[0.58,0.28],[0.70,-0.06],[0.76,-0.18]];
  const pts=prof.map(([x,y])=>new THREE.Vector2(x,y));
  const cloak=new THREE.LatheGeometry(pts,40); cloak.scale(1,1,0.78);
  const shoulders=new THREE.CapsuleGeometry(0.30,0.42,5,12); shoulders.translate(0,1.34,0); shoulders.scale(1,1,0.66);
  const hood=new THREE.SphereGeometry(0.27,22,18,0,Math.PI*2,0,Math.PI*0.85); hood.scale(1,1.25,1); hood.translate(0,1.7,-0.02);
  const armG=new THREE.CapsuleGeometry(0.07,0.4,4,8); armG.rotateZ(-1.0); armG.translate(0.36,1.36,0.18);
  // data-trail: a sweeping tail of points behind the shoulders (motion / character)
  const tail=new THREE.LatheGeometry([[0.02,0],[0.16,0.3],[0.22,0.7],[0.16,1.1],[0.05,1.4]].map(([x,y])=>new THREE.Vector2(x,y)),18);
  tail.rotateX(1.15); tail.scale(1.1,1,0.5); tail.translate(-0.05,1.0,-0.6);
  return BGU.mergeGeometries([cloak,shoulders,hood,armG,tail]);
}
const carrierMesh=new THREE.Mesh(carrier(),new THREE.MeshBasicMaterial());
const sampler=new MeshSurfaceSampler(carrierMesh).build();
const chestG=new THREE.SphereGeometry(0.26,12,12); chestG.translate(0.04,1.32,0.16);
const chestSampler=new MeshSurfaceSampler(new THREE.Mesh(chestG,new THREE.MeshBasicMaterial())).build();

const NS=4200, NC=280, N=NS+NC;
const pPos=new Float32Array(N*3), pCol=new Float32Array(N*3), pPhase=new Float32Array(N), pCore=new Float32Array(N);
const tmp=new THREE.Vector3(), col=new THREE.Color();
for(let i=0;i<N;i++){
  const isCore=i>=NS;
  (isCore?chestSampler:sampler).sample(tmp);
  pPos[i*3]=tmp.x; pPos[i*3+1]=tmp.y; pPos[i*3+2]=tmp.z;
  pPhase[i]=Math.random()*6.28; pCore[i]=isCore?1:0;
  if(isCore){ col.copy(GOLD).lerp(WARMW,Math.random()*0.25); }
  else { const r=Math.random(); col.copy(r<0.5?GOLD:VIOLET); if(r<0.07)col.copy(WARMW); col.multiplyScalar(0.75+Math.random()*0.3); }
  pCol[i*3]=col.r; pCol[i*3+1]=col.g; pCol[i*3+2]=col.b;
}
const swarmGeo=new THREE.BufferGeometry();
swarmGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
swarmGeo.setAttribute('aColor',new THREE.BufferAttribute(pCol,3));
swarmGeo.setAttribute('aPhase',new THREE.BufferAttribute(pPhase,1));
swarmGeo.setAttribute('aCore',new THREE.BufferAttribute(pCore,1));
const swarmMat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
  uniforms:{uTime:{value:0},uSize:{value:1.05},uGlitch:{value:-9}},
  vertexShader:`attribute vec3 aColor; attribute float aPhase; attribute float aCore;
    uniform float uTime; uniform float uSize; uniform float uGlitch;
    varying vec3 vColor; varying float vTw;
    void main(){ vColor=aColor; vec3 p=position; float t=uTime;
      p.x+=sin(t*0.9+aPhase)*0.013; p.y+=sin(t*0.7+aPhase*1.3)*0.013; p.z+=cos(t*0.8+aPhase)*0.013;
      float gb=smoothstep(0.22,0.0,abs(p.y-uGlitch)); p.x+=gb*sin(aPhase*40.0)*0.22; vColor+=gb*0.4;
      vec4 mv=modelViewMatrix*vec4(p,1.0);
      float tw=0.5+0.5*sin(t*2.1+aPhase*6.0); vTw=tw*(0.7+0.35*aCore);
      gl_PointSize=uSize*(0.5+0.4*aCore+0.5*tw)*(150.0/max(0.1,-mv.z));
      gl_Position=projectionMatrix*mv; }`,
  fragmentShader:`varying vec3 vColor; varying float vTw;
    void main(){ vec2 d=gl_PointCoord-0.5; float r=length(d); float a=smoothstep(0.5,0.16,r); a*=vTw;
      gl_FragColor=vec4(vColor*(0.55+0.4*vTw),a*0.5); }`});
// ---- hero group: swarm + solid mask + core glow, leaning forward (in motion) ----
const heroG=new THREE.Group(); heroG.position.set(-1.4,0.18,0); heroG.rotation.x=0.1; scene.add(heroG);
const swarm=new THREE.Points(swarmGeo,swarmMat); heroG.add(swarm);
const coreGlow=new THREE.Mesh(new THREE.SphereGeometry(0.2,16,16),new THREE.MeshBasicMaterial({color:0xe8c97a,transparent:true,opacity:0.045,blending:THREE.AdditiveBlending}));
coreGlow.position.set(0.04,1.32,0.18); heroG.add(coreGlow);
// THE MASK — the one solid thing in the cloud of light: an anonymous cipher mask (focus + hook)
const maskMat=new THREE.MeshStandardMaterial({color:0x05050c,metalness:0.5,roughness:0.4,envMapIntensity:0.5});
const mask=new THREE.Group(); mask.position.set(0.05,1.66,0.13); mask.rotation.x=0.25;
const shield=new THREE.Mesh(new THREE.SphereGeometry(0.17,24,20,0,Math.PI*2,Math.PI*0.4,Math.PI*0.62),maskMat);
shield.scale.set(0.82,1.35,0.72); mask.add(shield);
// thin vertical crest down the center (reads as a face / mask, not an eye)
const crest=new THREE.Mesh(new THREE.BoxGeometry(0.018,0.26,0.04),maskMat); crest.position.set(0,-0.02,0.12); mask.add(crest);
// the gaze: an angular visor-slit (two segments meeting low-center — a hunter's glare, not a cartoon eye)
const visorMat=new THREE.MeshBasicMaterial({color:0x7fe8ff});
const visorGlowMat=new THREE.MeshBasicMaterial({color:0x2fe6ff,transparent:true,opacity:0.35,blending:THREE.AdditiveBlending});
for(const sgn of [-1,1]){
  const v=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.013,0.012),visorMat); v.position.set(sgn*0.055,0.03,0.155); v.rotation.z=sgn*0.22; mask.add(v);
  const vg=new THREE.Mesh(new THREE.BoxGeometry(0.11,0.035,0.012),visorGlowMat); vg.position.set(sgn*0.055,0.03,0.15); vg.rotation.z=sgn*0.22; mask.add(vg);
}
heroG.add(mask);

// ---- minimal threat: ONE distant Watcher dissolving in fog (restraint) ----
const watcher=new THREE.Mesh(new THREE.SphereGeometry(0.13,12,10),new THREE.MeshBasicMaterial({color:0xc24a7a}));
watcher.position.set(2.6,3.1,-5); scene.add(watcher);
watcher.add(new THREE.Mesh(new THREE.SphereGeometry(0.4,12,10),new THREE.MeshBasicMaterial({color:0xc24a7a,transparent:true,opacity:0.18,blending:THREE.AdditiveBlending})));
const threadGeo=new THREE.BufferGeometry(); threadGeo.setAttribute('position',new THREE.Float32BufferAttribute([2.6,3.1,-5,-1.36,1.5,0.2],3));
const thread=new THREE.Line(threadGeo,new THREE.LineBasicMaterial({color:0xc24a7a,transparent:true,opacity:0.1,blending:THREE.AdditiveBlending})); scene.add(thread);

// ---- restrained atmosphere: a few soft violet motes ----
const NM=240; const mPos=new Float32Array(NM*3), mV=[];
for(let i=0;i<NM;i++){ mPos[i*3]=(Math.random()-0.5)*18; mPos[i*3+1]=Math.random()*6; mPos[i*3+2]=(Math.random()-0.5)*14-2; mV.push(0.0015+Math.random()*0.004); }
const mGeo=new THREE.BufferGeometry(); mGeo.setAttribute('position',new THREE.BufferAttribute(mPos,3));
const motes=new THREE.Points(mGeo,new THREE.PointsMaterial({color:0x8a7ad0,size:0.03,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false}));
scene.add(motes);

// ---- post: soft bloom + dusk grade (strong vignette, fine grain, slight CA) ----
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,cam));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(512,512),0.3,0.72,0.96));
const Grade={uniforms:{tDiffuse:{value:null},uTime:{value:0}},
  vertexShader:'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
  fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime;
   float rand(vec2 c){ return fract(sin(dot(c,vec2(12.9898,78.233)))*43758.5453); }
   void main(){ vec2 uv=vUv; vec2 d=uv-0.5; float r=dot(d,d);
     float ca=0.001+r*0.0025; vec3 c; c.r=texture2D(tDiffuse,uv+d*ca).r; c.g=texture2D(tDiffuse,uv).g; c.b=texture2D(tDiffuse,uv-d*ca).b;
     float vig=smoothstep(1.0,0.18,r*1.9); c*=mix(1.0,vig,0.95);
     // dusk tint: lift shadows toward indigo, warm the lights
     float l=dot(c,vec3(0.299,0.587,0.114));
     c=mix(c+vec3(0.015,0.0,0.04)*(1.0-l), c+vec3(0.03,0.015,0.0)*l, 0.5);
     c+=(rand(uv*vec2(uTime*0.5+1.0,uTime*0.37+1.0))-0.5)*0.035;
     gl_FragColor=vec4(c,1.0); }`};
const grade=new ShaderPass(Grade); composer.addPass(grade);
composer.addPass(new OutputPass());
resize(); addEventListener('resize',resize);

// ---- animate (slow, breathing, occasional glitch sweep) ----
let t=0, glTimer=2.5;
function loop(){ t+=0.016;
  cam.position.x=-0.65+Math.sin(t*0.1)*0.22; cam.position.y=1.35+Math.sin(t*0.16)*0.05; cam.lookAt(-1.4,1.12,0);
  swarmMat.uniforms.uTime.value=t;
  // glitch sweep: every few seconds a band shears up through the body
  glTimer-=0.016; if(glTimer<0){ swarmMat.uniforms.uGlitch.value=-0.2; }
  if(swarmMat.uniforms.uGlitch.value>-9){ swarmMat.uniforms.uGlitch.value+=0.05; if(swarmMat.uniforms.uGlitch.value>2.0){ swarmMat.uniforms.uGlitch.value=-9; glTimer=2.5+Math.random()*3; } }
  coreGlow.material.opacity=0.03+0.02*Math.sin(t*2.0); coreGlow.scale.setScalar(1+0.1*Math.sin(t*2.0));
  heroG.rotation.z=Math.sin(t*0.5)*0.015; heroG.position.y=0.18+Math.sin(t*0.6)*0.03;
  const gl=swarmMat.uniforms.uGlitch.value>-9; visorMat.color.setHex(gl?0xff5a7a:0x7fe8ff); visorGlowMat.opacity=gl?0.6:0.3+0.12*Math.sin(t*2.5);
  mask.rotation.z=gl?Math.sin(t*40)*0.03:0;
  const wp=watcher.material; watcher.children[0].material.opacity=0.12+0.08*Math.sin(t*2.5); thread.material.opacity=0.06+0.05*Math.sin(t*3.5);
  const mp=mGeo.attributes.position.array; for(let i=0;i<NM;i++){ mp[i*3+1]+=mV[i]; if(mp[i*3+1]>6)mp[i*3+1]=0; } mGeo.attributes.position.needsUpdate=true;
  grade.uniforms.uTime.value=t;
  composer.render(); requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
