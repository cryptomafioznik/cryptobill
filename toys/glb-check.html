<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;height:100%;background:#0a0c10;overflow:hidden}</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script></head>
<body><script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {RoomEnvironment} from 'three/addons/environments/RoomEnvironment.js';
const r=new THREE.WebGLRenderer({antialias:true});r.setSize(innerWidth,innerHeight);r.toneMapping=THREE.ACESFilmicToneMapping;r.toneMappingExposure=1.1;document.body.appendChild(r.domElement);
const sc=new THREE.Scene();sc.background=new THREE.Color(0x0a0c10);
const cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.01,100);cam.position.set(0,0.6,2.4);
const pm=new THREE.PMREMGenerator(r);sc.environment=pm.fromScene(new RoomEnvironment(),0.04).texture;
sc.add(new THREE.AmbientLight(0x556677,1.6));const d=new THREE.DirectionalLight(0xaecce8,2.2);d.position.set(2,4,3);sc.add(d);
const rimC=new THREE.DirectionalLight(0x33e3ff,3);rimC.position.set(-3,1,-3);sc.add(rimC);
const rimW=new THREE.DirectionalLight(0xe8c97a,2);rimW.position.set(3,-1,-2);sc.add(rimW);
r.toneMappingExposure=1.5;
const grid=new THREE.GridHelper(4,8,0x224,0x113);grid.position.y=-0.9;sc.add(grid);
let model;
new GLTFLoader().load('../assets/game/models/hero.glb',g=>{ model=g.scene; const box=new THREE.Box3().setFromObject(model); const c=box.getCenter(new THREE.Vector3()); const s=box.getSize(new THREE.Vector3()); const k=1.5/Math.max(s.x,s.y,s.z); model.scale.setScalar(k); model.position.sub(c.multiplyScalar(k)); sc.add(model); window.__loaded=true; }, undefined, e=>{ document.body.innerHTML='<pre style="color:#f55">'+e+'</pre>'; });
let ang=0; window.__setAng=a=>{ang=a;};
function loop(){ if(model){ model.rotation.y=ang; } r.render(sc,cam); requestAnimationFrame(loop);} loop();
</script></body></html>
