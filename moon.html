<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CryptoBill — To The Moon</title>
    <style>
      :root {
        --emerald: #33e6a8; --gold: #ffd35e; --red: #ff5d73; --blue: #5b8cff; --violet: #a78bfa;
        --ink: #eef3ff; --muted: #8a98bd;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; overflow: hidden; background: #05070d; }
      body { display: grid; place-items: center; color: var(--ink); user-select: none; touch-action: none; }
      .stage { position: relative; width: min(460px, 100vw); height: min(960px, 100vh); overflow: hidden; background: #05070d; cursor: pointer; }
      canvas { display: block; position: absolute; inset: 0; }

      .hud { position: absolute; top: 0; left: 0; right: 0; padding: 16px 18px; z-index: 5; pointer-events: none; text-align: center; }
      .hud .label { font-size: 0.66rem; font-weight: 800; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); }
      .hud .score { font-size: 2.9rem; font-weight: 900; line-height: 1; letter-spacing: -0.02em; text-shadow: 0 0 26px rgba(51,230,168,0.5); transition: transform .1s; }
      .hud .score.pop { transform: scale(1.1); }
      .hud .mult { margin-top: 4px; font-size: 0.9rem; font-weight: 800; color: var(--gold); height: 1.1em; opacity: 0; transition: opacity .2s; }
      .hud .mult.on { opacity: 1; }

      .toast { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); z-index: 6; font-weight: 900; font-size: 1.5rem; color: var(--gold); text-shadow: 0 2px 24px rgba(0,0,0,.6); opacity: 0; pointer-events: none; white-space: nowrap; }
      .toast.go { animation: pumpToast 1.4s ease forwards; }
      @keyframes pumpToast { 0% { opacity: 0; transform: translate(-50%, 10px) scale(.8); } 15% { opacity: 1; transform: translate(-50%, 0) scale(1.1); } 80% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -30px) scale(1); } }

      .overlay { position: absolute; inset: 0; z-index: 7; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 28px; text-align: center; background: radial-gradient(120% 90% at 50% 40%, rgba(5,7,13,0.35), rgba(5,7,13,0.82)); backdrop-filter: blur(2px); }
      .overlay.hidden { display: none; }
      .title { font-size: 2.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
      .title .rk { filter: drop-shadow(0 6px 18px rgba(51,230,168,.5)); }
      .tag { color: var(--muted); font-size: 0.98rem; font-weight: 600; max-width: 280px; line-height: 1.4; }
      .big { font-size: 3.6rem; font-weight: 900; text-shadow: 0 0 30px rgba(255,211,94,.4); }
      .row { color: var(--muted); font-weight: 700; font-size: 0.92rem; }
      .row b { color: var(--ink); }
      .cta { margin-top: 8px; padding: 14px 26px; border-radius: 999px; border: 0; font-weight: 900; font-size: 1.05rem; color: #06210f; background: linear-gradient(180deg, #4dffc0, var(--emerald)); box-shadow: 0 12px 34px rgba(51,230,168,.4); cursor: pointer; animation: bob 1.6s ease-in-out infinite; }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .share { padding: 11px 18px; border-radius: 999px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14); color: var(--ink); font-weight: 800; font-size: .9rem; cursor: pointer; }
      .hint2 { color: rgba(255,255,255,.4); font-size: .8rem; }
      .deathcause { color: var(--red); font-weight: 800; }
    </style>
  </head>
  <body>
    <div class="stage" id="stage">
      <canvas id="game"></canvas>

      <div class="hud">
        <div class="label">Net worth</div>
        <div class="score" id="score">$1,000</div>
        <div class="mult" id="mult"></div>
      </div>
      <div class="toast" id="toast"></div>

      <div class="overlay" id="ready">
        <div class="title"><span class="rk">🚀</span> TO THE MOON</div>
        <div class="tag">Hold to fire your rocket up the chart. Let go to drop. Grab coins, dodge the red liquidations — get as high as you can.</div>
        <button class="cta" id="startBtn">Hold to launch</button>
        <div class="hint2">hold anywhere · release to fall</div>
      </div>

      <div class="overlay hidden" id="dead">
        <div class="label">You got</div>
        <div class="big" id="finalScore">$0</div>
        <div class="row" id="deathRow"></div>
        <div class="row">Best <b id="best">$0</b></div>
        <button class="cta" id="againBtn">Fly again</button>
        <button class="share" id="shareBtn">Share my run</button>
      </div>
    </div>

    <script>
      // ---------- sound ----------
      let actx;
      function tone(freq, dur, type = "sine", gain = 0.05, when = 0, slideTo = null) {
        try {
          if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
          if (actx.state === "suspended") actx.resume();
          const o = actx.createOscillator(), g = actx.createGain();
          o.type = type; o.connect(g); g.connect(actx.destination);
          const t = actx.currentTime + when;
          o.frequency.setValueAtTime(freq, t);
          if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
          g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(gain, t + 0.01); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          o.start(t); o.stop(t + dur + 0.02);
        } catch (e) {}
      }
      const SND = {
        coin() { tone(880, 0.07, "triangle", 0.04); tone(1320, 0.09, "sine", 0.035, 0.04); },
        milestone() { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.18, "sine", 0.05, i * 0.07)); },
        crash() { tone(200, 0.4, "sawtooth", 0.07, 0, 60); tone(120, 0.5, "square", 0.05, 0.05, 50); },
        launch() { tone(220, 0.4, "sawtooth", 0.04, 0, 600); },
      };

      // ---------- canvas ----------
      const stage = document.getElementById("stage");
      const cvs = document.getElementById("game");
      const ctx = cvs.getContext("2d");
      let W, H, DPR;
      function resize() {
        const r = stage.getBoundingClientRect();
        DPR = Math.min(2, window.devicePixelRatio || 1);
        cvs.width = r.width * DPR; cvs.height = r.height * DPR;
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        W = r.width; H = r.height;
      }
      resize();
      window.addEventListener("resize", resize);

      // ---------- helpers ----------
      const rand = (a, b) => a + Math.random() * (b - a);
      const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
      function fmt(v) {
        v = Math.max(0, Math.floor(v));
        if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
        if (v >= 1e6) return "$" + (v / 1e6).toFixed(2) + "M";
        if (v >= 1e3) return "$" + (v / 1e3).toFixed(1) + "k";
        return "$" + v;
      }

      // ---------- state ----------
      let state = "ready"; // ready | playing | dead
      let rocket, hazards, coins, parts, trail, stars, speed, score, dispScore, held, spawnT, coinT, mult, multT, shake, t0, best, milestoneIdx, deathCause;
      const MILES = [10000, 100000, 1000000, 10000000, 100000000];
      const MILE_NAMES = ["$10k — ramen money", "$100k — made it?", "$1M — millionaire 🌙", "$10M — whale status 🐋", "$100M — legend"];

      // localStorage can throw when opened via file:// in some browsers — guard it.
      const lsGet = (k) => { try { return localStorage.getItem(k); } catch (e) { return null; } };
      const lsSet = (k, v) => { try { localStorage.setItem(k, v); } catch (e) {} };
      best = +(lsGet("cryptobill.moon.best") || 0);
      document.getElementById("best").textContent = fmt(best);

      function reset() {
        rocket = { x: W * 0.3, y: H * 0.5, vy: 0, r: 13 };
        hazards = []; coins = []; parts = []; trail = [];
        stars = Array.from({ length: 60 }, () => ({ x: rand(0, W), y: rand(0, H), z: rand(0.3, 1), s: rand(0.6, 1.8) }));
        speed = 210; score = 1000; dispScore = 1000; held = false;
        spawnT = 0.9; coinT = 0.6; mult = 1; multT = 0; shake = 0; milestoneIdx = 0; deathCause = "";
        t0 = performance.now();
      }

      function start() {
        reset();
        state = "playing";
        document.getElementById("ready").classList.add("hidden");
        document.getElementById("dead").classList.add("hidden");
        SND.launch();
        held = true; // first touch already down
      }

      function die(cause) {
        if (state !== "playing") return;
        state = "dead";
        deathCause = cause;
        shake = 26;
        SND.crash();
        explode(rocket.x, rocket.y, ["#ff5d73", "#ffd35e", "#ffffff"], 40, 7);
        score = Math.max(0, score);
        if (score > best) { best = Math.floor(score); lsSet("cryptobill.moon.best", best); }
        document.getElementById("finalScore").textContent = fmt(score);
        document.getElementById("best").textContent = fmt(best);
        document.getElementById("deathRow").innerHTML = `<span class="deathcause">${cause}</span>`;
        setTimeout(() => document.getElementById("dead").classList.remove("hidden"), 650);
      }

      // ---------- particles ----------
      function explode(x, y, colors, n, sp) {
        for (let i = 0; i < n; i++) {
          const a = rand(0, Math.PI * 2), v = rand(0.3, 1) * sp * 60;
          parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: 1, dec: rand(0.6, 1.6), size: rand(2, 5), color: colors[(Math.random() * colors.length) | 0], g: 600 });
        }
      }
      function flame(x, y) {
        parts.push({ x: x + rand(-3, 3), y: y + rand(0, 4), vx: rand(-30, 30), vy: rand(120, 240), life: 1, dec: 3.4, size: rand(3, 6), color: Math.random() < 0.5 ? "#ffd35e" : "#ff8a4d", g: 0 });
      }

      // ---------- spawning ----------
      function spawnHazard() {
        const h = rand(60, Math.min(220, H * 0.32));
        const y = rand(40, H - h - 90);
        const kinds = [
          { c: "#ff5d73", label: "LIQUIDATION" },
          { c: "#ff5d73", label: "RUG" },
          { c: "#ff7a45", label: "DUMP" },
        ];
        const k = kinds[(Math.random() * kinds.length) | 0];
        hazards.push({ x: W + 30, y, w: rand(26, 40), h, color: k.c, label: k.label, pulse: rand(0, 6) });
      }
      function spawnCoins() {
        const n = (Math.random() * 4 + 3) | 0;
        const baseY = rand(70, H - 130);
        const amp = rand(-60, 60);
        for (let i = 0; i < n; i++) {
          coins.push({ x: W + 30 + i * 30, y: clamp(baseY + Math.sin(i * 0.9) * amp, 50, H - 110), r: 9, got: false });
        }
      }

      // ---------- loop ----------
      let last = performance.now();
      function frame(now) {
        let dt = (now - last) / 1000; last = now;
        dt = Math.min(dt, 0.033);
        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      function update(dt) {
        // background stars always drift
        for (const s of stars) { s.x -= (state === "playing" ? speed : 30) * s.z * dt * 0.4; if (s.x < -2) { s.x = W + 2; s.y = rand(0, H); } }

        if (state === "playing") {
          speed = Math.min(560, speed + 7 * dt);
          // rocket physics
          rocket.vy += 2050 * dt;
          if (held) rocket.vy -= 4250 * dt;
          rocket.vy = clamp(rocket.vy, -880, 980);
          rocket.y += rocket.vy * dt;
          if (rocket.y < rocket.r + 6) { rocket.y = rocket.r + 6; rocket.vy = Math.max(0, rocket.vy); }
          if (rocket.y > H - rocket.r - 4) { die("Dumped to zero 💀"); }
          if (held && Math.random() < 0.9) flame(rocket.x - 10, rocket.y + 4);

          // trail (the price line you draw)
          trail.push({ x: rocket.x, y: rocket.y });
          for (const p of trail) p.x -= speed * dt;
          while (trail.length && trail[0].x < -4) trail.shift();

          // score: higher = richer
          const altF = 1 + (1 - rocket.y / H) * 1.8;
          score += speed * dt * altF * 2.6 * mult;

          // spawns
          spawnT -= dt; coinT -= dt;
          const gap = clamp(1.5 - speed / 700, 0.62, 1.5);
          if (spawnT <= 0) { spawnHazard(); spawnT = gap * rand(0.8, 1.25); }
          if (coinT <= 0) { spawnCoins(); coinT = rand(1.0, 1.8); }

          // move + collide hazards
          for (const hz of hazards) {
            hz.x -= speed * dt; hz.pulse += dt * 6;
            if (rocket.x + rocket.r > hz.x && rocket.x - rocket.r < hz.x + hz.w && rocket.y + rocket.r > hz.y && rocket.y - rocket.r < hz.y + hz.h) {
              die(hz.label === "RUG" ? "Rugged 💀" : hz.label === "DUMP" ? "Dumped on 💀" : "Liquidated 💀");
            }
          }
          hazards = hazards.filter((h) => h.x + h.w > -10);

          // coins
          for (const c of coins) {
            c.x -= speed * dt;
            if (!c.got && Math.hypot(c.x - rocket.x, c.y - rocket.y) < c.r + rocket.r + 4) {
              c.got = true; mult = Math.min(9, mult + 0.5); multT = 2.2;
              score += 250 * mult;
              SND.coin();
              for (let i = 0; i < 6; i++) parts.push({ x: c.x, y: c.y, vx: rand(-120, 120), vy: rand(-180, -40), life: 1, dec: 2.2, size: rand(2, 4), color: "#ffd35e", g: 500 });
            }
          }
          coins = coins.filter((c) => c.x > -20 && !c.got);

          // multiplier decay
          multT -= dt; if (multT <= 0) { mult = Math.max(1, mult - dt * 0.8); }

          // milestones
          if (milestoneIdx < MILES.length && score >= MILES[milestoneIdx]) {
            popToast(MILE_NAMES[milestoneIdx]); SND.milestone(); shake = Math.max(shake, 10); milestoneIdx++;
          }
        }

        // particles
        for (const p of parts) { p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= p.dec * dt; }
        parts = parts.filter((p) => p.life > 0);
        if (shake > 0) shake = Math.max(0, shake - 60 * dt);

        // animate displayed score
        dispScore += (score - dispScore) * Math.min(1, dt * 8);
      }

      // ---------- render ----------
      function render() {
        ctx.save();
        if (shake > 0) ctx.translate(rand(-shake, shake) * 0.4, rand(-shake, shake) * 0.4);

        // sky gradient by altitude/score (ground -> space)
        const climb = clamp(Math.log10(Math.max(1000, score)) - 3, 0, 5) / 5; // 0..1 across $1k..$100M
        const g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, mixHex("#0a1430", "#05060d", climb));
        g.addColorStop(1, mixHex("#0e1f3a", "#070a16", climb));
        ctx.fillStyle = g; ctx.fillRect(-20, -20, W + 40, H + 40);

        // stars
        for (const s of stars) { ctx.globalAlpha = 0.3 + s.z * 0.6; ctx.fillStyle = "#cfe0ff"; ctx.fillRect(s.x, s.y, s.s, s.s); }
        ctx.globalAlpha = 1;

        // moon appears as you climb
        if (climb > 0.45) {
          const ma = clamp((climb - 0.45) / 0.4, 0, 1);
          ctx.globalAlpha = ma; ctx.fillStyle = "#f2efe0";
          ctx.beginPath(); ctx.arc(W * 0.74, H * 0.16, 34, 0, 7); ctx.fill();
          ctx.fillStyle = "rgba(0,0,0,0.06)"; ctx.beginPath(); ctx.arc(W * 0.78, H * 0.14, 7, 0, 7); ctx.fill();
          ctx.globalAlpha = 1;
        }

        // floor danger glow
        const fg = ctx.createLinearGradient(0, H - 60, 0, H);
        fg.addColorStop(0, "rgba(255,93,115,0)"); fg.addColorStop(1, "rgba(255,93,115,0.22)");
        ctx.fillStyle = fg; ctx.fillRect(0, H - 60, W, 60);

        // trail (price line)
        if (trail.length > 1) {
          ctx.lineWidth = 4; ctx.lineJoin = "round"; ctx.lineCap = "round";
          ctx.strokeStyle = "rgba(51,230,168,0.9)"; ctx.shadowColor = "rgba(51,230,168,0.8)"; ctx.shadowBlur = 16;
          ctx.beginPath();
          trail.forEach((p, i) => (i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)));
          ctx.stroke(); ctx.shadowBlur = 0;
        }

        // coins
        for (const c of coins) {
          ctx.fillStyle = "#ffd35e"; ctx.shadowColor = "#ffd35e"; ctx.shadowBlur = 12;
          ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, 7); ctx.fill();
          ctx.shadowBlur = 0; ctx.fillStyle = "rgba(255,255,255,0.7)";
          ctx.beginPath(); ctx.arc(c.x - 2.5, c.y - 2.5, 2.4, 0, 7); ctx.fill();
        }

        // hazards
        for (const hz of hazards) {
          const glow = 8 + Math.sin(hz.pulse) * 5;
          ctx.fillStyle = hz.color; ctx.shadowColor = hz.color; ctx.shadowBlur = glow;
          roundRect(hz.x, hz.y, hz.w, hz.h, 7); ctx.fill(); ctx.shadowBlur = 0;
          ctx.fillStyle = "rgba(0,0,0,0.28)";
          ctx.save(); ctx.translate(hz.x + hz.w / 2, hz.y + hz.h / 2); ctx.rotate(-Math.PI / 2);
          ctx.font = "800 10px Inter, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(hz.label, 0, 1); ctx.restore();
        }

        // particles
        for (const p of parts) { ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill(); }
        ctx.globalAlpha = 1;

        // rocket
        if (state !== "dead") drawRocket();

        ctx.restore();

        // HUD score
        const sc = document.getElementById("score");
        sc.textContent = fmt(dispScore);
        const m = document.getElementById("mult");
        if (mult > 1.05) { m.textContent = "x" + mult.toFixed(1) + " combo"; m.classList.add("on"); } else m.classList.remove("on");
      }

      function drawRocket() {
        const tilt = clamp(rocket.vy / 900, -1, 1) * 0.5;
        ctx.save(); ctx.translate(rocket.x, rocket.y); ctx.rotate(tilt);
        // body
        ctx.fillStyle = "#eef3ff"; roundRect(-9, -7, 20, 14, 6); ctx.fill();
        // nose
        ctx.fillStyle = "#33e6a8"; ctx.beginPath(); ctx.moveTo(11, -7); ctx.lineTo(20, 0); ctx.lineTo(11, 7); ctx.closePath(); ctx.fill();
        // window
        ctx.fillStyle = "#5b8cff"; ctx.beginPath(); ctx.arc(2, 0, 3.4, 0, 7); ctx.fill();
        // fins
        ctx.fillStyle = "#ff5d73"; ctx.beginPath(); ctx.moveTo(-7, -7); ctx.lineTo(-13, -12); ctx.lineTo(-6, -3); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-7, 7); ctx.lineTo(-13, 12); ctx.lineTo(-6, 3); ctx.closePath(); ctx.fill();
        ctx.restore();
      }

      function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); }
      function mixHex(a, b, t) {
        const pa = [parseInt(a.slice(1, 3), 16), parseInt(a.slice(3, 5), 16), parseInt(a.slice(5, 7), 16)];
        const pb = [parseInt(b.slice(1, 3), 16), parseInt(b.slice(3, 5), 16), parseInt(b.slice(5, 7), 16)];
        const c = pa.map((v, i) => Math.round(v + (pb[i] - v) * t));
        return `rgb(${c[0]},${c[1]},${c[2]})`;
      }

      function popToast(text) {
        const el = document.getElementById("toast");
        el.textContent = text; el.classList.remove("go"); void el.offsetWidth; el.classList.add("go");
        const sc = document.getElementById("score"); sc.classList.add("pop"); setTimeout(() => sc.classList.remove("pop"), 140);
      }

      // ---------- input ----------
      function press() {
        if (state === "ready" || state === "dead") {
          // small guard so the death overlay button taps don't instantly relaunch is handled by buttons
          if (state === "ready") start();
          return;
        }
        held = true;
      }
      function release() { held = false; }

      stage.addEventListener("pointerdown", (e) => { e.preventDefault(); if (state === "playing") held = true; else if (state === "ready") start(); });
      stage.addEventListener("pointerup", (e) => { e.preventDefault(); held = false; });
      stage.addEventListener("pointercancel", () => { held = false; });
      window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); if (state === "playing") held = true; else if (state === "ready") start(); } });
      window.addEventListener("keyup", (e) => { if (e.code === "Space") held = false; });

      document.getElementById("startBtn").addEventListener("pointerdown", (e) => { e.stopPropagation(); start(); });
      document.getElementById("againBtn").addEventListener("pointerdown", (e) => { e.stopPropagation(); start(); });
      document.getElementById("shareBtn").addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        const text = `I flew to ${fmt(score)} in CryptoBill: To The Moon 🚀 before ${deathCause.replace(" 💀", "")}. Beat me.`;
        if (navigator.share) navigator.share({ text }).catch(() => {});
        else navigator.clipboard?.writeText(text).then(() => { const b = document.getElementById("shareBtn"); b.textContent = "Copied!"; setTimeout(() => (b.textContent = "Share my run"), 1400); });
      });

      // debug hook — lets the harness step the sim without rAF (preview tabs pause rAF)
      window.__moon = {
        start,
        step(n, holdFlag, dt = 0.016) { held = !!holdFlag; for (let i = 0; i < n; i++) update(dt); render(); return this.get(); },
        get() { return { state, score: Math.round(score), y: Math.round(rocket.y), hazards: hazards.length, coins: coins.length, mult: +mult.toFixed(2), deathCause }; },
        hitHazard() { hazards.push({ x: rocket.x - 4, y: rocket.y - 30, w: 30, h: 60, color: "#f00", label: "RUG", pulse: 0 }); update(0.016); return this.get(); },
      };

      reset();
      requestAnimationFrame((t) => { last = t; requestAnimationFrame(frame); });
    </script>
  </body>
</html>
